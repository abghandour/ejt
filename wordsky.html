<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordsky — Daily Russian Word Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0e0e1a;
  color:#f5e6c8;
  font-family:'Roboto Condensed',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

/* ===== BANNER ===== */
#banner{
  width:100%;
  max-width:600px;
  display:block;
}

/* ===== ICON CLASSES ===== */
.icon{display:inline-block;vertical-align:middle;fill:currentColor}
.icon-sm{width:16px;height:16px}
.icon-md{width:20px;height:20px}
.icon-lg{width:24px;height:24px}
.icon-star{width:18px;height:18px}
.icon-star.filled{fill:#c8a830}
.icon-star.empty{fill:none;stroke:#6a6a8a;stroke-width:1.5px}

/* ===== TOP BAR ===== */
#top-bar{
  width:100%;
  max-width:600px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  font-size:14px;
  color:#c8a830;
  border-bottom:1px solid rgba(200,168,48,0.2);
}

#top-bar .score-display{
  font-weight:700;
  font-size:16px;
}

#top-bar .word-counter{
  font-size:14px;
  color:#f5e6c8;
}

#calendar-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1;
}
#calendar-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}

/* ===== DATE DISPLAY ===== */
#date-display{
  width:100%;
  max-width:600px;
  text-align:center;
  padding:8px 16px 0;
  font-size:13px;
  color:#6a6a8a;
  letter-spacing:1px;
}

/* ===== WORD DISPLAY ===== */
#word-display-area{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:12px 16px 8px;
  flex:1 1 0;
  min-height:0;
  perspective:800px;
  overflow:hidden;
}

#russian-word{
  font-size:clamp(40px,10vw,72px);
  font-weight:700;
  color:#f5e6c8;
  text-align:center;
  text-shadow:0 0 20px rgba(200,168,48,0.3);
  margin-bottom:4px;
}

#word-translation{
  font-size:clamp(14px,3vw,18px);
  color:#6a9ec0;
  text-align:center;
  margin-bottom:12px;
  min-height:22px;
  transition:opacity 0.3s;
}
#word-translation.hidden{opacity:0}

#tts-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:50%;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#c8a830;
  font-size:20px;
  transition:all 0.2s;
}
#tts-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}
#tts-btn.hidden{
  display:none;
}

/* ===== ANSWER GRID ===== */
#answer-grid{
  width:100%;
  max-width:600px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 16px 50px;
}

.answer-btn{
  padding:16px 12px;
  font-size:15px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  border-radius:8px;
  color:#f5e6c8;
  cursor:pointer;
  transition:all 0.25s;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  min-height:52px;
  word-wrap:break-word;
}
.answer-btn:hover:not(:disabled){
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
  border-color:#c8a830;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(200,168,48,0.2);
}
.answer-btn:disabled{
  cursor:not-allowed;
  opacity:0.5;
}
.answer-btn.correct{
  background:linear-gradient(180deg,#2a5a2a 0%,#1a3a1a 100%);
  border-color:#5a5;
  color:#8f8;
  box-shadow:0 0 20px rgba(85,170,85,0.3);
}
.answer-btn.wrong{
  background:linear-gradient(180deg,#5a2a2a 0%,#3a1a1a 100%);
  border-color:#c44;
  color:#f88;
  box-shadow:0 0 20px rgba(204,68,68,0.3);
  animation:wrongShake 0.4s ease;
}

@keyframes wrongShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

@keyframes coinFlip{
  0%{transform:rotateX(0deg)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0deg)}
}

#russian-word.coin-flip{
  animation:coinFlip 0.8s cubic-bezier(0.2,0.6,0.35,1);
}

/* ===== MESSAGE / ERROR AREA ===== */
#message-area{
  width:100%;
  max-width:600px;
  text-align:center;
  padding:8px 16px;
  font-size:14px;
  min-height:24px;
  color:#d4a853;
}
#message-area.error{color:#c44}
#message-area.success{color:#5a5}
#message-area.hidden{display:none}

/* ===== RESULTS POPUP OVERLAY ===== */
#results-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
  overflow-y:auto;
}
#results-overlay.hidden{display:none}

#results-popup{
  width:100%;
  max-width:420px;
  background:rgba(30,30,50,0.95);
  border:1px solid #3a3a5a;
  border-radius:12px;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  position:relative;
}

#results-popup h2{
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;
  font-weight:700;
  color:#c8a830;
  text-align:center;
}

#results-close-btn{
  position:absolute;
  top:12px;
  right:14px;
  background:none;
  border:none;
  color:#6a6a8a;
  font-size:22px;
  cursor:pointer;
  padding:2px 6px;
  transition:color 0.2s;
}
#results-close-btn:hover{color:#f5e6c8}

#results-words{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.result-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid rgba(58,58,94,0.3);
  font-size:16px;
}
.result-row .result-word{
  color:#f5e6c8;
  font-weight:700;
}
.result-row .result-stars{
  font-size:16px;
  letter-spacing:2px;
}

#results-total{
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;
  font-weight:700;
  color:#c8a830;
}

#results-actions{
  display:flex;
  flex-wrap:nowrap;
  gap:8px;
  justify-content:center;
  width:100%;
}

.results-btn{
  padding:10px 20px;
  font-size:14px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

#copy-results-btn{
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  color:#f5e6c8;
}
#copy-results-btn:hover{
  border-color:#c8a830;
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
}

.share-btn{
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  color:#f5e6c8;
}
.share-btn:hover{
  border-color:#c8a830;
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
}

#copy-confirm{
  font-size:13px;
  color:#5a5;
  min-height:20px;
}

/* ===== CALENDAR OVERLAY ===== */
#calendar-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
}
#calendar-overlay.hidden{display:none}

#calendar-popup{
  width:100%;
  max-width:360px;
  background:rgba(30,30,50,0.95);
  border:1px solid #3a3a5a;
  border-radius:12px;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

#calendar-header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#calendar-header h3{
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;
  font-weight:700;
  color:#c8a830;
}

.cal-nav-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  font-size:18px;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Roboto Condensed',sans-serif;
}
.cal-nav-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}

#calendar-close-btn{
  background:none;
  border:none;
  color:#6a6a8a;
  font-size:22px;
  cursor:pointer;
  padding:2px 6px;
  transition:color 0.2s;
}
#calendar-close-btn:hover{color:#f5e6c8}

#calendar-weekdays{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  text-align:center;
  font-size:12px;
  color:#6a6a8a;
  font-weight:700;
}

#calendar-grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.cal-day{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  border:1px solid transparent;
  color:#f5e6c8;
}
.cal-day:hover:not(.disabled):not(.empty){
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}
.cal-day.empty{cursor:default}
.cal-day.disabled{
  color:#3a3a5a;
  cursor:not-allowed;
}
.cal-day.has-data{
  color:#c8a830;
  font-weight:700;
}
.cal-day.played{
  background:rgba(85,170,85,0.15);
  color:#5a5;
  font-weight:700;
}
.cal-day.today{
  border:1px solid #c8a830;
}

/* ===== REVIEW MODE NAV ARROWS ===== */
#review-nav{
  width:100%;
  max-width:600px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px 12px;
}
#review-nav.hidden{display:none}

.review-nav-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  font-size:20px;
  padding:6px 14px;
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Roboto Condensed',sans-serif;
}
.review-nav-btn:hover:not(:disabled){
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}
.review-nav-btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

#review-score{
  font-size:14px;
  color:#c8a830;
  font-weight:700;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  #top-bar{padding:8px 12px;font-size:13px}
  #russian-word{font-size:clamp(28px,8vw,44px)}
  .answer-btn{padding:10px 8px;font-size:13px;min-height:40px}
  #results-popup{padding:16px 14px}
  #results-popup h2{font-size:18px}
  .results-btn{padding:8px 14px;font-size:13px}
  #word-display-area{padding:8px 16px 4px}
  #date-display{padding:4px 16px 0}
}

@media(min-width:768px){
  #word-display-area{padding:24px 16px 16px}
  #russian-word{font-size:68px}
  .answer-btn{padding:18px 16px;font-size:16px}
}

@media(min-width:1024px){
  body{justify-content:flex-start;padding-top:20px}
}
</style>
</head>

<script>
  // ===== SOUND ENGINE =====
  var audioCtx = null;
  var audioUnlocked = false;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function unlockAudio() {
    if (audioUnlocked) return;
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    var b = ctx.createBuffer(1, 1, 22050);
    var s = ctx.createBufferSource();
    s.buffer = b;
    s.connect(ctx.destination);
    s.start(0);
    audioUnlocked = true;
  }
  document.addEventListener('touchstart', unlockAudio, { once: true });
  document.addEventListener('touchend', unlockAudio, { once: true });
  document.addEventListener('click', unlockAudio, { once: true });

  function playTone(freq, dur, type, vol, delay) {
    type = type || 'sine';
    vol = vol || 0.12;
    delay = delay || 0;
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.001, ctx.currentTime + delay);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    o.connect(g).connect(ctx.destination);
    o.start(ctx.currentTime + delay);
    o.stop(ctx.currentTime + delay + dur);
  }

  // ===== DATA LOADER MODULE (Task 3.1) =====

  function validateWordEntry(entry) {
    if (!entry || typeof entry !== 'object') return false;
    if (typeof entry.wordOfTheDay !== 'string' || entry.wordOfTheDay.trim() === '') return false;
    if (typeof entry.translation !== 'string' || entry.translation.trim() === '') return false;
    if (!Array.isArray(entry.wordOptions) || entry.wordOptions.length !== 5) return false;
    for (let i = 0; i < entry.wordOptions.length; i++) {
      if (typeof entry.wordOptions[i] !== 'string' || entry.wordOptions[i].trim() === '') return false;
    }
    return true;
  }

  async function loadGameData(dateStr) {
    let data;
    try {
      if (allGameData) {
        data = allGameData;
      } else {
        const resp = await fetch('wordsky.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        allGameData = data;
        calendarAvailableDates = Object.keys(data);
      }
    } catch (e) {
      showMessage('Could not load game data', 'error');
      const grid = document.getElementById('answer-grid');
      if (grid) {
        const btns = grid.querySelectorAll('.answer-btn');
        btns.forEach(function(b) { b.disabled = true; });
      }
      return null;
    }

    const entries = data[dateStr];
    if (!entries || !Array.isArray(entries)) {
      showMessage('No game available for today');
      const wordArea = document.getElementById('word-display-area');
      const grid = document.getElementById('answer-grid');
      if (wordArea) wordArea.style.display = 'none';
      if (grid) grid.style.display = 'none';
      return null;
    }

    const valid = entries.filter(validateWordEntry);
    if (valid.length < 5) {
      showMessage('No game available for today');
      const wordArea = document.getElementById('word-display-area');
      const grid = document.getElementById('answer-grid');
      if (wordArea) wordArea.style.display = 'none';
      if (grid) grid.style.display = 'none';
      return null;
    }

    return valid.slice(0, 5);
  }

  // ===== ANSWER SHUFFLER MODULE (Task 3.3) =====

  function shuffleAnswers(correctTranslation, wrongOptions) {
    const arr = [correctTranslation].concat(wrongOptions.slice());
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  // ===== SCORE TRACKER MODULE (Task 3.4) =====

  function getTotalScore(wordScores) {
    let sum = 0;
    for (let i = 0; i < wordScores.length; i++) {
      sum += wordScores[i];
    }
    return sum;
  }

  function getStarRating(wordScore) {
    let s = '';
    for (let i = 0; i < wordScore; i++) s += '⭐';
    for (let i = 0; i < 5 - wordScore; i++) s += '☆';
    return s;
  }

  function getStarRatingHTML(wordScore) {
    var html = '';
    for (var i = 0; i < wordScore; i++) html += '<svg class="icon icon-star filled"><use href="#ico-star-filled"/></svg>';
    for (var i = 0; i < 5 - wordScore; i++) html += '<svg class="icon icon-star empty"><use href="#ico-star-empty"/></svg>';
    return html;
  }

  function formatShareText(date, wordScores, words) {
    var mm = date.substring(4,6), dd = date.substring(6,8), yyyy = date.substring(0,4);
    let text = 'Wordsky ' + mm + '/' + dd + '/' + yyyy + '\n';
    var maxLen = 0;
    if (words) {
      for (let i = 0; i < words.length; i++) {
        if (words[i] && words[i].wordOfTheDay.length > maxLen) maxLen = words[i].wordOfTheDay.length;
      }
    }
    var padLen = maxLen + 1;
    for (let i = 0; i < wordScores.length; i++) {
      var w = '';
      if (words && words[i]) {
        w = words[i].wordOfTheDay;
        while (w.length < padLen) w += ' ';
      }
      var stars = '';
      for (let j = 0; j < wordScores[i]; j++) stars += '⭐';
      text += w + stars + '\n';
    }
    return text;
  }

  // ===== ANSWER SELECTION HANDLING (Task 5.2) =====

  function handleAnswerClick(e) {
    var btn = e.target;
    if (!btn.classList.contains('answer-btn') || btn.disabled) return;
    if (!currentWords || gameState.completed || isReviewMode) return;

    var selectedAnswer = btn.dataset.answer;
    var currentWord = currentWords[gameState.currentWordIndex];
    var correctAnswer = currentWord.translation;

    if (selectedAnswer === correctAnswer) {
      btn.classList.add('correct');
      soundCorrect();

      // Show translation after correct answer
      var transEl = document.getElementById('word-translation');
      if (transEl) {
        transEl.textContent = correctAnswer;
        transEl.classList.remove('hidden');
      }

      var allBtns = document.querySelectorAll('.answer-btn');
      for (var i = 0; i < allBtns.length; i++) {
        allBtns[i].disabled = true;
      }

      saveGameState(gameState);

      if (gameState.currentWordIndex >= 4) {
        gameState.completed = true;
        saveGameState(gameState);
        saveToHistory(gameState.date, gameState.wordScores, true);

        setTimeout(function() {
          soundGameComplete();
          showResults(gameState.wordScores, currentWords);
        }, 1000);
      } else {
        setTimeout(function() {
          gameState.currentWordIndex++;
          saveGameState(gameState);
          flipWord(function() {
            renderWord(currentWords[gameState.currentWordIndex], gameState.currentWordIndex, gameState.disabledOptions);
            updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
          });
          soundNewWord();
        }, 1000);
      }
    } else {
      btn.classList.add('wrong');
      btn.disabled = true;
      soundWrong();

      var idx = gameState.currentWordIndex;
      gameState.wordScores[idx] = Math.max(0, gameState.wordScores[idx] - 1);

      gameState.disabledOptions[idx].push(selectedAnswer);

      updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);

      saveGameState(gameState);
    }
  }

  function isRussianTTSAvailable() {
    if (!window.speechSynthesis) return false;
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang && voices[i].lang.indexOf('ru') === 0) return true;
    }
    return false;
  }

  function speakRussian(word) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'ru';
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang && voices[i].lang.indexOf('ru') === 0) {
        utter.voice = voices[i];
        break;
      }
    }
    speechSynthesis.speak(utter);
  }

  // ===== CALENDAR CONTROLLER MODULE (Task 7.1) =====

  var calendarMonth = null;
  var calendarAvailableDates = [];

  function buildCalendarMonth(year, month, availableDates) {
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);
    var daysInMonth = lastDay.getDate();

    var startDow = (firstDay.getDay() + 6) % 7;

    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var grid = [];

    for (var i = 0; i < startDow; i++) {
      grid.push({ day: 0, empty: true, disabled: false, hasData: false, played: false, isToday: false, dateStr: '' });
    }

    var history = loadHistory();

    for (var d = 1; d <= daysInMonth; d++) {
      var dateObj = new Date(year, month, d);
      dateObj.setHours(0, 0, 0, 0);
      var mm = String(month + 1).padStart(2, '0');
      var dd = String(d).padStart(2, '0');
      var dateStr = '' + year + mm + dd;

      var isFuture = dateObj.getTime() > today.getTime();
      var hasData = availableDates.indexOf(dateStr) !== -1;
      var played = !!(history[dateStr] && history[dateStr].completed);
      var isToday = dateObj.getTime() === today.getTime();

      grid.push({
        day: d,
        empty: false,
        disabled: isFuture,
        hasData: hasData,
        played: played,
        isToday: isToday,
        dateStr: dateStr
      });
    }

    return grid;
  }

  function showCalendar(currentMonthObj, gameHistory) {
    var overlay = document.getElementById('calendar-overlay');
    var grid = document.getElementById('calendar-grid');
    var label = document.getElementById('calendar-month-label');

    var year = currentMonthObj.year;
    var month = currentMonthObj.month;

    var monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];
    label.textContent = monthNames[month] + ' ' + year;

    var days = buildCalendarMonth(year, month, calendarAvailableDates);

    grid.innerHTML = '';
    for (var i = 0; i < days.length; i++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day';

      if (days[i].empty) {
        cell.classList.add('empty');
      } else {
        cell.textContent = days[i].day;

        if (days[i].disabled) {
          cell.classList.add('disabled');
        } else if (days[i].played) {
          cell.classList.add('played');
        } else if (days[i].hasData) {
          cell.classList.add('has-data');
        }

        if (days[i].isToday) {
          cell.classList.add('today');
        }

        if (!days[i].disabled && days[i].hasData) {
          cell.dataset.date = days[i].dateStr;
          cell.addEventListener('click', (function(dateStr) {
            return function() {
              hideCalendar();
              loadGameForDate(dateStr);
            };
          })(days[i].dateStr));
        }
      }

      grid.appendChild(cell);
    }

    soundModalOpen();
    overlay.classList.remove('hidden');
  }

  function hideCalendar() {
    var overlay = document.getElementById('calendar-overlay');
    soundModalClose();
    overlay.classList.add('hidden');
  }

  function openCalendar() {
    var now = new Date();
    calendarMonth = { year: now.getFullYear(), month: now.getMonth() };
    showCalendar(calendarMonth, loadHistory());
  }

  function calendarPrevMonth() {
    if (!calendarMonth) return;
    calendarMonth.month--;
    if (calendarMonth.month < 0) {
      calendarMonth.month = 11;
      calendarMonth.year--;
    }
    showCalendar(calendarMonth, loadHistory());
  }

  function calendarNextMonth() {
    if (!calendarMonth) return;
    calendarMonth.month++;
    if (calendarMonth.month > 11) {
      calendarMonth.month = 0;
      calendarMonth.year++;
    }
    showCalendar(calendarMonth, loadHistory());
  }

  // ===== PAST GAME REVIEW MODE (Task 7.2) =====

  var reviewWordIndex = 0;

  function loadGameForDate(dateStr) {
    isReviewMode = false;
    reviewWordIndex = 0;
    hideResults();
    hideReviewNav();

    var wordArea = document.getElementById('word-display-area');
    var gridEl = document.getElementById('answer-grid');
    if (wordArea) wordArea.style.display = '';
    if (gridEl) gridEl.style.display = '';
    hideMessage();

    if (allGameData) {
      if (!allGameData[dateStr]) {
        showMessage('No game available for this date');
        return;
      }
      var cachedEntries = allGameData[dateStr].filter(validateWordEntry);
      if (cachedEntries.length < 5) {
        showMessage('No game available for this date');
        return;
      }
      setupGameForDate(dateStr, cachedEntries.slice(0, 5));
    } else {
      fetch('wordsky.json')
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
          allGameData = data;
          calendarAvailableDates = Object.keys(data);
          if (!data[dateStr]) {
            showMessage('No game available for this date');
            return;
          }
          var entries = data[dateStr].filter(validateWordEntry);
          if (entries.length < 5) {
            showMessage('No game available for this date');
            return;
          }
          setupGameForDate(dateStr, entries.slice(0, 5));
        })
        .catch(function() {
          showMessage('Could not load game data', 'error');
        });
    }
  }

  function setupGameForDate(dateStr, words) {
    currentWords = words;

    updateDateDisplay(dateStr);

    var saved = loadGameState(dateStr);
    if (saved && saved.completed) {
      gameState = saved;
      isReviewMode = true;
      reviewWordIndex = 0;
      renderReviewWord(reviewWordIndex);
      updateTopBar(getTotalScore(gameState.wordScores), reviewWordIndex, 5);
      showReviewNav();
    } else if (saved) {
      gameState = saved;
      isReviewMode = false;
      hideReviewNav();
      renderWord(currentWords[gameState.currentWordIndex], gameState.currentWordIndex, gameState.disabledOptions);
      updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
    } else {
      gameState = {
        date: dateStr,
        currentWordIndex: 0,
        wordScores: [5, 5, 5, 5, 5],
        disabledOptions: [[], [], [], [], []],
        completed: false
      };
      isReviewMode = false;
      hideReviewNav();
      saveGameState(gameState);
      renderWord(currentWords[0], 0, gameState.disabledOptions);
      updateTopBar(getTotalScore(gameState.wordScores), 0, 5);
      soundNewWord();
    }
  }

  function renderReviewWord(index) {
    if (!currentWords || !currentWords[index]) return;
    var wordEntry = currentWords[index];

    var russianEl = document.getElementById('russian-word');
    russianEl.textContent = wordEntry.wordOfTheDay;

    var transEl = document.getElementById('word-translation');

      transEl.classList.remove('hidden');
    }

    var shuffled = shuffleAnswers(wordEntry.translation, wordEntry.wordOptions);
    var buttons = document.querySelectorAll('.answer-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].textContent = shuffled[i];
      buttons[i].dataset.answer = shuffled[i];
      buttons[i].disabled = true;
      buttons[i].className = 'answer-btn';

      if (shuffled[i] === wordEntry.translation) {
        buttons[i].classList.add('correct');
      }
    }

    var reviewScoreEl = document.getElementById('review-score');
    if (reviewScoreEl) {
      reviewScoreEl.innerHTML = getStarRatingHTML(gameState.wordScores[index]);
    }

    var prevBtn = document.getElementById('review-prev');
    var nextBtn = document.getElementById('review-next');
    if (prevBtn) prevBtn.disabled = (index <= 0);
    if (nextBtn) nextBtn.disabled = (index >= 4);
  }

  function showReviewNav() {
    var nav = document.getElementById('review-nav');
    if (nav) nav.classList.remove('hidden');
  }

  function hideReviewNav() {
    var nav = document.getElementById('review-nav');
    if (nav) nav.classList.add('hidden');
  }

  function reviewPrev() {
    if (reviewWordIndex > 0) {
      reviewWordIndex--;
      flipWord(function() {
        renderReviewWord(reviewWordIndex);
        updateTopBar(getTotalScore(gameState.wordScores), reviewWordIndex, 5);
      });
    }
  }

  function reviewNext() {
    if (reviewWordIndex < 4) {
      reviewWordIndex++;
      flipWord(function() {
        renderReviewWord(reviewWordIndex);
        updateTopBar(getTotalScore(gameState.wordScores), reviewWordIndex, 5);
      });
    }
  }

  // ===== SHARE MANAGER MODULE (Task 8.1) =====

  function copyResultsToClipboard() {
    var text = formatShareText(gameState.date, gameState.wordScores, currentWords);
    var confirmEl = document.getElementById('copy-confirm');

    function showConfirm(msg) {
      if (confirmEl) {
        confirmEl.textContent = msg;
        setTimeout(function() { confirmEl.textContent = ''; }, 2000);
      }
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showConfirm('Copied!');
      }).catch(function() {
        fallbackCopy(text, showConfirm);
      });
    } else {
      fallbackCopy(text, showConfirm);
    }
  }

  function fallbackCopy(text, showConfirm) {
    try {
      var textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(textarea);
      if (ok) {
        showConfirm('Copied!');
      } else {
        showConfirm('Copy not supported');
      }
    } catch (e) {
      showConfirm('Copy not supported');
    }
  }

  function shareOnTwitter() {
    var text = formatShareText(gameState.date, gameState.wordScores, currentWords);
    var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
    window.open(url, '_blank', 'noopener');
  }

  function shareOnFacebook() {
    var text = formatShareText(gameState.date, gameState.wordScores, currentWords);
    var url = 'https://www.facebook.com/sharer/sharer.php?quote=' + encodeURIComponent(text);
    window.open(url, '_blank', 'noopener');
  }

  function shareOnPatreon() {
    var url = 'https://www.patreon.com/posts/new';
    window.open(url, '_blank', 'noopener');
  }

  // ===== ENHANCED INIT: Load allGameData for calendar =====

  async function loadAllGameDataForCalendar() {
    if (allGameData) return;
    try {
      var resp = await fetch('wordsky.json');
      if (!resp.ok) return;
      allGameData = await resp.json();
      calendarAvailableDates = Object.keys(allGameData);
    } catch (e) {
      console.warn('Could not preload game data for calendar:', e);
    }
  }

  // ===== EVENT WIRING =====

  document.addEventListener('DOMContentLoaded', function() {
    var grid = document.getElementById('answer-grid');
    grid.addEventListener('click', handleAnswerClick);

    initTTS();

    var calBtn = document.getElementById('calendar-btn');
    if (calBtn) calBtn.addEventListener('click', openCalendar);

    var calCloseBtn = document.getElementById('calendar-close-btn');
    if (calCloseBtn) calCloseBtn.addEventListener('click', hideCalendar);

    var calPrev = document.getElementById('cal-prev');
    if (calPrev) calPrev.addEventListener('click', calendarPrevMonth);

    var calNext = document.getElementById('cal-next');
    if (calNext) calNext.addEventListener('click', calendarNextMonth);

    var reviewPrevBtn = document.getElementById('review-prev');
    if (reviewPrevBtn) reviewPrevBtn.addEventListener('click', reviewPrev);

    var reviewNextBtn = document.getElementById('review-next');
    if (reviewNextBtn) reviewNextBtn.addEventListener('click', reviewNext);

    var reviewScoreEl = document.getElementById('review-score');
    if (reviewScoreEl) reviewScoreEl.addEventListener('click', function() {
      if (isReviewMode && currentWords) showResults(gameState.wordScores, currentWords);
    });

    var copyBtn = document.getElementById('copy-results-btn');
    if (copyBtn) copyBtn.addEventListener('click', copyResultsToClipboard);

    var resultsCloseBtn = document.getElementById('results-close-btn');
    if (resultsCloseBtn) resultsCloseBtn.addEventListener('click', hideResults);

    var twitterBtn = document.getElementById('share-twitter');
    if (twitterBtn) {
      twitterBtn.addEventListener('click', function(e) {
        e.preventDefault();
        shareOnTwitter();
      });
    }

    var facebookBtn = document.getElementById('share-facebook');
    if (facebookBtn) {
      facebookBtn.addEventListener('click', function(e) {
        e.preventDefault();
        shareOnFacebook();
      });
    }

    var patreonBtn = document.getElementById('share-patreon');
    if (patreonBtn) {
      patreonBtn.addEventListener('click', function(e) {
        e.preventDefault();
        shareOnPatreon();
      });
    }

    // ===== SWIPE GESTURE SUPPORT =====
    var touchStartX = 0;
    var touchStartY = 0;
    var touchStartTime = 0;
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });
    document.addEventListener('touchend', function(e) {
      if (!isReviewMode) return;
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = e.changedTouches[0].clientY - touchStartY;
      var dt = Date.now() - touchStartTime;
      if (dt > 800 || Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
      if (dx < 0) {
        reviewNext();
      } else {
        reviewPrev();
      }
    }, { passive: true });

    initGame().then(function() {
      loadAllGameDataForCalendar();
    });
  });
</script>
