<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snakesky — Russian Word Snake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  overflow:hidden;
  touch-action:manipulation;
}
body{
  background:#0e0e1a;
  color:#f5e6c8;
  font-family:'Roboto Condensed',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
body::before{
  content:'';
  position:fixed;
  top:50%;left:50%;
  width:200vmax;height:200vmax;
  transform:translate(-50%,-50%);
  z-index:-1;
  background:repeating-conic-gradient(from 0deg,#8b2020 0deg 10deg,#a33a3a 10deg 20deg);
  opacity:0.35;
}

/* TOP BAR */
#top-bar{
  width:100%;max-width:600px;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;
  border-bottom:1px solid rgba(200,168,48,0.2);
  flex-shrink:0;
}
#game-title{
  font-size:18px;font-weight:700;color:#c8a830;
  letter-spacing:1px;
}
#score-display{
  font-size:16px;font-weight:700;color:#c8a830;
}

/* WORD DISPLAY */
#word-area{
  width:100%;max-width:600px;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 16px 4px;
  flex-shrink:0;
}
#word-letters{
  font-size:clamp(24px,7vw,40px);
  font-weight:700;
  letter-spacing:4px;
  min-height:44px;
  display:flex;align-items:center;gap:2px;
}
#word-letters .letter{
  display:inline-block;
  transition:all 0.3s;
}
#word-letters .letter.eaten{
  color:#5a8a3a;
  text-shadow:0 0 8px rgba(90,138,58,0.5);
}
#word-letters .letter.next{
  color:#c8a830;
  text-shadow:0 0 12px rgba(200,168,48,0.6);
  animation:pulse 1s ease-in-out infinite;
}
#word-letters .letter.pending{
  color:#4a4a7e;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15)}
}
#word-translation{
  font-size:14px;color:#6a9ec0;
  margin-top:2px;min-height:20px;
}

/* GRID */
#grid-container{
  flex:1 1 0;
  width:100%;max-width:600px;
  display:flex;align-items:center;justify-content:center;
  padding:4px;
  min-height:0;
  overflow:hidden;
}
#game-grid{
  display:grid;
  gap:1px;
  background:rgba(200,168,48,0.08);
  border:1px solid rgba(200,168,48,0.15);
  border-radius:4px;
}
.cell{
  background:rgba(14,14,26,0.9);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  font-size:12px;
  border-radius:2px;
  transition:background 0.1s;
}
.cell.snake-head{
  background:#c8a830;
  border-radius:4px;
  box-shadow:0 0 8px rgba(200,168,48,0.5);
}
.cell.snake-body{
  background:rgba(245,230,200,0.6);
  border-radius:3px;
}
.cell.letter-dot{
  color:#6a6a8a;
  font-size:clamp(15px,3.75vw,24px);
  background:rgba(74,74,126,0.15);
}
.cell.letter-dot.next-letter{
  color:#c8a830;
  background:rgba(200,168,48,0.12);
  text-shadow:0 0 6px rgba(200,168,48,0.4);
  animation:cellPulse 1.2s ease-in-out infinite;
}
@keyframes cellPulse{
  0%,100%{box-shadow:none}
  50%{box-shadow:inset 0 0 8px rgba(200,168,48,0.3)}
}

/* CONTROLS */
#controls{
  width:100%;max-width:600px;
  display:flex;gap:12px;
  padding:8px 16px 12px;
  flex-shrink:0;
}
.ctrl-btn{
  flex:1;
  min-height:64px;
  font-size:28px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  border-radius:12px;
  color:#f5e6c8;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active{
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
  border-color:#c8a830;
  transform:scale(0.96);
  box-shadow:0 0 16px rgba(200,168,48,0.3);
}

/* START SCREEN — transparent overlay so board is visible */
#start-screen{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:transparent;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:50;
  pointer-events:none;
}
#start-screen.hidden{display:none}
#start-inner{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  pointer-events:auto;
  background:rgba(14,14,26,0.88);
  border:1px solid rgba(200,168,48,0.2);
  border-radius:16px;
  padding:16px 28px;
  backdrop-filter:blur(6px);
}
#start-btn{
  padding:18px 56px;font-size:26px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:linear-gradient(180deg,#3a5a2a 0%,#2a4a1a 100%);
  border:2px solid #5a8a3a;border-radius:12px;
  color:#f5e6c8;cursor:pointer;
  transition:all 0.25s;
  box-shadow:0 4px 16px rgba(90,138,58,0.3);
}
#start-btn:hover{
  background:linear-gradient(180deg,#4a6a3a 0%,#3a5a2a 100%);
  border-color:#8aba5a;transform:translateY(-2px);
}
#start-title{
  font-size:28px;font-weight:700;color:#c8a830;
  text-shadow:0 0 20px rgba(200,168,48,0.3);
}

/* DIFFICULTY TOGGLE */
#difficulty-toggle{
  display:flex;gap:0;border-radius:8px;overflow:hidden;
  border:2px solid #4a4a7e;
}
.diff-btn{
  padding:8px 14px;font-size:13px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:none;color:#6a6a8a;cursor:pointer;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:5px;
}
.diff-btn.active{
  background:linear-gradient(180deg,#3a5a2a 0%,#2a4a1a 100%);
  color:#f5e6c8;
}
.diff-btn:not(:last-child){
  border-right:1px solid #4a4a7e;
}
.diff-btn .diff-icon{width:16px;height:16px;flex-shrink:0}

/* DEATH MEDALLION */
#death-medallion{
  width:72px;height:72px;
  transform:rotate(-12deg);
  filter:drop-shadow(0 0 12px rgba(200,168,48,0.4));
  margin-bottom:-4px;
}

/* DEATH MODAL */
#death-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.22);
  display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);padding:20px;
}
#death-overlay.hidden{display:none}
#death-popup{
  width:100%;max-width:380px;
  background:rgba(30,30,50,0.95);
  border:1px solid #3a3a5a;border-radius:12px;
  padding:24px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
#death-popup h2{
  font-size:22px;font-weight:700;color:#c8a830;
}
</style>

<script>
// ===== SEED ENGINE (mulberry32) =====
function SeedEngine(seed) {
  this._state = seed | 0;
}
SeedEngine.prototype.next = function() {
  this._state |= 0;
  this._state = this._state + 0x6D2B79F5 | 0;
  var t = Math.imul(this._state ^ this._state >>> 15, 1 | this._state);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
};
SeedEngine.prototype.nextInt = function(max) {
  return Math.floor(this.next() * max);
};
SeedEngine.prototype.shuffle = function(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = this.nextInt(i + 1);
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
};

// ===== DIRECTION & TURN LOGIC =====
var DIR = { UP:0, RIGHT:1, DOWN:2, LEFT:3 };
var DX = [0, 1, 0, -1];
var DY = [-1, 0, 1, 0];

function resolveTurn(heading, turn) {
  if (turn === 'LEFT') return (heading + 3) % 4;
  if (turn === 'RIGHT') return (heading + 1) % 4;
  return heading;
}

// ===== DICTIONARY VALIDATION =====
function isValidEntry(e) {
  if (!e || typeof e !== 'object') return false;
  if (typeof e.word !== 'string' || typeof e.translation !== 'string') return false;
  if (e.translation.trim() === '') return false;
  var w = e.word.trim();
  if (w.length < 4 || w.length > 8) return false;
  return /^[а-яёА-ЯЁ]+$/.test(w);
}

function validateDictionary(entries) {
  if (!Array.isArray(entries)) throw new Error('Invalid dictionary format');
  var valid = entries.filter(isValidEntry);
  if (valid.length < 50) throw new Error('Dictionary has fewer than 50 valid entries');
  return valid;
}

// ===== UTILITY FUNCTIONS =====
function formatTime(ms) {
  var totalSec = Math.floor(ms / 1000);
  var m = Math.floor(totalSec / 60);
  var s = totalSec % 60;
  return m + 'm ' + s + 's';
}

function buildChallengeUrl(seed) {
  var url = new URL(window.location.href.split('?')[0]);
  url.searchParams.set('seed', seed);
  return url.toString();
}

function generateShareText(stats) {
  var stars = '';
  for (var i = 0; i < stats.wordsCompleted; i++) stars += '🐍';
  if (stats.wordsCompleted === 0) stars = '💀';
  var diffLabel = DIFF_LABELS[stats.difficulty] || stats.difficulty;
  return 'Snakesky (' + diffLabel + ') ' + stars + '\n' +
    'Words: ' + stats.wordsCompleted + ' | Score: ' + stats.score + '\n' +
    'Time: ' + formatTime(stats.survivalTime) + '\n' +
    'Can you beat me? ' + buildChallengeUrl(stats.seed);
}

// ===== AUDIO ENGINE =====
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function ensureAudio() {
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
document.addEventListener('touchstart', ensureAudio, true);
document.addEventListener('click', ensureAudio, true);

function playTone(freq, dur, type, vol, delay) {
  var ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  var o = ctx.createOscillator();
  var g = ctx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  delay = delay || 0;
  vol = vol || 0.1;
  g.gain.setValueAtTime(0.001, ctx.currentTime + delay);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + delay);
  o.stop(ctx.currentTime + delay + dur);
}
function soundEat() {
  playTone(523, 0.15, 'sine', 0.1);
  playTone(659, 0.15, 'sine', 0.1, 0.06);
}
function soundWordComplete() {
  playTone(523, 0.15, 'sine', 0.1);
  playTone(659, 0.15, 'sine', 0.1, 0.1);
  playTone(784, 0.2, 'sine', 0.12, 0.2);
  playTone(1047, 0.3, 'sine', 0.1, 0.3);
}
function soundDeath() {
  playTone(330, 0.25, 'sawtooth', 0.07);
  playTone(220, 0.35, 'square', 0.05, 0.1);
}
</script>

<script>
// ===== GAME STATE =====
var GRID_SIZE = 15;
var DIFFICULTY = 'medium'; // easy, medium, hardcore
var TICK_SPEEDS = { easy: 275, medium: 220, hard: 220, extreme: 220 };
var DIFF_LABELS = { easy: 'Easy 🟢', medium: 'Medium 🟡', hard: 'Hard 🟠', extreme: 'Extreme 🔴' };
var state = null;
var dictionary = [];
var loopId = null;
var gridCells = [];

function initGameState(seed, dict, gridSize) {
  var rng = new SeedEngine(seed);
  var queue = rng.shuffle(dict);
  var cx = Math.floor(gridSize / 2);
  var cy = Math.floor(gridSize / 2);
  var s = {
    snake: [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}],
    heading: DIR.RIGHT,
    pendingTurn: null,
    gridSize: gridSize,
    currentWord: null,
    letterProgress: 0,
    letterDots: [],
    score: 0,
    wordsCompleted: 0,
    completedWords: [],
    startTime: Date.now(),
    isRunning: true,
    seed: seed,
    rng: rng,
    wordQueue: queue,
    wordQueueIndex: 0,
    growing: 0,
    difficulty: DIFFICULTY
  };
  loadNextWord(s);
  return s;
}

function loadNextWord(s) {
  if (s.wordQueueIndex >= s.wordQueue.length) {
    s.wordQueue = s.rng.shuffle(s.wordQueue);
    s.wordQueueIndex = 0;
  }
  s.currentWord = s.wordQueue[s.wordQueueIndex++];
  s.letterProgress = 0;
  placeWord(s);
}

function placeWord(s) {
  s.letterDots = [];
  var occupied = new Set();
  for (var i = 0; i < s.snake.length; i++) {
    occupied.add(s.snake[i].x + ',' + s.snake[i].y);
  }
  var letters = s.currentWord.word.split('');
  for (var i = 0; i < letters.length; i++) {
    var attempts = 0;
    var x, y;
    do {
      x = s.rng.nextInt(s.gridSize);
      y = s.rng.nextInt(s.gridSize);
      attempts++;
      if (attempts > 500) break;
    } while (occupied.has(x + ',' + y));
    occupied.add(x + ',' + y);
    s.letterDots.push({x:x, y:y, letter:letters[i], index:i});
  }
}

// ===== COLLISION DETECTION =====
function checkCollision(s, head) {
  // Wall
  if (head.x < 0 || head.x >= s.gridSize || head.y < 0 || head.y >= s.gridSize) {
    return 'wall';
  }
  // Self (check all but last segment if not growing)
  var bodyLen = s.growing > 0 ? s.snake.length : s.snake.length - 1;
  for (var i = 0; i < bodyLen; i++) {
    if (s.snake[i].x === head.x && s.snake[i].y === head.y) return 'self';
  }
  // Wrong letter
  for (var i = 0; i < s.letterDots.length; i++) {
    var dot = s.letterDots[i];
    if (dot.x === head.x && dot.y === head.y) {
      if (dot.index !== s.letterProgress) return 'wrong_letter';
    }
  }
  return null;
}

// ===== TICK =====
function tick() {
  if (!state || !state.isRunning) return;

  // Apply pending turn
  if (state.pendingTurn !== null) {
    state.heading = resolveTurn(state.heading, state.pendingTurn);
    state.pendingTurn = null;
  }

  var head = state.snake[0];
  var newHead = { x: head.x + DX[state.heading], y: head.y + DY[state.heading] };

  // Check collision
  var collision = checkCollision(state, newHead);
  if (collision) {
    gameOver();
    return;
  }

  // Move snake
  state.snake.unshift(newHead);
  if (state.growing > 0) {
    state.growing--;
  } else {
    state.snake.pop();
  }

  // Check letter consumption
  for (var i = state.letterDots.length - 1; i >= 0; i--) {
    var dot = state.letterDots[i];
    if (dot.x === newHead.x && dot.y === newHead.y && dot.index === state.letterProgress) {
      state.letterDots.splice(i, 1);
      state.letterProgress++;
      state.growing++;
      
      if (state.letterProgress >= state.currentWord.word.length) {
        // Word completed
        state.wordsCompleted++;
        state.score += state.currentWord.word.length * 10;
        state.completedWords.push(state.currentWord);
        soundWordComplete();
        loadNextWord(state);
      } else {
        soundEat();
      }
      break;
    }
  }

  render();
}

// ===== GAME OVER =====
function gameOver() {
  state.isRunning = false;
  if (loopId) { clearInterval(loopId); loopId = null; }
  soundDeath();
  render();
  showDeathModal();
}

// ===== RENDERER =====
function initGrid(n) {
  var grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  gridCells = [];
  grid.style.gridTemplateColumns = 'repeat(' + n + ', 1fr)';
  grid.style.gridTemplateRows = 'repeat(' + n + ', 1fr)';
  for (var y = 0; y < n; y++) {
    for (var x = 0; x < n; x++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
      gridCells.push(cell);
    }
  }
  resizeGrid();
}

function resizeGrid() {
  var container = document.getElementById('grid-container');
  var w = container.clientWidth - 8;
  var h = container.clientHeight - 8;
  var size = Math.min(w, h);
  var grid = document.getElementById('game-grid');
  grid.style.width = size + 'px';
  grid.style.height = size + 'px';
}

function render() {
  if (!state) return;
  var n = state.gridSize;

  // Clear all cells
  for (var i = 0; i < gridCells.length; i++) {
    gridCells[i].className = 'cell';
    gridCells[i].textContent = '';
  }

  // Draw letter dots
  for (var i = 0; i < state.letterDots.length; i++) {
    var dot = state.letterDots[i];
    var idx = dot.y * n + dot.x;
    if (idx >= 0 && idx < gridCells.length) {
      gridCells[idx].textContent = dot.letter;
      if (state.difficulty === 'extreme' || state.difficulty === 'hard') {
        gridCells[idx].className = 'cell letter-dot';
      } else {
        gridCells[idx].className = dot.index === state.letterProgress ? 'cell letter-dot next-letter' : 'cell letter-dot';
      }
    }
  }

  // Draw snake body (tail first so head overwrites)
  for (var i = state.snake.length - 1; i >= 1; i--) {
    var seg = state.snake[i];
    var idx = seg.y * n + seg.x;
    if (idx >= 0 && idx < gridCells.length) {
      gridCells[idx].className = 'cell snake-body';
      gridCells[idx].textContent = '';
    }
  }

  // Draw snake head
  var head = state.snake[0];
  var hIdx = head.y * n + head.x;
  if (hIdx >= 0 && hIdx < gridCells.length) {
    gridCells[hIdx].className = 'cell snake-head';
    gridCells[hIdx].textContent = '';
  }

  // Update word display
  updateWordDisplay();
  // Update score
  document.getElementById('score-display').textContent = '⭐ ' + state.score;
}

function updateWordDisplay() {
  var wl = document.getElementById('word-letters');
  var wt = document.getElementById('word-translation');
  if (!state || !state.currentWord) { wl.innerHTML = ''; wt.textContent = ''; return; }

  var html = '';
  var letters = state.currentWord.word.split('');
  var isHardMode = state.difficulty === 'extreme' || state.difficulty === 'hard';
  for (var i = 0; i < letters.length; i++) {
    var cls = 'letter ';
    var ch;
    if (i < state.letterProgress) {
      cls += 'eaten';
      ch = letters[i];
    } else if (isHardMode) {
      cls += 'pending';
      ch = '?';
    } else if (i === state.letterProgress) {
      cls += 'next';
      ch = letters[i];
    } else {
      cls += 'pending';
      ch = letters[i];
    }
    html += '<span class="' + cls + '">' + ch + '</span>';
  }
  wl.innerHTML = html;
  wt.textContent = state.difficulty === 'extreme' ? '' : state.currentWord.translation;
}

// ===== INPUT HANDLER =====
function applyTurn(turn) {
  if (!state || !state.isRunning) return;
  if (state.pendingTurn === null) {
    state.pendingTurn = turn;
  }
}

document.getElementById('btn-left').addEventListener('touchstart', function(e) { e.preventDefault(); applyTurn('LEFT'); });
document.getElementById('btn-left').addEventListener('click', function() { applyTurn('LEFT'); });
document.getElementById('btn-right').addEventListener('touchstart', function(e) { e.preventDefault(); applyTurn('RIGHT'); });
document.getElementById('btn-right').addEventListener('click', function() { applyTurn('RIGHT'); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') { e.preventDefault(); applyTurn('LEFT'); }
  if (e.key === 'ArrowRight') { e.preventDefault(); applyTurn('RIGHT'); }
});

// ===== DEATH MODAL =====
function showDeathModal() {
  var overlay = document.getElementById('death-overlay');
  var statsDiv = document.getElementById('death-stats');
  var wordsDiv = document.getElementById('death-words');
  var elapsed = Date.now() - state.startTime;

  // Set medallion icon
  var medallion = document.getElementById('death-medallion');
  var icoMap = { easy:'#ico-easy', medium:'#ico-medium', hard:'#ico-hard', extreme:'#ico-extreme' };
  medallion.querySelector('use').setAttribute('href', icoMap[state.difficulty] || '#ico-medium');

  statsDiv.innerHTML =
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Difficulty</span><span style="color:#f5e6c8;font-weight:700">' + DIFF_LABELS[state.difficulty] + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Words</span><span style="color:#f5e6c8;font-weight:700">' + state.wordsCompleted + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Score</span><span style="color:#c8a830;font-weight:700">' + state.score + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Time</span><span style="color:#f5e6c8;font-weight:700">' + formatTime(elapsed) + '</span></div>';

  wordsDiv.innerHTML = '';
  for (var i = 0; i < state.completedWords.length; i++) {
    var w = state.completedWords[i];
    wordsDiv.innerHTML += '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(58,58,94,0.2)"><span style="color:#f5e6c8;font-weight:700">' + w.word + '</span><span style="color:#6a9ec0;font-size:12px">' + w.translation + '</span></div>';
  }
  if (state.completedWords.length === 0) {
    wordsDiv.innerHTML = '<div style="color:#6a6a8a;text-align:center">No words completed</div>';
  }

  overlay.classList.remove('hidden');
}

function hideDeathModal() {
  document.getElementById('death-overlay').classList.add('hidden');
}

document.getElementById('btn-play-again').addEventListener('click', function() {
  hideDeathModal();
  // Show start screen again so user can pick difficulty
  document.getElementById('start-screen').classList.remove('hidden');
});

document.getElementById('btn-challenge').addEventListener('click', function() {
  var url = buildChallengeUrl(state.seed);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      alert('Challenge link copied!');
    });
  } else {
    prompt('Copy this challenge link:', url);
  }
});

document.getElementById('btn-share').addEventListener('click', function() {
  var elapsed = Date.now() - state.startTime;
  var stats = {
    wordsCompleted: state.wordsCompleted,
    score: state.score,
    survivalTime: elapsed,
    seed: state.seed,
    difficulty: state.difficulty
  };
  var text = generateShareText(stats);
  if (navigator.share) {
    navigator.share({ text: text }).catch(function(){});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      alert('Results copied to clipboard!');
    });
  } else {
    prompt('Copy your results:', text);
  }
});

// ===== GAME START =====
function startGame(seed) {
  if (loopId) { clearInterval(loopId); loopId = null; }
  var tickMs = TICK_SPEEDS[DIFFICULTY] || 220;
  state = initGameState(seed, dictionary, GRID_SIZE);
  initGrid(GRID_SIZE);
  render();
  loopId = setInterval(tick, tickMs);
}

// ===== DICTIONARY LOADER & INIT =====
async function init() {
  // Parse seed from URL
  var params = new URLSearchParams(window.location.search);
  var seedParam = params.get('seed');
  var seed = seedParam ? parseInt(seedParam, 10) : null;
  if (seed === null || isNaN(seed)) seed = Date.now();

  // Load dictionary
  try {
    var resp = await fetch('snake-words.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    dictionary = validateDictionary(data);
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Could not load dictionary: ' + e.message;
    document.getElementById('start-screen').classList.add('hidden');
    return;
  }

  // Init a preview board so user can see the grid behind start screen
  var previewRng = new SeedEngine(seed);
  var previewQueue = previewRng.shuffle(dictionary);
  state = initGameState(seed, dictionary, GRID_SIZE);
  initGrid(GRID_SIZE);
  render();
  state = null; // clear state so controls don't work yet

  // Difficulty toggle
  var diffBtns = document.querySelectorAll('.diff-btn');
  diffBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      diffBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      DIFFICULTY = btn.getAttribute('data-diff');
    });
  });

  // Show start screen
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('start-screen').classList.add('hidden');
    // Always use a fresh seed unless this is the first load with a URL seed
    if (state !== null) seed = Date.now();
    startGame(seed);
  });
}

window.addEventListener('resize', resizeGrid);
init();
</script>
