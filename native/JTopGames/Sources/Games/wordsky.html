<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordsky — Daily Russian Word Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0e0e1a;
  color:#f5e6c8;
  font-family:'Roboto Condensed',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

/* Soviet propaganda sunburst background */
body::before{
  content:'';
  position:fixed;
  top:50%;
  left:50%;
  width:200vmax;
  height:200vmax;
  transform:translate(-50%,-50%);
  z-index:-1;
  background:repeating-conic-gradient(
    from 0deg,
    #8b2020 0deg 10deg,
    #a33a3a 10deg 20deg
  );
  opacity:0.35;
}

/* ===== BANNER ===== */
#banner{
  width:100%;
  max-width:600px;
  display:block;
}

/* ===== ICON CLASSES ===== */
.icon{display:inline-block;vertical-align:middle;fill:currentColor}
.icon-sm{width:16px;height:16px}
.icon-md{width:20px;height:20px}
.icon-lg{width:24px;height:24px}
.icon-star{width:18px;height:18px}
.icon-star.filled{fill:#c8a830}
.icon-star.empty{fill:none;stroke:#6a6a8a;stroke-width:1.5px}

/* ===== TOP BAR ===== */
#top-bar{
  width:100%;
  max-width:600px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:12px 16px;
  font-size:14px;
  color:#c8a830;
  border-bottom:1px solid rgba(200,168,48,0.2);
}

#date-row .score-display{
  font-weight:700;
  font-size:16px;
  color:#c8a830;
}
#date-row .score-display.hidden{display:none}

#calendar-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;
  padding:4px 10px;
  margin-left:8px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1;
}
#calendar-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}

#share-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1;
}
#share-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}
#share-btn.hidden{display:none}

/* ===== DATE DISPLAY ===== */
#date-row{
  width:100%;
  max-width:600px;
  display:flex;
  align-items:center;
  padding:8px 16px 0;
}
#date-display{
  flex:1;
  text-align:center;
  font-size:13px;
  color:#6a6a8a;
  letter-spacing:1px;
}
#game-clock{
  font-size:14px;
  font-weight:700;
  color:#c8a830;
  font-variant-numeric:tabular-nums;
  min-width:72px;
  text-align:right;
}
#game-clock.hidden{display:none}

/* ===== START SCREEN ===== */
#start-screen{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1 1 0;
  min-height:0;
  gap:20px;
}
#start-screen.hidden{display:none}

#start-btn{
  padding:16px 48px;
  font-size:22px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:linear-gradient(180deg,#3a5a2a 0%,#2a4a1a 100%);
  border:2px solid #5a8a3a;
  border-radius:12px;
  color:#f5e6c8;
  cursor:pointer;
  transition:all 0.25s;
  box-shadow:0 4px 16px rgba(90,138,58,0.3);
}
#start-btn:hover{
  background:linear-gradient(180deg,#4a6a3a 0%,#3a5a2a 100%);
  border-color:#8aba5a;
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(90,138,58,0.4);
}

#start-label{
  font-size:14px;
  color:#6a6a8a;
  text-align:center;
}

/* ===== WORD TRACKER ROW ===== */
#word-tracker{
  width:100%;
  max-width:600px;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px 16px 0;
}

.tracker-btn{
  flex:1;
  max-width:100px;
  min-height:52px;
  background:linear-gradient(180deg,#3a3a10 0%,#2a2a08 100%);
  border:2px solid #8a8a00;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:4px 4px;
  transition:all 0.25s;
  gap:1px;
}
.tracker-btn:hover{
  border-color:#c8a830;
  background:linear-gradient(180deg,#4a4a18 0%,#3a3a10 100%);
  transform:translateY(-1px);
}
.tracker-btn.active{
  border-color:#c8a830;
  box-shadow:0 0 10px rgba(200,168,48,0.3);
}
.tracker-btn.played{
  background:linear-gradient(180deg,#2a3a2a 0%,#1a2a1a 100%);
  border-color:#5a8a5a;
}
.tracker-btn:disabled{
  cursor:not-allowed;
  opacity:0.5;
}

.tracker-mystery{
  font-size:20px;
  color:#c8a830;
  font-weight:700;
  line-height:1;
}

.tracker-word{
  font-size:11px;
  font-weight:700;
  color:#f5e6c8;
  line-height:1.1;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:90px;
}

.tracker-translation{
  font-size:9px;
  color:#6a9ec0;
  line-height:1.1;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:90px;
}

.tracker-stars{
  display:flex;
  gap:0;
  line-height:1;
}
.tracker-stars .icon-star{
  width:10px;
  height:10px;
}

.tracker-time{
  font-size:9px;
  color:#6a6a8a;
  line-height:1.1;
}

/* ===== WORD DISPLAY ===== */
#word-display-area{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:12px 16px 8px;
  flex:1 1 0;
  min-height:0;
  perspective:800px;
  overflow:hidden;
}

#russian-word{
  font-size:clamp(40px,10vw,72px);
  font-weight:700;
  color:#f5e6c8;
  text-align:center;
  text-shadow:0 0 20px rgba(200,168,48,0.3);
  margin-bottom:4px;
}

#word-translation{
  font-size:clamp(14px,3vw,18px);
  color:#6a9ec0;
  text-align:center;
  margin-bottom:12px;
  min-height:22px;
  transition:opacity 0.3s;
}
#word-translation.hidden{opacity:0}

#word-stars{
  display:flex;
  align-items:center;
  gap:2px;
  min-height:20px;
  margin-bottom:8px;
}
#word-stars.hidden{display:none}
#word-stars .icon-star{width:20px;height:20px}

#tts-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:50%;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#c8a830;
  font-size:20px;
  transition:all 0.2s;
}
#tts-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}
#tts-btn.hidden{
  display:none;
}

/* ===== ANSWER GRID ===== */
#answer-grid{
  width:100%;
  max-width:600px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 16px 50px;
}

.answer-btn{
  padding:16px 12px;
  font-size:15px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  border-radius:8px;
  color:#f5e6c8;
  cursor:pointer;
  transition:all 0.25s;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  min-height:52px;
  word-wrap:break-word;
}
.answer-btn:hover:not(:disabled){
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
  border-color:#c8a830;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(200,168,48,0.2);
}
.answer-btn:disabled{
  cursor:not-allowed;
  opacity:0.5;
}
.answer-btn.correct{
  background:linear-gradient(180deg,#2a5a2a 0%,#1a3a1a 100%);
  border-color:#5a5;
  color:#8f8;
  box-shadow:0 0 20px rgba(85,170,85,0.3);
}
.answer-btn.wrong{
  background:linear-gradient(180deg,#5a2a2a 0%,#3a1a1a 100%);
  border-color:#c44;
  color:#f88;
  box-shadow:0 0 20px rgba(204,68,68,0.3);
  animation:wrongShake 0.4s ease;
}

@keyframes wrongShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

@keyframes coinFlip{
  0%{transform:rotateX(0deg)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0deg)}
}

#russian-word.coin-flip{
  animation:coinFlip 0.8s cubic-bezier(0.2,0.6,0.35,1);
}

/* ===== WORD LAUNCH ANIMATION ===== */

.word-ghost{
  position:fixed;
  pointer-events:none;
  z-index:200;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  color:#c8a830;
  text-shadow:0 0 20px rgba(200,168,48,0.6),0 0 40px rgba(200,168,48,0.3);
  white-space:nowrap;
  will-change:transform,opacity;
}

.launch-particle{
  position:fixed;
  pointer-events:none;
  z-index:199;
  border-radius:50%;
  will-change:transform,opacity;
}

.launch-trail{
  position:fixed;
  pointer-events:none;
  z-index:198;
  border-radius:50%;
  will-change:transform,opacity;
  filter:blur(2px);
}

@keyframes wordLand{
  0%{transform:scale(1.4);opacity:0.7;text-shadow:0 0 30px rgba(200,168,48,0.8),0 0 60px rgba(200,168,48,0.4)}
  50%{transform:scale(0.95);opacity:1;text-shadow:0 0 20px rgba(200,168,48,0.5)}
  70%{transform:scale(1.05);opacity:1}
  100%{transform:scale(1);opacity:1;text-shadow:0 0 20px rgba(200,168,48,0.3)}
}

#russian-word.word-landing{
  animation:wordLand 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes landingRing{
  0%{transform:translate(-50%,-50%) scale(0.3);opacity:0.8;border-width:3px}
  100%{transform:translate(-50%,-50%) scale(2.5);opacity:0;border-width:1px}
}

.landing-ring{
  position:fixed;
  pointer-events:none;
  z-index:197;
  border:3px solid rgba(200,168,48,0.5);
  border-radius:50%;
  width:60px;
  height:60px;
  will-change:transform,opacity;
  animation:landingRing 0.6s ease-out forwards;
}

@keyframes sparkBurst{
  0%{transform:translate(var(--sx),var(--sy)) scale(1);opacity:1}
  100%{transform:translate(var(--ex),var(--ey)) scale(0);opacity:0}
}

.spark{
  position:fixed;
  pointer-events:none;
  z-index:201;
  width:4px;
  height:4px;
  border-radius:50%;
  background:#c8a830;
  will-change:transform,opacity;
  animation:sparkBurst var(--dur) ease-out forwards;
}

/* ===== MESSAGE / ERROR AREA ===== */
#message-area{
  width:100%;
  max-width:600px;
  text-align:center;
  padding:8px 16px;
  font-size:14px;
  min-height:24px;
  color:#d4a853;
}
#message-area.error{color:#c44}
#message-area.success{color:#5a5}
#message-area.hidden{display:none}

/* ===== RESULTS POPUP OVERLAY ===== */
#results-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
  overflow-y:auto;
}
#results-overlay.hidden{display:none}

#results-popup{
  width:100%;
  max-width:420px;
  background:rgba(30,30,50,0.95);
  border:1px solid #3a3a5a;
  border-radius:12px;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
  position:relative;
}

#results-popup h2{
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;
  font-weight:700;
  color:#c8a830;
  text-align:center;
}

#results-close-btn{
  position:absolute;
  top:12px;
  right:14px;
  background:none;
  border:none;
  color:#6a6a8a;
  font-size:22px;
  cursor:pointer;
  padding:2px 6px;
  transition:color 0.2s;
}
#results-close-btn:hover{color:#f5e6c8}

#results-words{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.result-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid rgba(58,58,94,0.3);
  font-size:16px;
  gap:8px;
}
.result-row .result-word{
  color:#f5e6c8;
  font-weight:700;
  flex:1;
  min-width:0;
}
.result-row .result-stars{
  font-size:16px;
  letter-spacing:2px;
  flex-shrink:0;
  display:flex;
  align-items:center;
}

#results-total{
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;
  font-weight:700;
  color:#c8a830;
}

#results-actions{
  display:flex;
  flex-wrap:nowrap;
  gap:8px;
  justify-content:center;
  width:100%;
}

.results-btn{
  padding:10px 20px;
  font-size:14px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.share-btn{
  background:linear-gradient(180deg,#2e2e52 0%,#22223a 100%);
  border:2px solid #4a4a7e;
  color:#f5e6c8;
}
.share-btn:hover{
  border-color:#c8a830;
  background:linear-gradient(180deg,#3a3a6e 0%,#2e2e52 100%);
}

/* ===== CALENDAR OVERLAY ===== */
#calendar-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.94);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
}
#calendar-overlay.hidden{display:none}

#calendar-popup{
  width:100%;
  max-width:360px;
  background:rgba(30,30,50,0.95);
  border:1px solid #3a3a5a;
  border-radius:12px;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

#calendar-header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#calendar-header h3{
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;
  font-weight:700;
  color:#c8a830;
}

.cal-nav-btn{
  background:none;
  border:1px solid #4a4a7e;
  border-radius:6px;
  color:#c8a830;
  font-size:18px;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Roboto Condensed',sans-serif;
}
.cal-nav-btn:hover{
  border-color:#c8a830;
  background:rgba(200,168,48,0.1);
}

#calendar-close-btn{
  background:none;
  border:none;
  color:#6a6a8a;
  font-size:22px;
  cursor:pointer;
  padding:2px 6px;
  transition:color 0.2s;
}
#calendar-close-btn:hover{color:#f5e6c8}

#calendar-weekdays{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  text-align:center;
  font-size:12px;
  color:#6a6a8a;
  font-weight:700;
}

#calendar-grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.cal-day{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  border:2px solid transparent;
  color:#3a3a5a;
  font-weight:400;
}
.cal-day:hover:not(.disabled):not(.empty){
  border-color:#c8a830;
  background:rgba(200,168,48,0.08);
}
.cal-day.empty{cursor:default}
/* Non-playable / disabled / future */
.cal-day.disabled{
  color:#3a3a5a;
  cursor:not-allowed;
}
/* Playable but not started */
.cal-day.has-data{
  color:#5a5;
  font-weight:700;
}
/* Started but not finished */
.cal-day.partial{
  color:#8ab4f8;
  font-weight:700;
  background:rgba(100,140,220,0.25);
}
/* Finished / completed */
.cal-day.played{
  color:#5a5;
  font-weight:700;
  background:rgba(85,170,85,0.25);
}
/* Current date (today) — yellow border, other colors from above */
.cal-day.today{
  border:2px solid #c8a830;
}
/* Currently selected/loaded game date — circle */
.cal-day.selected{
  border:2px solid #f5e6c8;
  border-radius:50%;
  box-shadow:0 0 8px rgba(245,230,200,0.3);
}
/* Selected + today combo */
.cal-day.selected.today{
  border:2px solid #c8a830;
  border-radius:50%;
  box-shadow:0 0 8px rgba(200,168,48,0.4);
}

/* Calendar legend */
#calendar-legend{
  width:100%;
  display:flex;
  justify-content:center;
  gap:14px;
  padding:6px 0 2px;
  margin-top:4px;
  border-top:1px solid rgba(58,58,94,0.3);
}
.legend-item{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  color:#6a6a8a;
}
.legend-swatch{
  width:12px;
  height:12px;
  border-radius:3px;
  display:inline-block;
}
.legend-available{
  border:2px solid #5a5;
  background:transparent;
}
.legend-partial{
  background:rgba(100,140,220,0.25);
  border:1px solid rgba(138,180,248,0.4);
}
.legend-played{
  background:rgba(85,170,85,0.25);
  border:1px solid rgba(85,170,85,0.4);
}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  #top-bar{padding:8px 12px;font-size:13px}
  #russian-word{font-size:clamp(28px,8vw,44px)}
  .answer-btn{padding:10px 8px;font-size:13px;min-height:40px}
  #results-popup{padding:16px 14px}
  #results-popup h2{font-size:18px}
  .results-btn{padding:8px 14px;font-size:13px}
  #word-display-area{padding:8px 16px 4px}
  #date-row{padding:4px 10px 0}
  #word-tracker{gap:6px;padding:6px 10px 0}
  .tracker-btn{min-height:44px;padding:3px 2px}
  .tracker-word{font-size:10px;max-width:60px}
  .tracker-translation{font-size:8px;max-width:60px}
  .tracker-stars .icon-star{width:8px;height:8px}
}

@media(min-width:768px){
  #word-display-area{padding:24px 16px 16px}
  #russian-word{font-size:68px}
  .answer-btn{padding:18px 16px;font-size:16px}
}

@media(min-width:1024px){
  body{justify-content:flex-start;padding-top:20px}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // ===== SOUND ENGINE =====
  var audioCtx = null;
  var audioUnlocked = false;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function unlockAudio() {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume().catch(function(){});
    if (audioUnlocked) return;
    try {
      var b = ctx.createBuffer(1, 1, 22050);
      var s = ctx.createBufferSource();
      s.buffer = b; s.connect(ctx.destination); s.start(0);
      audioUnlocked = true;
    } catch(e) {}
  }
  ['touchstart','touchend','click','keydown'].forEach(function(evt) {
    document.addEventListener(evt, unlockAudio, true);
  });

  function playTone(freq, dur, type, vol, delay) {
    type = type || 'sine';
    vol = vol || 0.12;
    delay = delay || 0;
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume().catch(function(){});
    try {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.001, ctx.currentTime + delay);
      g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      o.connect(g).connect(ctx.destination);
      o.start(ctx.currentTime + delay);
      o.stop(ctx.currentTime + delay + dur);
    } catch(e) {}
  }

  function soundCorrect() {
    playTone(523, 0.2, 'sine', 0.12);
    playTone(659, 0.2, 'sine', 0.12, 0.08);
    playTone(784, 0.25, 'sine', 0.14, 0.16);
    playTone(1047, 0.35, 'sine', 0.1, 0.26);
  }

  function soundWrong() {
    playTone(330, 0.25, 'sawtooth', 0.07);
    playTone(311, 0.25, 'sawtooth', 0.07, 0.04);
    playTone(220, 0.35, 'square', 0.05, 0.12);
  }

  function soundNewWord() {
    playTone(880, 0.15, 'sine', 0.08);
    playTone(1100, 0.2, 'sine', 0.06, 0.1);
  }

  function soundModalOpen() {
    playTone(400, 0.15, 'sine', 0.06);
    playTone(600, 0.15, 'sine', 0.06, 0.06);
    playTone(800, 0.2, 'sine', 0.05, 0.12);
  }

  function soundModalClose() {
    playTone(600, 0.15, 'sine', 0.05);
    playTone(400, 0.2, 'sine', 0.04, 0.08);
  }

  function soundGameComplete() {
    playTone(523, 0.2, 'sine', 0.1);
    playTone(659, 0.2, 'sine', 0.1, 0.15);
    playTone(784, 0.2, 'sine', 0.1, 0.3);
    playTone(1047, 0.4, 'sine', 0.12, 0.45);
    playTone(784, 0.15, 'sine', 0.08, 0.7);
    playTone(1047, 0.5, 'sine', 0.14, 0.85);
  }

  // ===== HELPER FUNCTIONS =====

  function getTodayStr() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return yyyy + mm + dd;
  }

  function showMessage(text, type) {
    const el = document.getElementById('message-area');
    el.textContent = text;
    el.className = type || '';
    el.classList.remove('hidden');
  }

  function hideMessage() {
    const el = document.getElementById('message-area');
    el.textContent = '';
    el.classList.add('hidden');
    el.className = 'hidden';
  }

  function updateDateDisplay(dateStr) {
    var el = document.getElementById('date-display');
    if (!el) return;
    var y = parseInt(dateStr.substring(0, 4));
    var m = parseInt(dateStr.substring(4, 6)) - 1;
    var d = parseInt(dateStr.substring(6, 8));
    var date = new Date(y, m, d);
    var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    el.textContent = months[m] + ' ' + d + ', ' + y;
  }

  // ===== DATA LOADER MODULE (Task 3.1) =====

  function validateWordEntry(entry) {
    if (!entry || typeof entry !== 'object') return false;
    if (typeof entry.wordOfTheDay !== 'string' || entry.wordOfTheDay.trim() === '') return false;
    if (typeof entry.translation !== 'string' || entry.translation.trim() === '') return false;
    if (!Array.isArray(entry.wordOptions) || entry.wordOptions.length !== 5) return false;
    for (let i = 0; i < entry.wordOptions.length; i++) {
      if (typeof entry.wordOptions[i] !== 'string' || entry.wordOptions[i].trim() === '') return false;
    }
    return true;
  }

  async function loadGameData(dateStr) {
    let data;
    try {
      if (allGameData) {
        data = allGameData;
      } else {
        const resp = await fetch('wordsky.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        allGameData = data;
        calendarAvailableDates = Object.keys(data);
      }
    } catch (e) {
      showMessage('Could not load game data', 'error');
      const grid = document.getElementById('answer-grid');
      if (grid) {
        const btns = grid.querySelectorAll('.answer-btn');
        btns.forEach(function(b) { b.disabled = true; });
      }
      return null;
    }

    const entries = data[dateStr];
    if (!entries || !Array.isArray(entries)) {
      showMessage('No game available for today');
      const wordArea = document.getElementById('word-display-area');
      const grid = document.getElementById('answer-grid');
      if (wordArea) wordArea.style.display = 'none';
      if (grid) grid.style.display = 'none';
      return null;
    }

    const valid = entries.filter(validateWordEntry);
    if (valid.length < 5) {
      showMessage('No game available for today');
      const wordArea = document.getElementById('word-display-area');
      const grid = document.getElementById('answer-grid');
      if (wordArea) wordArea.style.display = 'none';
      if (grid) grid.style.display = 'none';
      return null;
    }

    return valid.slice(0, 5);
  }

  // ===== STATE MANAGER MODULE (Task 3.2) =====

  function saveGameState(state) {
    try {
      const key = 'wordsky_state_' + state.date;
      localStorage.setItem(key, JSON.stringify(state));
    } catch (e) {
      console.warn('Could not save game state:', e);
    }
  }

  function loadGameState(dateStr) {
    try {
      const key = 'wordsky_state_' + dateStr;
      const raw = localStorage.getItem(key);
      if (raw === null) return null;
      return JSON.parse(raw);
    } catch (e) {
      console.warn('Corrupted game state, clearing:', e);
      try {
        localStorage.removeItem('wordsky_state_' + dateStr);
      } catch (ignored) {}
      return null;
    }
  }

  function saveToHistory(dateStr, wordScores, completed) {
    try {
      let history = {};
      const raw = localStorage.getItem('wordsky_history');
      if (raw !== null) {
        try {
          history = JSON.parse(raw);
        } catch (e) {
          console.warn('Corrupted history, resetting:', e);
          history = {};
        }
      }
      history[dateStr] = { wordScores: wordScores, completed: completed };
      localStorage.setItem('wordsky_history', JSON.stringify(history));
    } catch (e) {
      console.warn('Could not save to history:', e);
    }
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem('wordsky_history');
      if (raw === null) return {};
      return JSON.parse(raw);
    } catch (e) {
      console.warn('Corrupted history, clearing:', e);
      try {
        localStorage.removeItem('wordsky_history');
      } catch (ignored) {}
      return {};
    }
  }

  // ===== ANSWER SHUFFLER MODULE (Task 3.3) =====

  function shuffleAnswers(correctTranslation, wrongOptions) {
    const arr = [correctTranslation].concat(wrongOptions.slice());
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  // ===== SCORE TRACKER MODULE (Task 3.4) =====

  function getTotalScore(wordScores) {
    let sum = 0;
    for (let i = 0; i < wordScores.length; i++) {
      sum += wordScores[i];
    }
    return sum;
  }

  function getStarRating(wordScore) {
    let s = '';
    for (let i = 0; i < wordScore; i++) s += '\u2605';
    for (let i = 0; i < 5 - wordScore; i++) s += '\u2606';
    return s;
  }

  function getStarRatingHTML(wordScore) {
    var html = '';
    for (var i = 0; i < wordScore; i++) html += '<svg class="icon icon-star filled"><use href="#ico-star-filled"/></svg>';
    for (var i = 0; i < 5 - wordScore; i++) html += '<svg class="icon icon-star empty"><use href="#ico-star-empty"/></svg>';
    return html;
  }

  function formatShareText(date, wordScores, words) {
    var mm = date.substring(4,6), dd = date.substring(6,8), yyyy = date.substring(0,4);
    let text = 'Wordsky ' + mm + '/' + dd + '/' + yyyy + '\n';
    var maxLen = 0;
    if (words) {
      for (let i = 0; i < words.length; i++) {
        if (words[i] && words[i].wordOfTheDay.length > maxLen) maxLen = words[i].wordOfTheDay.length;
      }
    }
    var padLen = maxLen + 1;
    for (let i = 0; i < wordScores.length; i++) {
      var w = '';
      if (words && words[i]) {
        w = words[i].wordOfTheDay;
        while (w.length < padLen) w += ' ';
      }
      var stars = '';
      for (let j = 0; j < wordScores[i]; j++) stars += '\u2605';
      text += w + stars + '\n';
    }
    return text;
  }

  // ===== GAME STATE (Task 5.1) =====

  let gameState = {
    date: '',
    currentWordIndex: 0,
    wordScores: [5, 5, 5, 5, 5],
    disabledOptions: [[], [], [], [], []],
    completed: false,
    started: false,
    elapsedMs: 0,
    wordTimes: [0, 0, 0, 0, 0]
  };
  let currentWords = null;
  let isReviewMode = false;
  let allGameData = null;

  // ===== TIMER MODULE =====

  var timerInterval = null;
  var timerStartedAt = 0;
  var timerPaused = true;
  var timerBaseMs = 0;
  var wordStartMs = 0;

  function getElapsedMs() {
    if (timerPaused) return timerBaseMs;
    return timerBaseMs + (Date.now() - timerStartedAt);
  }

  function formatTimer(ms) {
    var totalSec = Math.floor(ms / 1000);
    var min = Math.floor(totalSec / 60);
    var sec = totalSec % 60;
    if (min > 0) return min + ':' + String(sec).padStart(2, '0');
    return sec + 's';
  }

  function updateClockDisplay() {
    var el = document.getElementById('game-clock');
    if (!el) return;
    el.textContent = 'Time: ' + formatTimer(getElapsedMs());
  }

  function startTimer() {
    timerPaused = false;
    timerStartedAt = Date.now();
    wordStartMs = getElapsedMs();
    if (!timerInterval) {
      timerInterval = setInterval(updateClockDisplay, 250);
    }
    var el = document.getElementById('game-clock');
    if (el) el.classList.remove('hidden');
    updateClockDisplay();
  }

  function pauseTimer() {
    if (!timerPaused) {
      timerBaseMs = getElapsedMs();
      timerPaused = true;
    }
  }

  function resumeTimer() {
    if (timerPaused) {
      timerStartedAt = Date.now();
      timerPaused = false;
      wordStartMs = getElapsedMs();
    }
    if (!timerInterval) {
      timerInterval = setInterval(updateClockDisplay, 250);
    }
    var el = document.getElementById('game-clock');
    if (el) el.classList.remove('hidden');
  }

  function stopTimer() {
    pauseTimer();
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    updateClockDisplay();
  }

  function resetTimerState(baseMs) {
    stopTimer();
    timerBaseMs = baseMs || 0;
    timerPaused = true;
    wordStartMs = timerBaseMs;
    updateClockDisplay();
  }

  function recordWordTime() {
    var now = getElapsedMs();
    var elapsed = Math.round((now - wordStartMs) / 1000);
    gameState.wordTimes[gameState.currentWordIndex] = elapsed;
    gameState.elapsedMs = now;
    wordStartMs = now;
  }

  // ===== START / PLAY SCREEN =====

  var isGameActive = false;

  function showStartScreen(label) {
    var startScreen = document.getElementById('start-screen');
    var wordArea = document.getElementById('word-display-area');
    var gridEl = document.getElementById('answer-grid');
    var startLabel = document.getElementById('start-label');
    var startBtnEl = document.getElementById('start-btn');

    if (startScreen) startScreen.classList.remove('hidden');
    if (wordArea) wordArea.style.display = 'none';
    if (gridEl) gridEl.style.display = 'none';
    if (startLabel) startLabel.textContent = label || 'Ready to play?';
    if (startBtnEl) startBtnEl.textContent = (gameState.started) ? 'Resume' : 'Start';
    isGameActive = false;
  }

  function hideStartScreen() {
    var startScreen = document.getElementById('start-screen');
    var wordArea = document.getElementById('word-display-area');
    var gridEl = document.getElementById('answer-grid');

    if (startScreen) startScreen.classList.add('hidden');
    if (wordArea) wordArea.style.display = '';
    if (gridEl) gridEl.style.display = '';
    isGameActive = true;
  }

  // ===== WORD TRACKER MODULE =====

  function updateWordTracker() {
    var buttons = document.querySelectorAll('.tracker-btn');
    for (var i = 0; i < buttons.length; i++) {
      var btn = buttons[i];
      var wordIndex = parseInt(btn.dataset.wordIndex);
      var isPlayed = false;

      // A word is "played" if it's before the current word index, or if the game is completed
      if (gameState.completed) {
        isPlayed = true;
      } else if (wordIndex < gameState.currentWordIndex) {
        isPlayed = true;
      }

      // In review mode, all words are played
      if (isReviewMode) {
        isPlayed = true;
      }

      btn.innerHTML = '';
      btn.classList.remove('active', 'played');
      btn.disabled = false;

      if (isPlayed && currentWords && currentWords[wordIndex]) {

  // ===== UI RENDERER MODULE (Task 5.3) =====

  function flipWord(renderFn) {
    var targetWordIndex = isReviewMode ? reviewWordIndex : gameState.currentWordIndex;
    launchWordFromTracker(targetWordIndex, renderFn);
  }

  function launchWordFromTracker(wordIndex, renderFn) {
    var trackerBtn = document.querySelector('.tracker-btn[data-word-index="' + wordIndex + '"]');
    var russianEl = document.getElementById('russian-word');
    var displayArea = document.getElementById('word-display-area');

    if (!trackerBtn || !russianEl || !displayArea) {
      renderFn();
      return;
    }

    // Get positions
    var srcRect = trackerBtn.getBoundingClientRect();
    var destRect = russianEl.getBoundingClientRect();

    var srcX = srcRect.left + srcRect.width / 2;
    var srcY = srcRect.top + srcRect.height / 2;
    var destX = destRect.left + destRect.width / 2;
    var destY = destRect.top + destRect.height / 2;

    // Hide the real word during animation
    russianEl.style.opacity = '0';

    // Flash the tracker button
    trackerBtn.style.transition = 'none';
    trackerBtn.style.boxShadow = '0 0 20px rgba(200,168,48,0.8), inset 0 0 15px rgba(200,168,48,0.3)';
    trackerBtn.style.borderColor = '#f5e6c8';
    setTimeout(function() {
      trackerBtn.style.transition = 'all 0.6s ease';
      trackerBtn.style.boxShadow = '';
      trackerBtn.style.borderColor = '';
    }, 300);

    // Create ghost word element
    var ghost = document.createElement('div');
    ghost.className = 'word-ghost';
    ghost.textContent = '?';
    ghost.style.fontSize = '20px';
    ghost.style.left = srcX + 'px';
    ghost.style.top = srcY + 'px';
    ghost.style.transform = 'translate(-50%,-50%) scale(0.5)';
    ghost.style.opacity = '0';
    document.body.appendChild(ghost);

    // Spawn trail particles along the path
    var trailCount = 12;
    var trails = [];
    for (var t = 0; t < trailCount; t++) {
      var trail = document.createElement('div');
      trail.className = 'launch-trail';
      var size = 4 + Math.random() * 6;
      trail.style.width = size + 'px';
      trail.style.height = size + 'px';
      var hue = 40 + Math.random() * 20;
      trail.style.background = 'hsla(' + hue + ',80%,60%,0.6)';
      trail.style.left = srcX + 'px';
      trail.style.top = srcY + 'px';
      trail.style.opacity = '0';
      document.body.appendChild(trail);
      trails.push({ el: trail, delay: t * 25 });
    }

    // Animate ghost from tracker to display area
    var duration = 550;
    var startTime = performance.now();

    function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
    function easeInOutBack(x) {
      var c1 = 1.70158;
      var c2 = c1 * 1.525;
      return x < 0.5
        ? (Math.pow(2 * x, 2) * ((c2 + 1) * 2 * x - c2)) / 2
        : (Math.pow(2 * x - 2, 2) * ((c2 + 1) * (x * 2 - 2) + c2) + 2) / 2;
    }

    function animateFrame(now) {
      var elapsed = now - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var ease = easeInOutBack(progress);

      // Arc path — add a curve upward
      var curveHeight = -60 - Math.abs(destY - srcY) * 0.3;
      var linearX = srcX + (destX - srcX) * ease;
      var linearY = srcY + (destY - srcY) * ease;
      var arcOffset = curveHeight * Math.sin(progress * Math.PI);
      var currentX = linearX;
      var currentY = linearY + arcOffset;

      // Scale up as it travels
      var scale = 0.5 + progress * 1.2;
      var fontSize = 20 + progress * (parseFloat(getComputedStyle(russianEl).fontSize) - 20);

      ghost.style.left = currentX + 'px';
      ghost.style.top = currentY + 'px';
      ghost.style.transform = 'translate(-50%,-50%) scale(' + scale + ') rotate(' + (progress * 360) + 'deg)';
      ghost.style.opacity = Math.min(progress * 3, 1);
      ghost.style.fontSize = fontSize + 'px';

      // Animate trail particles
      for (var i = 0; i < trails.length; i++) {
        var trailProgress = Math.max(0, Math.min((elapsed - trails[i].delay) / duration, 1));
        if (trailProgress > 0) {
          var te = easeOutCubic(trailProgress);
          var tx = srcX + (destX - srcX) * te;
          var ty = srcY + (destY - srcY) * te + curveHeight * Math.sin(trailProgress * Math.PI);
          // Add some scatter
          tx += (Math.random() - 0.5) * 20;
          ty += (Math.random() - 0.5) * 20;
          trails[i].el.style.left = tx + 'px';
          trails[i].el.style.top = ty + 'px';
          trails[i].el.style.opacity = (1 - trailProgress) * 0.7;
          trails[i].el.style.transform = 'translate(-50%,-50%) scale(' + (1 - trailProgress * 0.5) + ')';
        }
      }

      if (progress < 1) {
        requestAnimationFrame(animateFrame);
      } else {
        // Animation complete — render the real word
        renderFn();

        // Remove ghost
        ghost.style.opacity = '0';
        setTimeout(function() { ghost.remove(); }, 100);

        // Remove trails
        for (var j = 0; j < trails.length; j++) {
          (function(el) {
            el.style.transition = 'opacity 0.3s';
            el.style.opacity = '0';
            setTimeout(function() { el.remove(); }, 300);
          })(trails[j].el);
        }

        // Landing effect on the real word
        russianEl.style.opacity = '1';
        russianEl.classList.remove('word-landing');
        void russianEl.offsetWidth;
        russianEl.classList.add('word-landing');
        setTimeout(function() {
          russianEl.classList.remove('word-landing');
        }, 600);

        // Spawn landing sparks
        spawnLandingSparks(destX, destY, 14);

        // Spawn expanding ring
        var ring = document.createElement('div');
        ring.className = 'landing-ring';
        ring.style.left = destX + 'px';
        ring.style.top = destY + 'px';
        document.body.appendChild(ring);
        setTimeout(function() { ring.remove(); }, 700);

        // Second ring with delay
        setTimeout(function() {
          var ring2 = document.createElement('div');
          ring2.className = 'landing-ring';
          ring2.style.left = destX + 'px';
          ring2.style.top = destY + 'px';
          ring2.style.borderColor = 'rgba(200,168,48,0.3)';
          document.body.appendChild(ring2);
          setTimeout(function() { ring2.remove(); }, 700);
        }, 100);
      }
    }

    requestAnimationFrame(animateFrame);
  }

  function spawnLandingSparks(cx, cy, count) {
    for (var i = 0; i < count; i++) {
      var spark = document.createElement('div');
      spark.className = 'spark';
      var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
      var dist = 30 + Math.random() * 50;
      var ex = Math.cos(angle) * dist;
      var ey = Math.sin(angle) * dist;
      var dur = 0.3 + Math.random() * 0.4;
      var hue = 35 + Math.random() * 25;
      spark.style.left = cx + 'px';
      spark.style.top = cy + 'px';
      spark.style.setProperty('--sx', '0px');
      spark.style.setProperty('--sy', '0px');
      spark.style.setProperty('--ex', ex + 'px');
      spark.style.setProperty('--ey', ey + 'px');
      spark.style.setProperty('--dur', dur + 's');
      spark.style.background = 'hsl(' + hue + ',80%,60%)';
      spark.style.width = (2 + Math.random() * 4) + 'px';
      spark.style.height = spark.style.width;
      document.body.appendChild(spark);
      (function(el, d) {
        setTimeout(function() { el.remove(); }, d * 1000 + 50);
      })(spark, dur);
    }
  }

  function renderWord(wordEntry, wordIndex, disabledOptions) {
    var russianEl = document.getElementById('russian-word');
    russianEl.textContent = wordEntry.wordOfTheDay;

    var transEl = document.getElementById('word-translation');

      var btn = buttons[i];

      btn.dataset.answer = shuffled[i];

      btn.className = 'answer-btn';

      if (disabled.indexOf(shuffled[i]) !== -1) {
        btn.disabled = true;
        btn.classList.add('wrong');
      }
    }

  // ===== ANSWER SELECTION HANDLING (Task 5.2) =====

  function handleAnswerClick(e) {
    var btn = e.target;
    if (!btn.classList.contains('answer-btn') || btn.disabled) return;
    if (!currentWords || gameState.completed || isReviewMode) return;

    var selectedAnswer = btn.dataset.answer;
    var currentWord = currentWords[gameState.currentWordIndex];
    var correctAnswer = currentWord.translation;

    if (selectedAnswer === correctAnswer) {
      btn.classList.add('correct');
      soundCorrect();

      // Record time for this word and pause timer
      recordWordTime();
      pauseTimer();

      // Show translation after correct answer
      var transEl = document.getElementById('word-translation');
      if (transEl) {
        transEl.textContent = correctAnswer;
        transEl.classList.remove('hidden');
      }

      var allBtns = document.querySelectorAll('.answer-btn');
      for (var i = 0; i < allBtns.length; i++) {
        allBtns[i].disabled = true;
      }

      saveGameState(gameState);

      if (gameState.currentWordIndex >= 4) {
        gameState.completed = true;
        stopTimer();
        saveGameState(gameState);
        saveToHistory(gameState.date, gameState.wordScores, true);
        updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);

        setTimeout(function() {
          isGameActive = false;
          updateWordTracker();
          soundGameComplete();
          showResults(gameState.wordScores, currentWords);
        }, 1000);
      } else {
        setTimeout(function() {
          gameState.currentWordIndex++;
          saveGameState(gameState);
          resumeTimer();
          // Clear answer button highlights before the animation starts
          var allBtns2 = document.querySelectorAll('.answer-btn');
          for (var k = 0; k < allBtns2.length; k++) {
            allBtns2[k].className = 'answer-btn';
            allBtns2[k].textContent = '';
            allBtns2[k].disabled = true;
          }
          flipWord(function() {
            renderWord(currentWords[gameState.currentWordIndex], gameState.currentWordIndex, gameState.disabledOptions);
            updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
            updateWordTracker();
          });
          soundNewWord();
        }, 1000);
      }
    } else {
      btn.classList.add('wrong');
      btn.disabled = true;
      soundWrong();

      var idx = gameState.currentWordIndex;
      gameState.wordScores[idx] = Math.max(0, gameState.wordScores[idx] - 1);

      gameState.disabledOptions[idx].push(selectedAnswer);

      updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
      updateWordTracker();

      saveGameState(gameState);
    }
  }

  // ===== GAME INITIALIZATION (Task 5.1) =====

  async function initGame() {
    var today = getTodayStr();

    var words = await loadGameData(today);
    if (!words) return;

    currentWords = words;

    var saved = loadGameState(today);
    if (saved) {
      gameState = saved;
      // Ensure new fields exist for older saves
      if (!gameState.wordTimes) gameState.wordTimes = [0, 0, 0, 0, 0];
      if (gameState.elapsedMs === undefined) gameState.elapsedMs = 0;
      if (gameState.started === undefined) gameState.started = false;
    } else {
      gameState = {
        date: today,
        currentWordIndex: 0,
        wordScores: [5, 5, 5, 5, 5],
        disabledOptions: [[], [], [], [], []],
        completed: false,
        started: false,
        elapsedMs: 0,
        wordTimes: [0, 0, 0, 0, 0]
      };
      saveGameState(gameState);
    }

    updateDateDisplay(gameState.date);

    if (gameState.completed) {
      isReviewMode = true;
      reviewWordIndex = 0;
      hideStartScreen();
      renderReviewWord(reviewWordIndex);
      updateTopBar(getTotalScore(gameState.wordScores), reviewWordIndex, 5);
      resetTimerState(gameState.elapsedMs);
      var clockEl = document.getElementById('game-clock');
      if (clockEl) clockEl.classList.remove('hidden');
      updateWordTracker();
      showResults(gameState.wordScores, currentWords);
      return;
    }

    // Not completed — show start screen (whether new or in-progress)
    var label = gameState.started ? 'Resume game — Word ' + (gameState.currentWordIndex + 1) + '/5' : 'Ready to play?';
    showStartScreen(label);
    resetTimerState(gameState.elapsedMs);
    updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
    updateWordTracker();
  }

  // ===== TTS ENGINE MODULE (Task 6.1) =====

  function isRussianTTSAvailable() {
    if (!window.speechSynthesis) return false;
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang && voices[i].lang.indexOf('ru') === 0) return true;
    }
    return false;
  }

  function speakRussian(word) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'ru';
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang && voices[i].lang.indexOf('ru') === 0) {
        utter.voice = voices[i];
        break;
      }
    }
    speechSynthesis.speak(utter);
  }

  function initTTS() {
    var ttsBtn = document.getElementById('tts-btn');
    if (!ttsBtn) return;

    function checkAndToggle() {
      if (isRussianTTSAvailable()) {
        ttsBtn.classList.remove('hidden');
      } else {
        ttsBtn.classList.add('hidden');
      }
    }

    checkAndToggle();

    if (window.speechSynthesis && speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = checkAndToggle;
    }

    ttsBtn.addEventListener('click', function() {
      var idx = isReviewMode ? reviewWordIndex : gameState.currentWordIndex;
      if (!currentWords || !currentWords[idx]) return;
      speakRussian(currentWords[idx].wordOfTheDay);
    });
  }

  // ===== CALENDAR CONTROLLER MODULE (Task 7.1) =====

  var calendarMonth = null;
  var calendarAvailableDates = [];

  function buildCalendarMonth(year, month, availableDates) {
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);
    var daysInMonth = lastDay.getDate();

    var startDow = (firstDay.getDay() + 6) % 7;

    var today = new Date();
    today.setHours(0, 0, 0, 0);

    var grid = [];

    for (var i = 0; i < startDow; i++) {
      grid.push({ day: 0, empty: true, disabled: false, hasData: false, played: false, isToday: false, dateStr: '' });
    }

    var history = loadHistory();

    for (var d = 1; d <= daysInMonth; d++) {
      var dateObj = new Date(year, month, d);
      dateObj.setHours(0, 0, 0, 0);
      var mm = String(month + 1).padStart(2, '0');
      var dd = String(d).padStart(2, '0');
      var dateStr = '' + year + mm + dd;

      var isFuture = dateObj.getTime() > today.getTime();
      var hasData = availableDates.indexOf(dateStr) !== -1;
      var played = !!(history[dateStr] && history[dateStr].completed);
      var isToday = dateObj.getTime() === today.getTime();

      // Check for partially played (started but not completed)
      var partial = false;
      if (!played && hasData) {
        var saved = loadGameState(dateStr);
        if (saved && saved.started && !saved.completed) {
          partial = true;
        }
      }

      grid.push({
        day: d,
        empty: false,
        disabled: isFuture,
        hasData: hasData,
        played: played,
        partial: partial,
        isToday: isToday,
        dateStr: dateStr
      });
    }

    return grid;
  }

  function showCalendar(currentMonthObj, gameHistory) {
    var overlay = document.getElementById('calendar-overlay');
    var grid = document.getElementById('calendar-grid');
    var label = document.getElementById('calendar-month-label');

    var year = currentMonthObj.year;
    var month = currentMonthObj.month;

    var monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];
    label.textContent = monthNames[month] + ' ' + year;

    var days = buildCalendarMonth(year, month, calendarAvailableDates);

    grid.innerHTML = '';
    for (var i = 0; i < days.length; i++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day';

      if (days[i].empty) {
        cell.classList.add('empty');
      } else {
        cell.textContent = days[i].day;

        if (days[i].disabled) {
          cell.classList.add('disabled');
        } else if (days[i].played) {
          cell.classList.add('played');
        } else if (days[i].partial) {
          cell.classList.add('partial');
        } else if (days[i].hasData) {
          cell.classList.add('has-data');
        }

        if (days[i].isToday) {
          cell.classList.add('today');
        }

        if (days[i].dateStr === gameState.date) {
          cell.classList.add('selected');
        }

        if (!days[i].disabled && days[i].hasData) {
          cell.dataset.date = days[i].dateStr;
          cell.addEventListener('click', (function(dateStr) {
            return function() {
              hideCalendar();
              loadGameForDate(dateStr);
            };
          })(days[i].dateStr));
        }
      }

      grid.appendChild(cell);
    }

    soundModalOpen();
    overlay.classList.remove('hidden');
  }

  function hideCalendar() {
    var overlay = document.getElementById('calendar-overlay');
    soundModalClose();
    overlay.classList.add('hidden');
  }

  function openCalendar() {
    pauseTimer();
    var now = new Date();
    calendarMonth = { year: now.getFullYear(), month: now.getMonth() };
    showCalendar(calendarMonth, loadHistory());
  }

  function calendarPrevMonth() {
    if (!calendarMonth) return;
    calendarMonth.month--;
    if (calendarMonth.month < 0) {
      calendarMonth.month = 11;
      calendarMonth.year--;
    }
    showCalendar(calendarMonth, loadHistory());
  }

  function calendarNextMonth() {
    if (!calendarMonth) return;
    calendarMonth.month++;
    if (calendarMonth.month > 11) {
      calendarMonth.month = 0;
      calendarMonth.year++;
    }
    showCalendar(calendarMonth, loadHistory());
  }

  // ===== PAST GAME REVIEW MODE (Task 7.2) =====

  var reviewWordIndex = 0;

  function loadGameForDate(dateStr) {
    isReviewMode = false;
    isGameActive = false;
    reviewWordIndex = 0;
    stopTimer();
    hideResults();

    var wordArea = document.getElementById('word-display-area');
    var gridEl = document.getElementById('answer-grid');
    var startScreen = document.getElementById('start-screen');
    if (wordArea) wordArea.style.display = '';
    if (gridEl) gridEl.style.display = '';
    if (startScreen) startScreen.classList.add('hidden');
    hideMessage();

    if (allGameData) {
      if (!allGameData[dateStr]) {
        showMessage('No game available for this date');
        return;
      }
      var cachedEntries = allGameData[dateStr].filter(validateWordEntry);
      if (cachedEntries.length < 5) {
        showMessage('No game available for this date');
        return;
      }
      setupGameForDate(dateStr, cachedEntries.slice(0, 5));
    } else {
      fetch('wordsky.json')
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
          allGameData = data;
          calendarAvailableDates = Object.keys(data);
          if (!data[dateStr]) {
            showMessage('No game available for this date');
            return;
          }
          var entries = data[dateStr].filter(validateWordEntry);
          if (entries.length < 5) {
            showMessage('No game available for this date');
            return;
          }
          setupGameForDate(dateStr, entries.slice(0, 5));
        })
        .catch(function() {
          showMessage('Could not load game data', 'error');
        });
    }
  }

  function setupGameForDate(dateStr, words) {
    currentWords = words;

    updateDateDisplay(dateStr);

    var saved = loadGameState(dateStr);
    if (saved && saved.completed) {
      gameState = saved;
      if (!gameState.wordTimes) gameState.wordTimes = [0, 0, 0, 0, 0];
      if (gameState.elapsedMs === undefined) gameState.elapsedMs = 0;
      isReviewMode = true;
      reviewWordIndex = 0;
      hideStartScreen();
      renderReviewWord(reviewWordIndex);
      updateTopBar(getTotalScore(gameState.wordScores), reviewWordIndex, 5);
      resetTimerState(gameState.elapsedMs);
      var clockEl = document.getElementById('game-clock');
      if (clockEl) clockEl.classList.remove('hidden');
      updateWordTracker();
    } else if (saved) {
      gameState = saved;
      if (!gameState.wordTimes) gameState.wordTimes = [0, 0, 0, 0, 0];
      if (gameState.elapsedMs === undefined) gameState.elapsedMs = 0;
      if (gameState.started === undefined) gameState.started = false;
      isReviewMode = false;
      // Show start screen for in-progress games
      var label = gameState.started ? 'Resume game — Word ' + (gameState.currentWordIndex + 1) + '/5' : 'Ready to play?';
      showStartScreen(label);
      resetTimerState(gameState.elapsedMs);
      updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
      updateWordTracker();
    } else {
      gameState = {
        date: dateStr,
        currentWordIndex: 0,
        wordScores: [5, 5, 5, 5, 5],
        disabledOptions: [[], [], [], [], []],
        completed: false,
        started: false,
        elapsedMs: 0,
        wordTimes: [0, 0, 0, 0, 0]
      };
      isReviewMode = false;
      saveGameState(gameState);
      showStartScreen('Ready to play?');
      resetTimerState(0);
      updateTopBar(getTotalScore(gameState.wordScores), 0, 5);
      updateWordTracker();
    }
  }

  function renderReviewWord(index) {
    if (!currentWords || !currentWords[index]) return;
    var wordEntry = currentWords[index];

    var russianEl = document.getElementById('russian-word');
    russianEl.textContent = wordEntry.wordOfTheDay;

    var transEl = document.getElementById('word-translation');
    if (transEl) {
      transEl.textContent = wordEntry.translation;
      transEl.classList.remove('hidden');
    }

    var starsEl = document.getElementById('word-stars');
    if (starsEl) {
      starsEl.innerHTML = getStarRatingHTML(gameState.wordScores[index]);
      starsEl.classList.remove('hidden');
    }

    var shuffled = shuffleAnswers(wordEntry.translation, wordEntry.wordOptions);
    var buttons = document.querySelectorAll('.answer-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].textContent = shuffled[i];
      buttons[i].dataset.answer = shuffled[i];
      buttons[i].disabled = true;
      buttons[i].className = 'answer-btn';

      if (shuffled[i] === wordEntry.translation) {
        buttons[i].classList.add('correct');
      }
    }
  }

  // ===== SHARE MANAGER MODULE (Task 8.1) =====

  function formatShareTextForShare() {
    return formatShareText(gameState.date, gameState.wordScores, currentWords);
  }

  function inlineSvgUseElements(container) {
    var uses = container.querySelectorAll('use');
    for (var i = 0; i < uses.length; i++) {
      var use = uses[i];
      var href = use.getAttribute('href') || use.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
      if (!href) continue;
      var symbol = document.querySelector(href);
      if (!symbol) continue;
      var svgEl = use.closest('svg');
      if (!svgEl) continue;
      // Copy children from the symbol into the parent svg
      var frag = document.createDocumentFragment();
      for (var j = 0; j < symbol.childNodes.length; j++) {
        frag.appendChild(symbol.childNodes[j].cloneNode(true));
      }
      // Copy viewBox from symbol to svg
      var vb = symbol.getAttribute('viewBox');
      if (vb) svgEl.setAttribute('viewBox', vb);
      use.parentNode.replaceChild(frag, use);
    }
  }

  function captureResultsImage() {
    return new Promise(function(resolve) {
      if (typeof html2canvas === 'undefined') { resolve(null); return; }
      var popup = document.getElementById('results-popup');
      if (!popup) { resolve(null); return; }

      // Clone the popup so we can inline SVGs without affecting the live DOM
      var clone = popup.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.left = '-9999px';
      clone.style.top = '0';
      clone.style.width = popup.offsetWidth + 'px';

      // Remove elements we don't want in the screenshot
      var actions = clone.querySelector('#results-actions');
      var closeBtn = clone.querySelector('#results-close-btn');
      if (actions) actions.remove();
      if (closeBtn) closeBtn.remove();

      document.body.appendChild(clone);
      inlineSvgUseElements(clone);

      html2canvas(clone, {
        backgroundColor: '#1e1e32',
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        clone.remove();
        canvas.toBlob(function(blob) {
          resolve(blob);
        }, 'image/png');
      }).catch(function() {
        clone.remove();
        resolve(null);
      });
    });
  }

  function canShareWithImage() {
    return navigator.share && navigator.canShare;
  }

  async function shareWithImage(textFallback, urlFallback) {
    if (!canShareWithImage()) {
      if (urlFallback) {
        window.open(urlFallback, '_blank', 'noopener');
      }
      return;
    }
    var blob = await captureResultsImage();
    if (blob) {
      var file = new File([blob], 'wordsky-results.png', { type: 'image/png' });
      var shareData = { url: window.location.href, files: [file] };
      try {
        if (navigator.canShare(shareData)) {
          await navigator.share(shareData);
          return;
        }
      } catch (e) { /* user cancelled or not supported, fall through */ }
    }
    // Fallback to URL-based sharing
    if (urlFallback) {
      window.open(urlFallback, '_blank', 'noopener');
    }
  }

  // ===== ENHANCED INIT: Load allGameData for calendar =====

  async function loadAllGameDataForCalendar() {
    if (allGameData) return;
    try {
      var resp = await fetch('wordsky.json');
      if (!resp.ok) return;
      allGameData = await resp.json();
      calendarAvailableDates = Object.keys(allGameData);
    } catch (e) {
      console.warn('Could not preload game data for calendar:', e);
    }
  }

  // ===== EVENT WIRING =====

  document.addEventListener('DOMContentLoaded', function() {
    var grid = document.getElementById('answer-grid');
    grid.addEventListener('click', handleAnswerClick);

    initTTS();

    // Start button
    var startBtn = document.getElementById('start-btn');
    if (startBtn) startBtn.addEventListener('click', function() {
      if (!currentWords) return;
      gameState.started = true;
      saveGameState(gameState);
      hideStartScreen();
      // Animate the first word launching from tracker
      var russianEl = document.getElementById('russian-word');
      if (russianEl) russianEl.style.opacity = '0';
      updateTopBar(getTotalScore(gameState.wordScores), gameState.currentWordIndex, 5);
      updateWordTracker();
      resetTimerState(gameState.elapsedMs);
      startTimer();
      soundNewWord();
      // Small delay so the layout settles, then launch
      setTimeout(function() {
        launchWordFromTracker(gameState.currentWordIndex, function() {
          renderWord(currentWords[gameState.currentWordIndex], gameState.currentWordIndex, gameState.disabledOptions);
        });
      }, 100);
    });

    var calBtn = document.getElementById('calendar-btn');
    if (calBtn) calBtn.addEventListener('click', openCalendar);

    var shareBtn = document.getElementById('share-btn');
    if (shareBtn) shareBtn.addEventListener('click', function() {
      if (gameState.completed && currentWords) {
        showResults(gameState.wordScores, currentWords);
      }
    });

    var tracker = document.getElementById('word-tracker');
    if (tracker) tracker.addEventListener('click', handleTrackerClick);

    var calCloseBtn = document.getElementById('calendar-close-btn');
    if (calCloseBtn) calCloseBtn.addEventListener('click', hideCalendar);

    var calPrev = document.getElementById('cal-prev');
    if (calPrev) calPrev.addEventListener('click', calendarPrevMonth);

    var calNext = document.getElementById('cal-next');
    if (calNext) calNext.addEventListener('click', calendarNextMonth);

    var calTodayBtn = document.getElementById('cal-today-btn');
    if (calTodayBtn) calTodayBtn.addEventListener('click', function() {
      hideCalendar();
      loadGameForDate(getTodayStr());
    });

    var resultsCloseBtn = document.getElementById('results-close-btn');
    if (resultsCloseBtn) resultsCloseBtn.addEventListener('click', hideResults);

    var messageBtn = document.getElementById('share-message');
    if (messageBtn) {
      messageBtn.addEventListener('click', function(e) {
        e.preventDefault();
        var text = formatShareText(gameState.date, gameState.wordScores, currentWords);
        shareWithImage(text, 'sms:?&body=' + encodeURIComponent(text));
      });
    }

    initGame().then(function() {
      loadAllGameDataForCalendar();
    });
  });
</script>
