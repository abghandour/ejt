<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" opacity="0.12">
  <!-- Champagne bottle -->
  <rect x="25" y="80" width="16" height="60" rx="3" fill="#d4af37"/>
  <rect x="28" y="60" width="10" height="24" rx="2" fill="#d4af37"/>
  <rect x="30" y="52" width="6" height="10" rx="1" fill="#c0a030"/>
  <!-- Bubbles -->
  <circle cx="33" cy="42" r="3" fill="none" stroke="#d4af37" stroke-width="1"/>
  <circle cx="28" cy="30" r="2" fill="none" stroke="#d4af37" stroke-width="1"/>
  <circle cx="38" cy="24" r="2.5" fill="none" stroke="#d4af37" stroke-width="1"/>
  <!-- Firework 1 -->
  <line x1="100" y1="30" x2="100" y2="10" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="100" y1="30" x2="115" y2="18" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="100" y1="30" x2="85" y2="18" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="100" y1="30" x2="120" y2="30" stroke="#c0c0d0" stroke-width="1"/>
  <line x1="100" y1="30" x2="80" y2="30" stroke="#c0c0d0" stroke-width="1"/>
  <line x1="100" y1="30" x2="112" y2="42" stroke="#c0c0d0" stroke-width="1"/>
  <line x1="100" y1="30" x2="88" y2="42" stroke="#c0c0d0" stroke-width="1"/>
  <circle cx="100" cy="30" r="2" fill="#d4af37"/>
  <!-- Clock face -->
  <circle cx="160" cy="60" r="22" fill="none" stroke="#d4af37" stroke-width="2"/>
  <line x1="160" y1="60" x2="160" y2="42" stroke="#d4af37" stroke-width="2"/>
  <line x1="160" y1="60" x2="172" y2="55" stroke="#c0c0d0" stroke-width="1.5"/>
  <text x="155" y="78" font-size="8" fill="#d4af37" font-family="sans-serif">12</text>
  <!-- Stars -->
  <polygon points="70,80 72,86 78,86 73,90 75,96 70,92 65,96 67,90 62,86 68,86" fill="#c0c0d0"/>
  <polygon points="140,120 141.5,124 146,124 142.5,127 143.5,131 140,128.5 136.5,131 137.5,127 134,124 138.5,124" fill="#d4af37"/>
  <!-- Confetti -->
  <rect x="50" y="150" width="6" height="3" rx="1" fill="#d4af37" transform="rotate(30 53 151)"/>
  <rect x="120" y="160" width="6" height="3" rx="1" fill="#c0c0d0" transform="rotate(-20 123 161)"/>
  <rect x="80" y="170" width="6" height="3" rx="1" fill="#d4af37" transform="rotate(45 83 171)"/>
  <rect x="160" y="140" width="6" height="3" rx="1" fill="#c0c0d0" transform="rotate(-35 163 141)"/>
</svg>