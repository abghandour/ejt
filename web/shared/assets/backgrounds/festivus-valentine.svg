<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" opacity="0.1">
  <!-- Heart 1 large -->
  <path d="M100,70 C100,50 80,35 65,45 C50,55 50,75 100,105 C150,75 150,55 135,45 C120,35 100,50 100,70Z" fill="#e05080"/>
  <!-- Heart 2 small top-left -->
  <path d="M35,40 C35,30 25,22 18,28 C11,34 11,44 35,58 C59,44 59,34 52,28 C45,22 35,30 35,40Z" fill="#d090b0" transform="scale(0.5) translate(20,20)"/>
  <!-- Heart 3 small top-right -->
  <path d="M35,40 C35,30 25,22 18,28 C11,34 11,44 35,58 C59,44 59,34 52,28 C45,22 35,30 35,40Z" fill="#e05080" transform="scale(0.4) translate(380,30)"/>
  <!-- Heart 4 bottom-left -->
  <path d="M35,40 C35,30 25,22 18,28 C11,34 11,44 35,58 C59,44 59,34 52,28 C45,22 35,30 35,40Z" fill="#d090b0" transform="scale(0.45) translate(50,320)"/>
  <!-- Heart 5 bottom-right -->
  <path d="M35,40 C35,30 25,22 18,28 C11,34 11,44 35,58 C59,44 59,34 52,28 C45,22 35,30 35,40Z" fill="#e05080" transform="scale(0.35) translate(420,400)"/>
  <!-- Cupid arrow -->
  <line x1="20" y1="130" x2="80" y2="100" stroke="#d090b0" stroke-width="1.5"/>
  <polygon points="80,100 74,96 76,103" fill="#d090b0"/>
  <line x1="20" y1="130" x2="16" y2="136" stroke="#d090b0" stroke-width="1"/>
  <line x1="20" y1="130" x2="14" y2="128" stroke="#d090b0" stroke-width="1"/>
  <!-- Rose -->
  <line x1="160" y1="180" x2="160" y2="140" stroke="#5a3028" stroke-width="2"/>
  <ellipse cx="160" cy="135" rx="8" ry="10" fill="#e05080"/>
  <path d="M155,138 Q160,125 165,138" fill="#c04060"/>
  <!-- Small floating hearts -->
  <text x="130" y="170" font-size="14" fill="#e05080">♥</text>
  <text x="45" y="180" font-size="10" fill="#d090b0">♥</text>
  <text x="170" y="50" font-size="12" fill="#e05080">♥</text>
</svg>