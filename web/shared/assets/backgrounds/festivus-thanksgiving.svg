<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" opacity="0.1">
  <!-- Turkey body -->
  <ellipse cx="100" cy="120" rx="22" ry="18" fill="#8a6020"/>
  <!-- Turkey tail feathers -->
  <ellipse cx="80" cy="90" rx="8" ry="20" fill="#c89030" transform="rotate(-20 80 90)"/>
  <ellipse cx="95" cy="82" rx="8" ry="22" fill="#e08020" transform="rotate(-5 95 82)"/>
  <ellipse cx="112" cy="82" rx="8" ry="22" fill="#b04020" transform="rotate(5 112 82)"/>
  <ellipse cx="125" cy="90" rx="8" ry="20" fill="#c89030" transform="rotate(20 125 90)"/>
  <!-- Turkey head -->
  <circle cx="100" cy="105" r="8" fill="#8a6020"/>
  <circle cx="97" cy="103" r="1.5" fill="#12100a"/>
  <circle cx="103" cy="103" r="1.5" fill="#12100a"/>
  <!-- Beak -->
  <polygon points="98,107 102,107 100,112" fill="#c89030"/>
  <!-- Wattle -->
  <ellipse cx="100" cy="112" rx="3" ry="4" fill="#b04020"/>
  <!-- Turkey legs -->
  <line x1="90" y1="136" x2="85" y2="155" stroke="#c89030" stroke-width="2.5"/>
  <line x1="110" y1="136" x2="115" y2="155" stroke="#c89030" stroke-width="2.5"/>
  <line x1="85" y1="155" x2="78" y2="155" stroke="#c89030" stroke-width="1.5"/>
  <line x1="115" y1="155" x2="122" y2="155" stroke="#c89030" stroke-width="1.5"/>
  <!-- Autumn leaves -->
  <path d="M30,30 Q35,20 40,30 Q45,20 40,35 Q35,40 30,30Z" fill="#c89030"/>
  <line x1="35" y1="35" x2="35" y2="45" stroke="#8a6020" stroke-width="1"/>
  <path d="M160,50 Q165,40 170,50 Q175,40 170,55 Q165,60 160,50Z" fill="#b04020"/>
  <line x1="165" y1="55" x2="165" y2="65" stroke="#8a6020" stroke-width="1"/>
  <path d="M25,160 Q30,150 35,160 Q40,150 35,165 Q30,170 25,160Z" fill="#e08020"/>
  <line x1="30" y1="165" x2="30" y2="175" stroke="#8a6020" stroke-width="1"/>
  <!-- Corn -->
  <ellipse cx="165" cy="150" rx="6" ry="16" fill="#c89030"/>
  <line x1="162" y1="140" x2="162" y2="160" stroke="#8a6020" stroke-width="0.8"/>
  <line x1="165" y1="140" x2="165" y2="160" stroke="#8a6020" stroke-width="0.8"/>
  <line x1="168" y1="140" x2="168" y2="160" stroke="#8a6020" stroke-width="0.8"/>
  <!-- Corn husk -->
  <path d="M160,134 Q165,128 170,134" fill="none" stroke="#6a7a3a" stroke-width="1.5"/>
  <path d="M158,136 Q165,130 172,136" fill="none" stroke="#6a7a3a" stroke-width="1"/>
  <!-- Acorns -->
  <circle cx="50" cy="180" r="5" fill="#8a6020"/>
  <rect x="46" y="174" width="8" height="4" rx="2" fill="#c89030"/>
  <line x1="50" y1="174" x2="50" y2="170" stroke="#8a6020" stroke-width="1"/>
</svg>