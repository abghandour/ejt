<html lang="en">
<head>
<meta charset="UTF-8">

<title>Bogglesky — Russian Word Search</title>

<link rel="apple-touch-icon" href="../shared/assets/apple-touch-icon.png">

<style>

/* INFO ROW */
#info-row{
  width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;
  padding:6px 16px;flex-shrink:0;
}
#timer-display{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;transition:color 0.3s}
#timer-display.danger{color:var(--danger);animation:timerPulse 0.5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#words-found-display{font-size:14px;color:var(--info)}

/* CURRENT WORD DISPLAY */
#current-word{
  width:100%;max-width:600px;text-align:center;padding:4px 16px;flex-shrink:0;min-height:36px;
}
#current-word-text{
  font-size:28px;font-weight:700;color:var(--accent);letter-spacing:2px;
  text-shadow:0 0 12px var(--accent-glow);min-height:34px;
}

/* GRID AREA */
#grid-area{
  width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1 1 0;min-height:0;padding:8px 16px;
  position:relative;overflow:hidden;
}

/* Letter grid */
#letter-grid{
  display:grid;gap:12px;
  touch-action:none;
  -webkit-touch-callout:none;
}
#letter-grid.grid-4{grid-template-columns:repeat(4,1fr)}
#letter-grid.grid-5{grid-template-columns:repeat(5,1fr)}

.grid-cell{
  width:clamp(56px,17vw,76px);height:clamp(56px,17vw,76px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(26px,7vw,38px);font-weight:700;
  background:var(--tile-bg);
  border:2px solid var(--tile-border);border-radius:10px;
  transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s, transform 0.2s ease;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
}
.grid-cell.selected, .grid-cell.path{
  border-color:var(--tile-selected-border);
  background:var(--tile-selected-bg);
  color:var(--accent);text-shadow:0 0 8px var(--accent-glow);
  box-shadow:0 0 12px var(--accent-glow);
}
.grid-cell.twist-left{transform:scale(1.05) rotate(-5deg)}
.grid-cell.twist-right{transform:scale(1.05) rotate(5deg)}
/* Preview grow on neighbor approach */
.grid-cell.preview-left{transform:scale(1.05) rotate(-5deg)}
.grid-cell.preview-right{transform:scale(1.05) rotate(5deg)}
.grid-cell.correct{
  border-color:var(--tile-correct-border);background:var(--tile-correct-bg);
  color:var(--success-text);box-shadow:0 0 16px rgba(85,170,85,0.3);
  animation:correctPop 0.4s ease;
}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.grid-cell.wrong{
  border-color:var(--tile-wrong-border);background:var(--tile-wrong-bg);
  color:var(--danger-text);animation:tileShake 0.4s ease;
}
@keyframes tileShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.grid-cell.growing{
  animation:growIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes growIn{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.1);opacity:1}
  100%{transform:scale(1);opacity:1}
}

/* SVG line overlay for path */
#path-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:10;
}
#path-line{
  fill:none;stroke:rgba(200,168,48,0.4);stroke-width:4;
  stroke-linecap:round;stroke-linejoin:round;
}



/* ACTION BUTTONS */
#action-row{
  width:100%;max-width:600px;display:flex;gap:8px;
  padding:8px 16px 12px;flex-shrink:0;
}
.action-btn{flex:1;min-height:50px;font-size:15px}
#btn-shuffle{
  background:linear-gradient(180deg,#2a2a52 0%,#1a1a3a 100%);
  border-color:#5a5a8e;
}

/* Particle container */
.particle{
  position:fixed;pointer-events:none;z-index:80;
  border-radius:50%;will-change:transform,opacity;
}

/* START SCREEN */
#start-screen.hidden{display:none}
#start-inner{margin:0 16px}
#start-title{font-size:18px}
#start-btn{padding:16px 52px;font-size:24px}

/* GAME OVER MODAL */
#death-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.22);display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);padding:20px;
}
#death-overlay.hidden{display:none}
#end-popup{
  width:100%;max-width:400px;background:var(--bg-surface);
  border:1px solid var(--border-subtle);border-radius:12px;padding:24px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
#end-popup h2{font-size:22px;font-weight:700;color:var(--accent)}
#end-stats{width:100%;display:flex;flex-direction:column;gap:8px;font-size:15px}
#end-words{width:100%;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;font-size:13px;border-top:1px solid var(--border-divider);padding-top:8px}
.modal-actions{display:flex;gap:8px;width:100%;justify-content:center;margin-top:4px}
.modal-actions .action-btn{min-height:44px;font-size:14px;flex:1;max-width:140px;border-radius:8px}

/* HINT BAR (easy & medium modes) */
#hint-bar{
  width:100%;max-width:600px;padding:4px 16px;flex-shrink:0;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  display:none;
}
#hint-bar.visible{display:block}
#hint-list{
  display:flex;flex-wrap:wrap;gap:6px;padding:2px 0;
  justify-content:space-evenly;
}
.hint-btn{
  flex:1 1 0;min-width:0;
  padding:12px 18px;font-size:16px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:var(--tile-bg);
  border:1px solid var(--tile-border);border-radius:8px;
  color:var(--info);cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  display:inline-flex;flex-direction:column;align-items:center;gap:2px;
}
.hint-btn .hint-lamp{width:16px;height:16px;fill:#6a9ec0;flex-shrink:0}
.hint-btn:hover{border-color:#6a9ec0;background:linear-gradient(180deg,#2a3a4a 0%,#1a2a3a 100%)}
.hint-btn.revealed{
  background:linear-gradient(180deg,#3a3a10 0%,#2a2a08 100%);
  border-color:var(--accent);
}
.hint-btn .hint-ru{color:var(--accent);font-size:18px;font-weight:700}
.hint-btn .hint-en{color:#6a9ec0;font-size:13px;font-weight:400}
.hint-btn.found{
  background:linear-gradient(180deg,#2a3a2a 0%,#1a2a1a 100%);
  border-color:#5a8a5a;
  cursor:default;opacity:0.7;
}
.hint-btn.found .hint-ru{color:#8f8}
.hint-btn.found .hint-en{color:#6a9ec0}
.hint-btn.mystery{color:var(--text-secondary);font-size:22px}

/* Penalty flash for hint */
.penalty-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:90;
  background:rgba(204,68,68,0.15);
  animation:penaltyFade 0.5s ease-out forwards;
}
@keyframes penaltyFade{0%{opacity:1}100%{opacity:0}}
.penalty-text{
  position:fixed;z-index:85;pointer-events:none;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  font-size:24px;color:#c44;
  animation:penaltyFloat 1s ease-out forwards;
}
@keyframes penaltyFloat{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-60px)}
}

/* Toast notification */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg-surface);border:1px solid var(--btn-border);border-radius:10px;
  padding:10px 20px;color:var(--text-primary);font-size:15px;font-weight:700;
  z-index:90;pointer-events:none;
  animation:toastFade 1s ease-out forwards;
}
@keyframes toastFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(0.9)}}

@media(max-width:400px){
  #top-bar{padding:6px 10px}
  #info-row{padding:4px 10px}
  #action-row{padding:6px 10px 10px}
  .grid-cell{width:52px;height:52px;font-size:24px;border-radius:8px}
}
</style>

<script>
// ===== SOUNDS =====
function soundSelect() { playTone(500, 0.06, 'sine', 0.04); }
function soundDeselect() { playTone(350, 0.06, 'sine', 0.03); }
function soundCorrect() {
  playTone(523, 0.15, 'sine', 0.1);
  playTone(659, 0.15, 'sine', 0.1, 0.08);
  playTone(784, 0.2, 'sine', 0.12, 0.16);
}
function soundWrong() {
  playTone(250, 0.15, 'sawtooth', 0.05);
  playTone(200, 0.2, 'square', 0.03, 0.06);
}
function soundGameEnd() {
  playTone(523, 0.2, 'sine', 0.1);
  playTone(659, 0.2, 'sine', 0.1, 0.15);
  playTone(784, 0.2, 'sine', 0.1, 0.3);
  playTone(1047, 0.4, 'sine', 0.12, 0.45);
}

// ===== CONFIG =====
var DIFFICULTY = 'medium';
var GRID_SIZES = { easy: 4, medium: 4, hard: 5 };
var GAME_TIMES = { easy: 150, medium: 120, hard: 120 };
var MIN_WORD_LEN = { easy: 3, medium: 3, hard: 3 };

// Russian letter frequencies for grid generation
var LETTER_POOL = 'оооооооеееееееаааааааиииииинннннттттссссррррввввллллккккммммддддппппууууяяяббггззччхжшюцщэфъьёй';

// ===== DICTIONARY =====
var dictionary = [];
var wordMap = {}; // word -> translation

// ===== GAME STATE =====
var game = null;
var timerInterval = null;

var MIN_FINDABLE_WORDS = 5;

function generateLetters(totalCells) {
  var letters = [];
  for (var i = 0; i < totalCells; i++) {
    letters.push(LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)]);
  }
  return letters;
}

function generateBoard(gridSize) {
  var totalCells = gridSize * gridSize;
  var letters, findable;
  do {
    letters = generateLetters(totalCells);
    findable = findAllWords(letters, gridSize);
  } while (Object.keys(findable).length < MIN_FINDABLE_WORDS);
  return { letters: letters, findable: findable };
}

function initGame() {
  var gridSize = GRID_SIZES[DIFFICULTY];
  var board = generateBoard(gridSize);

  return {
    gridSize: gridSize,
    letters: board.letters,
    selectedPath: [],
    score: 0,
    wordsFound: [],
    foundSet: new Set(),
    findableWords: board.findable,
    timeLeft: GAME_TIMES[DIFFICULTY],
    difficulty: DIFFICULTY,
    isRunning: false,
    isDragging: false
  };
}

// ===== ADJACENCY & WORD FINDING =====
function getNeighbors(idx, size) {
  var r = Math.floor(idx / size), c = idx % size;
  var neighbors = [];
  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      var nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        neighbors.push(nr * size + nc);
      }
    }
  }
  return neighbors;
}

function findAllWords(letters, size) {
  var found = {};
  var minLen = MIN_WORD_LEN[DIFFICULTY];

  // Build adjacency list
  var adj = [];
  for (var i = 0; i < letters.length; i++) {
    adj.push(getNeighbors(i, size));
  }

  // Build a trie from dictionary for efficient prefix checking
  var trie = {};
  for (var w in wordMap) {
    if (w.length < minLen || w.length > letters.length) continue;
    var node = trie;
    for (var ci = 0; ci < w.length; ci++) {
      var ch = w[ci];
      if (!node[ch]) node[ch] = {};
      node = node[ch];
    }
    node['$'] = w;
  }

  // DFS from each cell
  function dfs(idx, visited, node) {
    var ch = letters[idx];
    if (!node[ch]) return;
    var next = node[ch];
    if (next['$'] && !found[next['$']]) {
      found[next['$']] = true;
    }
    visited[idx] = true;
    var nbrs = adj[idx];
    for (var n = 0; n < nbrs.length; n++) {
      if (!visited[nbrs[n]]) {
        dfs(nbrs[n], visited, next);
      }
    }
    visited[idx] = false;
  }

  for (var start = 0; start < letters.length; start++) {
    var visited = {};
    dfs(start, visited, trie);
  }

  return found;
}

// Check if a specific path forms a valid word
function getWordFromPath(path) {
  return path.map(function(idx) { return game.letters[idx]; }).join('');
}

function isValidPath(path) {
  if (path.length < 2) return false;
  for (var i = 1; i < path.length; i++) {
    var neighbors = getNeighbors(path[i - 1], game.gridSize);
    if (neighbors.indexOf(path[i]) === -1) return false;
  }
  // No repeated cells
  var seen = {};
  for (var j = 0; j < path.length; j++) {
    if (seen[path[j]]) return false;
    seen[path[j]] = true;
  }
  return true;
}

// ===== GRID RENDERING =====
function renderGrid(animate) {
  var grid = document.getElementById('letter-grid');
  grid.innerHTML = '';
  grid.className = 'grid-' + game.gridSize;

  for (var i = 0; i < game.letters.length; i++) {
    var cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.setAttribute('data-idx', i);
    cell.textContent = game.letters[i];
    if (animate) {
      cell.classList.add('growing');
      cell.style.animationDelay = (i * 30) + 'ms';
      cell.addEventListener('animationend', function() {
        this.classList.remove('growing');
      }, { once: true });
    }
    grid.appendChild(cell);
  }
}

function updateGridSelection() {
  var cells = document.querySelectorAll('.grid-cell');
  var pathSet = {};
  for (var i = 0; i < game.selectedPath.length; i++) {
    pathSet[game.selectedPath[i]] = true;
  }
  cells.forEach(function(cell) {
    var idx = parseInt(cell.getAttribute('data-idx'));
    var inPath = !!pathSet[idx];
    var isHead = idx === game.selectedPath[game.selectedPath.length - 1] && game.selectedPath.length > 0;

    cell.classList.toggle('selected', isHead);
    cell.classList.toggle('path', inPath && !isHead);

    if (inPath) {
      // Assign a random twist direction if not already twisted
      if (!cell.classList.contains('twist-left') && !cell.classList.contains('twist-right')) {
        cell.classList.add(Math.random() < 0.5 ? 'twist-left' : 'twist-right');
      }
    } else {
      // Remove twist when deselected — transition animates back
      cell.classList.remove('twist-left', 'twist-right');
    }
  });

  // Draw SVG line through selected tile centers
  updatePathLine(cells);

  // Update current word display
  var wordText = getWordFromPath(game.selectedPath);
  document.getElementById('current-word-text').textContent = wordText;
}

function updatePathLine(cells) {
  var polyline = document.getElementById('path-line');
  var svg = document.getElementById('path-svg');
  if (!polyline || !svg) return;
  var path = game.selectedPath;
  if (path.length < 2) { polyline.setAttribute('points', ''); return; }
  var gridArea = document.getElementById('grid-area');
  var areaRect = gridArea.getBoundingClientRect();
  var pts = [];
  for (var i = 0; i < path.length; i++) {
    var cell = cells[path[i]];
    var r = cell.getBoundingClientRect();
    var cx = r.left + r.width / 2 - areaRect.left;
    var cy = r.top + r.height / 2 - areaRect.top;
    pts.push(cx + ',' + cy);
  }
  polyline.setAttribute('points', pts.join(' '));
}

// ===== TOUCH/MOUSE HANDLING =====
function getCellFromPoint(x, y) {
  var el = document.elementFromPoint(x, y);
  if (!el) return -1;
  if (el.classList && el.classList.contains('grid-cell')) {
    return parseInt(el.getAttribute('data-idx'));
  }
  return -1;
}

// --- Preview state ---
var previewIdx = -1;

function clearPreview() {
  if (previewIdx >= 0) {
    var cell = document.querySelector('.grid-cell[data-idx="' + previewIdx + '"]');
    if (cell) cell.classList.remove('preview-left', 'preview-right');
    previewIdx = -1;
  }
}

// --- Direction-biased nearest neighbor (option 1) ---
function getCellCenter(idx) {
  var cell = document.querySelector('.grid-cell[data-idx="' + idx + '"]');
  if (!cell) return null;
  var r = cell.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function findBestNeighbor(clientX, clientY) {
  if (!game || game.selectedPath.length === 0) return -1;
  var last = game.selectedPath[game.selectedPath.length - 1];
  var lastCenter = getCellCenter(last);
  if (!lastCenter) return -1;

  // Direction from current cell center to pointer
  var dirX = clientX - lastCenter.x;
  var dirY = clientY - lastCenter.y;
  var dirLen = Math.sqrt(dirX * dirX + dirY * dirY);
  if (dirLen < 1) return -1;
  dirX /= dirLen; dirY /= dirLen;

  var neighbors = getNeighbors(last, game.gridSize);
  var pathSet = {};
  for (var i = 0; i < game.selectedPath.length; i++) pathSet[game.selectedPath[i]] = true;

  var best = -1, bestScore = -Infinity;
  for (var n = 0; n < neighbors.length; n++) {
    var idx = neighbors[n];
    if (pathSet[idx]) continue;
    var nc = getCellCenter(idx);
    if (!nc) continue;
    // Direction from current cell to this neighbor
    var nx = nc.x - lastCenter.x, ny = nc.y - lastCenter.y;
    var nLen = Math.sqrt(nx * nx + ny * ny);
    if (nLen < 1) continue;
    nx /= nLen; ny /= nLen;
    // Dot product = cosine of angle between pointer direction and neighbor direction
    var dot = dirX * nx + dirY * ny;
    // Distance from pointer to neighbor center
    var dx = clientX - nc.x, dy = clientY - nc.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    // Score: heavily favor direction alignment, penalize distance
    // dot ranges -1..1, we want high dot and low dist
    var score = dot * 100 - dist * 0.5;
    if (score > bestScore) { bestScore = score; best = idx; }
  }
  // Only return if pointer is roughly heading toward a neighbor (dot > 0)
  return bestScore > 0 ? best : -1;
}

// --- Dwell threshold (option 4) ---
var dwellIdx = -1;
var dwellTimer = null;
var DWELL_MS = 60;

function cancelDwell() {
  if (dwellTimer) { clearTimeout(dwellTimer); dwellTimer = null; }
  dwellIdx = -1;
}

function commitCell(idx) {
  clearPreview();
  cancelDwell();
  continueDrag(idx);
}

function startDrag(idx, clientX) {
  if (!game || !game.isRunning) return;
  game.isDragging = true;
  game.selectedPath = [idx];
  cancelDwell();
  soundSelect();
  updateGridSelection();
}

function continueDrag(idx) {
  if (!game || !game.isDragging || idx === -1) return;
  var path = game.selectedPath;

  // If going back to previous cell, undo last selection
  if (path.length >= 2 && path[path.length - 2] === idx) {
    path.pop();
    soundDeselect();
    updateGridSelection();
    return;
  }

  // Skip if already in path
  for (var i = 0; i < path.length; i++) {
    if (path[i] === idx) return;
  }

  // Must be adjacent to last cell
  var last = path[path.length - 1];
  var neighbors = getNeighbors(last, game.gridSize);
  if (neighbors.indexOf(idx) === -1) return;

  path.push(idx);
  soundSelect();
  updateGridSelection();
}

function handleDragMove(clientX, clientY) {
  if (!game || !game.isDragging) return;
  var idx = getCellFromPoint(clientX, clientY);

  if (idx >= 0) {
    // Pointer is over a cell
    clearPreview();
    // Dwell: if this is a new cell, start dwell timer
    if (idx !== dwellIdx) {
      cancelDwell();
      // If it's the current last cell or going back, commit immediately
      var path = game.selectedPath;
      if (idx === path[path.length - 1]) return;
      if (path.length >= 2 && path[path.length - 2] === idx) {
        commitCell(idx);
        return;
      }
      dwellIdx = idx;
      dwellTimer = setTimeout(function() { commitCell(idx); }, DWELL_MS);
    }
    return;
  }

  // Pointer is in the gap — cancel any pending dwell
  cancelDwell();

  // Find best neighbor using direction bias
  var nearest = findBestNeighbor(clientX, clientY);
  if (nearest === previewIdx) return;
  clearPreview();
  if (nearest < 0) return;
  previewIdx = nearest;
  var cell = document.querySelector('.grid-cell[data-idx="' + nearest + '"]');
  if (!cell) return;
  var rect = cell.getBoundingClientRect();
  var centerX = rect.left + rect.width / 2;
  cell.classList.add(clientX < centerX ? 'preview-left' : 'preview-right');
}

function endDrag() {
  if (!game || !game.isDragging) return;
  game.isDragging = false;
  clearPreview();
  cancelDwell();
  submitWord();
}

function submitWord() {
  var path = game.selectedPath;
  if (path.length < MIN_WORD_LEN[DIFFICULTY]) {
    clearSelection();
    return;
  }

  var word = getWordFromPath(path);

  if (game.foundSet.has(word)) {
    showToast('Already found');
    soundWrong();
    flashCells(path, 'wrong');
    clearSelection();
    return;
  }

  if (wordMap[word] && isValidPath(path)) {
    // Valid word
    soundCorrect();
    flashCells(path, 'correct');
    var points = word.length <= 3 ? 1 : word.length <= 4 ? 2 : word.length <= 5 ? 4 : word.length <= 6 ? 6 : word.length * 2;
    if (DIFFICULTY === 'hard') points = Math.round(points * 1.5);
    game.score += points;
    game.wordsFound.push({ word: word, translation: wordMap[word], points: points });
    game.foundSet.add(word);
    spawnParticlesFromPath(path);
    updateUI();

    // Check if all findable words found — pause timer & refresh board
    var allFound = true;
    for (var fw in game.findableWords) {
      if (!game.foundSet.has(fw)) { allFound = false; break; }
    }
    if (allFound) {
      stopTimer();
      showToast('Board cleared!');
      setTimeout(function() {
        var board = generateBoard(game.gridSize);
        game.letters = board.letters;
        game.findableWords = board.findable;
        game.foundSet = new Set();
        game.selectedPath = [];
        renderGrid(true);
        updateGridSelection();
        setupGridListeners();
        renderHintBar();
        startTimer();
      }, 600);
    }
  } else {
    soundWrong();
    flashCells(path, 'wrong');
  }

  setTimeout(clearSelection, 300);
}

function clearSelection() {
  game.selectedPath = [];
  updateGridSelection();
}

function flashCells(path, cls) {
  var cells = document.querySelectorAll('.grid-cell');
  path.forEach(function(idx) {
    cells[idx].classList.add(cls);
  });
  setTimeout(function() {
    path.forEach(function(idx) {
      cells[idx].classList.remove(cls);
    });
  }, 400);
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 1000);
}

function spawnParticlesFromPath(path) {
  var cells = document.querySelectorAll('.grid-cell');
  path.forEach(function(idx) {
    var rect = cells[idx].getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    for (var i = 0; i < 3; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 3 + Math.random() * 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = 'hsl(' + (30 + Math.random() * 30) + ',80%,60%)';
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      document.body.appendChild(p);
      animateParticle(p, (Math.random() - 0.5) * 120, -40 - Math.random() * 80, 400 + Math.random() * 200);
    }
  });
}

function animateParticle(el, dx, dy, dur) {
  var start = performance.now();
  var sx = parseFloat(el.style.left), sy = parseFloat(el.style.top);
  function frame(now) {
    var t = (now - start) / dur;
    if (t >= 1) { el.remove(); return; }
    el.style.left = (sx + dx * t) + 'px';
    el.style.top = (sy + dy * t + 40 * t * t) + 'px';
    el.style.opacity = 1 - t;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ===== TIMER =====
function startTimer() {
  game.isRunning = true;
  stopTimer();
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    game.timeLeft--;
    updateTimerDisplay();
    if (game.timeLeft <= 0) endGame();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  var el = document.getElementById('timer-display');
  var t = Math.max(0, game.timeLeft);
  var m = Math.floor(t / 60);
  var s = t % 60;
  el.textContent = m + ':' + String(s).padStart(2, '0');
  el.classList.toggle('danger', t <= 15);
}

// ===== UI =====
function updateUI() {
  document.getElementById('score-value').textContent = game.score;
  document.getElementById('words-found-display').textContent = 'Words: ' + game.wordsFound.length;
  updateHintBar();
}

// ===== SHUFFLE =====
function shuffleGrid() {
  if (!game || !game.isRunning) return;
  game.selectedPath = [];
  var attempts = 0;
  do {
    game.letters = shuffleArray(game.letters);
    game.findableWords = findAllWords(game.letters, game.gridSize);
    attempts++;
    if (attempts > 50) {
      var board = generateBoard(game.gridSize);
      game.letters = board.letters;
      game.findableWords = board.findable;
      break;
    }
  } while (Object.keys(game.findableWords).length < MIN_FINDABLE_WORDS);
  renderGrid(true);
  updateGridSelection();
  setupGridListeners();
  renderHintBar();

  // 20s penalty
  game.timeLeft = Math.max(0, game.timeLeft - 20);
  updateTimerDisplay();
  var flash = document.createElement('div');
  flash.className = 'penalty-flash';
  document.body.appendChild(flash);
  setTimeout(function() { flash.remove(); }, 500);
  var timerEl = document.getElementById('timer-display');
  var rect = timerEl.getBoundingClientRect();
  var txt = document.createElement('div');
  txt.className = 'penalty-text';
  txt.textContent = '−20s';
  txt.style.left = rect.left + 'px';
  txt.style.top = (rect.bottom + 4) + 'px';
  document.body.appendChild(txt);
  setTimeout(function() { txt.remove(); }, 1000);
  if (game.timeLeft <= 0) endGame();
}

// ===== BOARD REFRESH =====
function refreshBoard() {
  if (!game || !game.isRunning) return;
  showToast('Board cleared!');
  var board = generateBoard(game.gridSize);
  game.letters = board.letters;
  game.findableWords = board.findable;
  game.foundSet = new Set();
  game.selectedPath = [];
  renderGrid(true);
  updateGridSelection();
  setupGridListeners();
  renderHintBar();
}

// ===== HINT BAR (easy mode) =====
var HINT_PENALTY = 10;

function renderHintBar() {
  var bar = document.getElementById('hint-bar');
  var list = document.getElementById('hint-list');
  list.innerHTML = '';

  bar.classList.add('visible');
  var isEasy = game.difficulty === 'easy';
  var isHard = game.difficulty === 'hard';
  var words = Object.keys(game.findableWords).sort(function(a, b) { return a.length - b.length; });

  words.forEach(function(word) {
    var btn = document.createElement('button');
    btn.className = 'hint-btn';
    btn.setAttribute('data-word', word);

    if (game.foundSet.has(word)) {
      btn.classList.add('found');
      btn.innerHTML = '<span class="hint-ru">' + word + '</span><span class="hint-en">' + wordMap[word] + ' <svg style="width:14px;height:14px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
    } else if (isEasy) {
      btn.innerHTML = '<svg class="hint-lamp" style="width:16px;height:16px;fill:#6a9ec0"><use href="#ico-lamp"/></svg><span class="hint-en">' + (wordMap[word] || word) + '</span>';
    } else {
      // Medium & Hard: mystery button
      btn.classList.add('mystery');
      btn.textContent = '?';
    }

    btn.addEventListener('click', function() {
      if (!game || !game.isRunning) return;
      if (btn.classList.contains('found')) return;
      if (!isEasy) return;
      if (btn.classList.contains('revealed')) return;

      btn.classList.add('revealed');
      btn.innerHTML = '<span class="hint-ru">' + word + '</span><span class="hint-en">' + wordMap[word] + '</span>';
      applyHintPenalty();
    });

    list.appendChild(btn);
  });
}

function updateHintBar() {
  if (!game) return;
  var btns = document.querySelectorAll('.hint-btn');
  btns.forEach(function(btn) {
    var word = btn.getAttribute('data-word');
    if (game.foundSet.has(word) && !btn.classList.contains('found')) {
      btn.classList.remove('revealed');
      btn.classList.remove('mystery');
      btn.classList.add('found');
      btn.innerHTML = '<span class="hint-ru">' + word + '</span><span class="hint-en">' + wordMap[word] + ' <svg style="width:14px;height:14px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
    }
  });
}

function applyHintPenalty() {
  game.timeLeft = Math.max(0, game.timeLeft - HINT_PENALTY);
  updateTimerDisplay();

  // Red flash
  var flash = document.createElement('div');
  flash.className = 'penalty-flash';
  document.body.appendChild(flash);
  setTimeout(function() { flash.remove(); }, 500);

  // Floating penalty text
  var timerEl = document.getElementById('timer-display');
  var rect = timerEl.getBoundingClientRect();
  var txt = document.createElement('div');
  txt.className = 'penalty-text';
  txt.textContent = '−10s';
  txt.style.left = rect.left + 'px';
  txt.style.top = (rect.bottom + 4) + 'px';
  document.body.appendChild(txt);
  setTimeout(function() { txt.remove(); }, 1000);

  if (game.timeLeft <= 0) endGame();
}

// ===== END GAME =====
function endGame() {
  stopTimer();
  game.isRunning = false;
  game.timeLeft = 0;
  updateTimerDisplay();
  soundGameEnd();
  showEndModal();
}

function showEndModal() {
  var overlay = document.getElementById('death-overlay');
  var statsDiv = document.getElementById('end-stats');
  var wordsDiv = document.getElementById('end-words');

  var diffLabel = { easy: '4×4 Easy', medium: '4×4 Medium', hard: '5×5 Hard' }[game.difficulty];
  var totalFindable = Object.keys(game.findableWords).length;

  statsDiv.innerHTML =
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Difficulty</span><span style="color:#c8a830;font-weight:700">' + diffLabel + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Words Found</span><span style="color:#5a5;font-weight:700">' + game.wordsFound.length + ' / ' + totalFindable + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Score</span><span style="color:#c8a830;font-weight:700">' + game.score + '</span></div>';

  wordsDiv.innerHTML = '';
  if (game.wordsFound.length === 0) {
    wordsDiv.innerHTML = '<div style="color:#6a6a8a;text-align:center">No words found</div>';
  } else {
    game.wordsFound.sort(function(a, b) { return b.word.length - a.word.length; });
    for (var i = 0; i < game.wordsFound.length; i++) {
      var w = game.wordsFound[i];
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(58,58,94,0.2)';
      row.innerHTML = '<span style="color:#f5e6c8;font-weight:700">' + w.word + '</span><span style="color:#6a9ec0;font-size:12px">' + w.translation + ' (+' + w.points + ')</span>';
      wordsDiv.appendChild(row);
    }
  }
  overlay.classList.remove('hidden');
}

// ===== BUTTON HANDLERS =====
document.getElementById('btn-shuffle').addEventListener('click', shuffleGrid);
document.getElementById('btn-play-again').addEventListener('click', function() {
  document.getElementById('death-overlay').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
});

document.getElementById('btn-share').addEventListener('click', function() {
  var base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/index.html');
  var url = base + '?game=bogglesky';
  shareWithScreenshot('Think you can beat me? 🔠 ' + url);
});

// ===== GRID EVENT LISTENERS =====
function setupGridListeners() {
  var grid = document.getElementById('letter-grid');

  grid.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    var idx = getCellFromPoint(touch.clientX, touch.clientY);
    if (idx >= 0) startDrag(idx, touch.clientX);
  }, { passive: false });

  grid.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    handleDragMove(touch.clientX, touch.clientY);
  }, { passive: false });

  grid.addEventListener('touchend', function(e) {
    e.preventDefault();
    endDrag();
  }, { passive: false });

  grid.addEventListener('mousedown', function(e) {
    var idx = getCellFromPoint(e.clientX, e.clientY);
    if (idx >= 0) startDrag(idx, e.clientX);
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    handleDragMove(e.clientX, e.clientY);
  });

  document.addEventListener('mouseup', function() {
    if (game && game.isDragging) endDrag();
  });
}

// ===== START GAME =====
function startGame() {
  game = initGame();
  renderGrid(true);
  updateUI();
  updateGridSelection();
  setupGridListeners();
  renderHintBar();
  startTimer();
}

// ===== INIT =====
async function init() {
  await loadLanguageConfig();

  // Use language-specific letter pool, fall back to Russian default
  var pool = resolveLetterPool(getActiveLanguage());
  if (pool) LETTER_POOL = pool;

  // Set validation regex for the active language before loading dictionary
  var langConfig = getLanguageConfig(getActiveLanguage());
  if (langConfig && langConfig.validationRegex) {
    setValidationRegex(langConfig.validationRegex);
  }

  var dictUrl = resolveDictionaryUrl(getActiveLanguage(), 'dictionary');
  try {
    dictionary = await loadDictionary(dictUrl);
    dictionary.forEach(function(e) {
      var w = e.word.toLowerCase();
      wordMap[w] = e.translation;
    });
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Could not load dictionary: ' + e.message;
    document.getElementById('start-screen').classList.add('hidden');
    return;
  }

  setupDifficultyToggle(function(diff) { DIFFICULTY = diff; });

  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('start-screen').classList.add('hidden');
    startGame();
  });
}

// Pause/resume hooks
onGamePause(function() { if (game && game.isRunning) stopTimer(); });
onGameResume(function() { if (game && game.isRunning) startTimer(); });

init();
</script>
