<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scramblisky — Russian Anagram Scramble</title>

<style>

/* INFO ROW */
#info-row{
  width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;
  padding:6px 16px;flex-shrink:0;
}
#timer-display{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;transition:color 0.3s}
#timer-display.danger{color:var(--danger);animation:timerPulse 0.5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#words-found-display{font-size:14px;color:var(--info)}

/* PENALTY FLASH */
.penalty-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:90;
  background:rgba(204,68,68,0.15);
  animation:penaltyFade 0.5s ease-out forwards;
}
@keyframes penaltyFade{0%{opacity:1}100%{opacity:0}}

/* HINT AREA */
#hint-area{
  width:100%;max-width:600px;text-align:center;padding:6px 16px;flex-shrink:0;min-height:42px;
}
#translation-hint{font-size:30px;color:#6a9ec0;font-style:italic}
#translation-hint .hint-icon{cursor:pointer;opacity:0.8;transition:opacity 0.2s}
#translation-hint .hint-icon:hover{opacity:1}
#translation-hint .hint-text{margin-left:6px}

/* SCRAMBLE AREA */
#scramble-area{
  width:100%;max-width:600px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1 1 0;min-height:0;padding:8px 16px;gap:20px;
  position:relative;overflow:hidden;
}

/* Letter tiles */
#letter-rack{
  display:flex;flex-direction:column;gap:12px;align-items:center;
  padding:8px;min-height:64px;
}
.rack-row{
  display:flex;gap:12px;justify-content:center;
}
.letter-tile{
  width:clamp(60px,16.5vw,84px);height:clamp(60px,16.5vw,84px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(30px,8vw,45px);font-weight:700;
  background:var(--btn-bg);
  border:2px solid var(--btn-border);border-radius:10px;
  cursor:pointer;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.letter-tile:hover:not(.used){
  border-color:var(--accent);background:var(--btn-bg-active);
  transform:translateY(-3px);box-shadow:0 4px 16px var(--accent-border);
}
.letter-tile.used{opacity:0.25;border-color:#2a2a3a;cursor:default;transform:scale(0.92)}
.letter-tile.exploding{
  animation:explode 0.45s ease-out forwards;
  pointer-events:none;
}
@keyframes explode{
  0%{transform:scale(1);opacity:1}
  40%{transform:scale(1.3) rotate(var(--rot));opacity:0.8}
  100%{transform:scale(0) translate(var(--tx),var(--ty)) rotate(var(--rot2));opacity:0}
}
.letter-tile.growing{
  animation:growIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes growIn{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.1);opacity:1}
  100%{transform:scale(1);opacity:1}
}

/* Answer slots */
#answer-area{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  padding:8px;min-height:64px;
}
.answer-slot{
  width:clamp(40px,11vw,56px);height:clamp(40px,11vw,56px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,5.5vw,30px);font-weight:700;
  background:rgba(200,168,48,0.06);
  border:2px dashed var(--btn-border);border-radius:10px;
  transition:all 0.2s;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.answer-slot.filled{
  border-style:solid;border-color:var(--accent);
  background:linear-gradient(180deg,#3a3a10 0%,#2a2a08 100%);
  color:var(--accent);text-shadow:0 0 8px rgba(200,168,48,0.4);
}
.answer-slot.correct{
  border-color:#5a5;background:linear-gradient(180deg,#2a5a2a 0%,#1a3a1a 100%);
  color:#8f8;box-shadow:0 0 16px rgba(85,170,85,0.3);
  animation:correctPop 0.4s ease;
}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.answer-slot.wrong{
  border-color:#c44;background:linear-gradient(180deg,#5a2a2a 0%,#3a1a1a 100%);
  color:#f88;animation:tileShake 0.4s ease;
}
@keyframes tileShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* Exploding answer slots */
.answer-slot.exploding{
  animation:explode 0.45s ease-out forwards;
  pointer-events:none;
}
.answer-slot.growing{
  animation:growIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

/* FOUND WORDS LIST */
#found-words{
  width:100%;max-width:600px;padding:0 16px;flex-shrink:0;
  max-height:80px;overflow-y:auto;
}
#found-words-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.found-word-tag{
  padding:4px 10px;font-size:12px;font-weight:700;
  background:linear-gradient(180deg,#2a3a2a 0%,#1a2a1a 100%);
  border:1px solid #5a8a5a;border-radius:6px;color:#8f8;
}

/* ACTION BUTTONS */
#action-row{
  width:100%;max-width:600px;display:flex;gap:8px;
  padding:8px 16px 12px;flex-shrink:0;
}
.action-btn{flex:1;min-height:50px;font-size:15px}
#btn-skip{
  background:linear-gradient(180deg,#4a2a1a 0%,#3a1a0a 100%);
  border-color:#8a5a2a;
}

/* Particle container */
.particle{
  position:fixed;pointer-events:none;z-index:80;
  border-radius:50%;will-change:transform,opacity;
}

/* START SCREEN */
#start-screen.hidden{display:none}
#start-inner{margin:0 16px}
#start-title{font-size:18px}
#start-btn{padding:16px 52px;font-size:24px}
/* GAME OVER MODAL */
#death-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.22);display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);padding:20px;
}
#death-overlay.hidden{display:none}
#end-popup{
  width:100%;max-width:400px;background:var(--bg-surface);
  border:1px solid var(--border-subtle);border-radius:12px;padding:24px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
#end-popup h2{font-size:22px;font-weight:700;color:var(--accent)}
#end-stats{width:100%;display:flex;flex-direction:column;gap:8px;font-size:15px}
#end-words{width:100%;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;font-size:13px;border-top:1px solid var(--border-divider);padding-top:8px}
.modal-actions{display:flex;gap:8px;width:100%;justify-content:center;margin-top:4px}
.modal-actions .action-btn{min-height:44px;font-size:14px;flex:1;max-width:140px;border-radius:8px}

/* PENALTY INDICATOR */
.penalty-text{
  position:fixed;z-index:85;pointer-events:none;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  font-size:24px;color:#c44;
  animation:penaltyFloat 1s ease-out forwards;
}
@keyframes penaltyFloat{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-60px)}
}

@media(max-width:400px){
  #top-bar{padding:6px 10px}
  #info-row{padding:4px 10px}
  #action-row{padding:6px 10px 10px}
  .letter-tile{width:54px;height:54px;font-size:27px;border-radius:8px}
  .answer-slot{width:36px;height:36px;font-size:18px;border-radius:8px}
}
</style>

<script>
// ===== GAME-SPECIFIC SOUNDS =====
function soundTap() { playTone(600, 0.08, 'sine', 0.05); }
function soundRemove() { playTone(400, 0.08, 'sine', 0.04); }
function soundCorrect() {
  playTone(523, 0.15, 'sine', 0.1);
  playTone(659, 0.15, 'sine', 0.1, 0.08);
  playTone(784, 0.2, 'sine', 0.12, 0.16);
  playTone(1047, 0.3, 'sine', 0.1, 0.26);
}
function soundWrong() {
  playTone(330, 0.2, 'sawtooth', 0.06);
  playTone(220, 0.3, 'square', 0.04, 0.08);
}
function soundSkip() {
  playTone(500, 0.1, 'triangle', 0.05);
  playTone(400, 0.12, 'triangle', 0.04, 0.06);
}
function soundGameEnd() {
  playTone(523, 0.2, 'sine', 0.1);
  playTone(659, 0.2, 'sine', 0.1, 0.15);
  playTone(784, 0.2, 'sine', 0.1, 0.3);
  playTone(1047, 0.4, 'sine', 0.12, 0.45);
}
function soundExplode() {
  playTone(150, 0.15, 'square', 0.06);
  playTone(100, 0.2, 'sawtooth', 0.04, 0.05);
}

// ===== CONFIG =====
var DIFFICULTY = 'medium';
var STARTING_TIME = 90;
var SKIP_PENALTY = 10;
var WRONG_PENALTY = 20;
var WORD_LEN_RANGES = { easy: [3, 4], medium: [5, 7], hard: [8, 99], extreme: [8, 99] };

// ===== DICTIONARY =====
var dictionary = [];
var wordSet = new Set();

// ===== GAME STATE =====
var game = null;
var timerInterval = null;
var isTransitioning = false;

function initGame() {
  var rng = new SeedEngine(Date.now());
  var range = WORD_LEN_RANGES[DIFFICULTY];
  var candidates = dictionary.filter(function(e) {
    return e.word.length >= range[0] && e.word.length <= range[1];
  });
  if (candidates.length < 10) candidates = dictionary.slice();
  var shuffled = rng.shuffle(candidates);

  var wrongPen = DIFFICULTY === 'easy' ? 15 : 20;

  return {
    wordQueue: shuffled,
    wordIndex: 0,
    score: 0,
    wordsCompleted: 0,
    wordsSkipped: 0,
    wrongAttempts: 0,
    completedWords: [],
    timeLeft: STARTING_TIME,
    difficulty: DIFFICULTY,
    isRunning: false,
    selectedIndices: [],
    scrambledLetters: [],
    currentWord: null,
    rng: rng,
    wrongPenalty: wrongPen
  };
}

function getCurrentWord() {
  if (game.wordIndex >= game.wordQueue.length) {
    game.wordQueue = game.rng.shuffle(game.wordQueue);
    game.wordIndex = 0;
  }
  return game.wordQueue[game.wordIndex];
}

// ===== WORD TRANSITION WITH EXPLOSION + GROW =====
function transitionToNextWord(callback) {
  if (isTransitioning) return;
  isTransitioning = true;

  var rack = document.getElementById('letter-rack');
  var answerArea = document.getElementById('answer-area');
  var tiles = rack.querySelectorAll('.letter-tile');
  var slots = answerArea.querySelectorAll('.answer-slot');

  // Explode current tiles
  var allEls = [];
  tiles.forEach(function(t) { allEls.push(t); });
  slots.forEach(function(s) { allEls.push(s); });

  soundExplode();

  // Spawn particles from each tile
  allEls.forEach(function(el) {
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    spawnParticles(cx, cy, 4);
  });

  // Set random explosion directions on each tile
  allEls.forEach(function(el) {
    var angle = Math.random() * Math.PI * 2;
    var dist = 80 + Math.random() * 120;
    el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    el.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
    el.style.setProperty('--rot2', (Math.random() * 360 - 180) + 'deg');
    el.classList.add('exploding');
  });

  // After explosion, load new word with grow animation
  setTimeout(function() {
    game.wordIndex++;
    game.currentWord = getCurrentWord();
    game.selectedIndices = [];
    game.scrambledLetters = shuffleArray(game.currentWord.word.toLowerCase().split(''));

    renderRack(true); // true = grow animation
    renderAnswer(true);
    updateHint();
    updateUI();

    isTransitioning = false;
    if (callback) callback();
  }, 480);
}

function spawnParticles(cx, cy, count) {
  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 3 + Math.random() * 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    var hue = 30 + Math.random() * 30;
    p.style.background = 'hsl(' + hue + ',80%,60%)';
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    document.body.appendChild(p);

    var angle = Math.random() * Math.PI * 2;
    var speed = 60 + Math.random() * 100;
    var dx = Math.cos(angle) * speed;
    var dy = Math.sin(angle) * speed;
    var dur = 400 + Math.random() * 300;

    animateParticle(p, dx, dy, dur);
  }
}

function animateParticle(el, dx, dy, dur) {
  var start = performance.now();
  var startX = parseFloat(el.style.left);
  var startY = parseFloat(el.style.top);
  function frame(now) {
    var t = (now - start) / dur;
    if (t >= 1) { el.remove(); return; }
    el.style.left = (startX + dx * t) + 'px';
    el.style.top = (startY + dy * t + 40 * t * t) + 'px'; // gravity
    el.style.opacity = 1 - t;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ===== PENALTY VISUAL =====
function showPenalty(seconds) {
  // Red flash
  var flash = document.createElement('div');
  flash.className = 'penalty-flash';
  document.body.appendChild(flash);
  setTimeout(function() { flash.remove(); }, 500);

  // Floating penalty text
  var timerEl = document.getElementById('timer-display');
  var rect = timerEl.getBoundingClientRect();
  var txt = document.createElement('div');
  txt.className = 'penalty-text';
  txt.textContent = '−' + seconds + 's';
  txt.style.left = rect.left + 'px';
  txt.style.top = (rect.bottom + 4) + 'px';
  document.body.appendChild(txt);
  setTimeout(function() { txt.remove(); }, 1000);
}

function applyPenalty(seconds) {
  game.timeLeft = Math.max(0, game.timeLeft - seconds);
  showPenalty(seconds);
  updateTimerDisplay();
  if (game.timeLeft <= 0) {
    endGame();
  }
}

// ===== TIMER =====
function startTimer() {
  game.isRunning = true;
  stopTimer();
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    game.timeLeft--;
    updateTimerDisplay();
    if (game.timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  var el = document.getElementById('timer-display');
  var t = Math.max(0, game.timeLeft);
  var m = Math.floor(t / 60);
  var s = t % 60;
  el.textContent = m + ':' + String(s).padStart(2, '0');
  if (t <= 15) {
    el.classList.add('danger');
  } else {
    el.classList.remove('danger');
  }
}

// ===== INPUT =====
function selectLetter(idx) {
  if (!game || !game.isRunning || isTransitioning) return;
  if (game.selectedIndices.indexOf(idx) !== -1) return;
  if (game.selectedIndices.length >= game.currentWord.word.length) return;

  game.selectedIndices.push(idx);
  soundTap();
  renderRack(false);
  renderAnswer(false);

  // Auto-submit when all slots filled
  if (game.selectedIndices.length === game.currentWord.word.length) {
    setTimeout(function() { checkAnswer(); }, 150);
  }
}

function removeFromAnswer(pos) {
  if (!game || !game.isRunning || isTransitioning) return;
  if (DIFFICULTY === 'extreme') return;
  if (pos < 0 || pos >= game.selectedIndices.length) return;
  game.selectedIndices.splice(pos, 1);
  soundRemove();
  renderRack(false);
  renderAnswer(false);
}

function checkAnswer() {
  if (!game || !game.isRunning || isTransitioning) return;
  var word = game.selectedIndices.map(function(i) { return game.scrambledLetters[i]; }).join('');

  if (word === game.currentWord.word.toLowerCase()) {
    // Correct!
    soundCorrect();
    flashCorrect();
    var points = word.length * 10;
    if (DIFFICULTY === 'hard' || DIFFICULTY === 'extreme') points = Math.round(points * 1.5);
    game.score += points;
    game.wordsCompleted++;
    game.completedWords.push(game.currentWord);
    updateUI();

    setTimeout(function() {
      transitionToNextWord();
    }, 500);
  } else {
    // Wrong — shake, penalize, then move to next word
    soundWrong();
    shakeAnswer();
    game.wrongAttempts++;
    applyPenalty(game.wrongPenalty);

    if (game.timeLeft > 0) {
      setTimeout(function() {
        transitionToNextWord();
      }, 500);
    }
  }
}

function skipWord() {
  if (!game || !game.isRunning || isTransitioning) return;
  soundSkip();
  game.wordsSkipped++;
  applyPenalty(SKIP_PENALTY);
  if (game.timeLeft > 0) {
    transitionToNextWord();
  }
}

function shakeAnswer() {
  var slots = document.querySelectorAll('.answer-slot.filled');
  slots.forEach(function(s) {
    s.classList.add('wrong');
    setTimeout(function() { s.classList.remove('wrong'); }, 400);
  });
}

function flashCorrect() {
  var slots = document.querySelectorAll('.answer-slot.filled');
  slots.forEach(function(s) {
    s.classList.add('correct');
  });
}

// ===== RENDERERS =====
function renderRack(animate) {
  var rack = document.getElementById('letter-rack');
  rack.innerHTML = '';
  var letters = game.scrambledLetters;
  var total = letters.length;
  // Split into rows: max 4 per row, distribute evenly
  var maxPerRow = 4;
  var numRows = Math.ceil(total / maxPerRow);
  var basePerRow = Math.floor(total / numRows);
  var extra = total % numRows;
  var idx = 0;
  for (var r = 0; r < numRows; r++) {
    var rowDiv = document.createElement('div');
    rowDiv.className = 'rack-row';
    var count = basePerRow + (r < extra ? 1 : 0);
    for (var c = 0; c < count; c++) {
      var tile = document.createElement('div');
      tile.className = 'letter-tile';
      if (animate) {
        tile.classList.add('growing');
        tile.style.animationDelay = (idx * 50) + 'ms';
      }
      tile.textContent = letters[idx];
      if (game.selectedIndices.indexOf(idx) !== -1) {
        tile.classList.add('used');
      }
      (function(i) {
        tile.addEventListener('click', function() { selectLetter(i); });
      })(idx);
      rowDiv.appendChild(tile);
      idx++;
    }
    rack.appendChild(rowDiv);
  }
}

function renderAnswer(animate) {
  var area = document.getElementById('answer-area');
  area.innerHTML = '';
  var len = game.currentWord.word.length;
  var allFilled = game.selectedIndices.length === len;
  var isExtreme = DIFFICULTY === 'extreme';

  // In extreme mode, hide the area until all letters are picked
  if (isExtreme && !allFilled) {
    area.style.visibility = 'hidden';
  } else {
    area.style.visibility = 'visible';
  }

  for (var i = 0; i < len; i++) {
    var slot = document.createElement('div');
    slot.className = 'answer-slot';
    if (animate && !isExtreme) {
      slot.classList.add('growing');
      slot.style.animationDelay = (i * 50) + 'ms';
    }
    if (allFilled && isExtreme) {
      slot.classList.add('growing');
      slot.style.animationDelay = (i * 50) + 'ms';
    }
    if (i < game.selectedIndices.length) {
      slot.classList.add('filled');
      slot.textContent = game.scrambledLetters[game.selectedIndices[i]];
      if (!isExtreme) {
        (function(pos) {
          slot.addEventListener('click', function() { removeFromAnswer(pos); });
        })(i);
      }
    }
    area.appendChild(slot);
  }
}

function renderFoundWords() {
  var list = document.getElementById('found-words-list');
  list.innerHTML = '';
  for (var i = game.completedWords.length - 1; i >= Math.max(0, game.completedWords.length - 10); i--) {
    var tag = document.createElement('span');
    tag.className = 'found-word-tag';
    tag.textContent = game.completedWords[i].word;
    list.appendChild(tag);
  }
}

function updateHint() {
  var hintEl = document.getElementById('translation-hint');
  if (!game || !game.currentWord) { hintEl.textContent = ''; return; }
  var iconSvg = '<svg class="icon-star hint-icon" style="fill:#6a9ec0;vertical-align:middle;width:30px;height:30px"><use href="#ico-hint"/></svg>';
  if (DIFFICULTY === 'easy') {
    hintEl.innerHTML = iconSvg + '<span class="hint-text">' + game.currentWord.translation + '</span>';
  } else if (DIFFICULTY === 'medium') {
    hintEl.innerHTML = iconSvg;
    hintEl.querySelector('.hint-icon').addEventListener('click', function() {
      var existing = hintEl.querySelector('.hint-text');
      if (!existing) {
        var span = document.createElement('span');
        span.className = 'hint-text';
        span.textContent = game.currentWord.translation;
        hintEl.appendChild(span);
      }
    });
  } else {
    hintEl.textContent = '';
  }
}

function updateUI() {
  document.getElementById('score-value').textContent = game.score;
  document.getElementById('words-found-display').textContent = 'Words: ' + game.wordsCompleted;
  renderFoundWords();
}

// ===== END GAME =====
function endGame() {
  stopTimer();
  game.isRunning = false;
  game.timeLeft = 0;
  updateTimerDisplay();
  soundGameEnd();
  showEndModal();
  authReady.then(function() {
    if (isSubscriber()) {
      submitScore('scramblisky', getActiveLanguage(), {
        score: game.score,
        difficulty: game.difficulty,
        words_completed: game.wordsCompleted,
        duration_secs: 90,
        details: { wordsSkipped: game.wordsSkipped, wrongAttempts: game.wrongAttempts }
      });
    }
  });
}

function showEndModal() {
  var overlay = document.getElementById('death-overlay');
  var statsDiv = document.getElementById('end-stats');
  var wordsDiv = document.getElementById('end-words');

  var diffLabel = {easy:'Easy',medium:'Medium',hard:'Hard',extreme:'Extreme'}[game.difficulty];

  statsDiv.innerHTML =
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Difficulty</span><span style="color:#c8a830;font-weight:700">' + diffLabel + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Words Solved</span><span style="color:#5a5;font-weight:700">' + game.wordsCompleted + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Words Skipped</span><span style="color:#6a6a8a;font-weight:700">' + game.wordsSkipped + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Wrong Attempts</span><span style="color:#c44;font-weight:700">' + game.wrongAttempts + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Score</span><span style="color:#c8a830;font-weight:700">' + game.score + '</span></div>';

  wordsDiv.innerHTML = '';
  if (game.completedWords.length === 0) {
    wordsDiv.innerHTML = '<div style="color:#6a6a8a;text-align:center">No words solved</div>';
  } else {
    for (var i = 0; i < game.completedWords.length; i++) {
      var w = game.completedWords[i];
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(58,58,94,0.2)';
      row.innerHTML = '<span style="color:#f5e6c8;font-weight:700">' + w.word + '</span><span style="color:#6a9ec0;font-size:12px">' + w.translation + '</span>';
      wordsDiv.appendChild(row);
    }
  }
  overlay.classList.remove('hidden');
}

// ===== BUTTON HANDLERS =====
document.getElementById('btn-skip').addEventListener('click', skipWord);
document.getElementById('btn-clear').addEventListener('click', function() {
  if (!game || !game.isRunning || isTransitioning) return;
  game.selectedIndices = [];
  soundRemove();
  renderRack(false);
  renderAnswer(false);
});

document.getElementById('btn-play-again').addEventListener('click', function() {
  document.getElementById('death-overlay').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
});

document.getElementById('btn-share').addEventListener('click', function() {
  var base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/index.html');
  var url = base + '?game=scramblisky';
  shareWithScreenshot('Think you can beat me? 🔤 ' + url);
});

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (!game || !game.isRunning || isTransitioning) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (game.selectedIndices.length > 0) {
      removeFromAnswer(game.selectedIndices.length - 1);
    }
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    skipWord();
    return;
  }
  var ch = e.key.toLowerCase();
  if (/^[а-яё]$/.test(ch)) {
    for (var i = 0; i < game.scrambledLetters.length; i++) {
      if (game.scrambledLetters[i] === ch && game.selectedIndices.indexOf(i) === -1) {
        selectLetter(i);
        break;
      }
    }
  }
});

// ===== START GAME =====
function startGame() {
  game = initGame();
  game.currentWord = getCurrentWord();
  game.scrambledLetters = shuffleArray(game.currentWord.word.toLowerCase().split(''));

  // Show/hide clear button based on difficulty
  var clearBtn = document.getElementById('btn-clear');
  clearBtn.style.display = (DIFFICULTY === 'hard' || DIFFICULTY === 'extreme') ? 'none' : 'flex';

  renderRack(true);
  renderAnswer(true);
  updateHint();
  updateUI();
  startTimer();
}

// ===== INIT =====
async function init() {
  await loadLanguageConfig();
  var langConfig = getLanguageConfig(getActiveLanguage());
  if (langConfig && langConfig.validationRegex) {
    setValidationRegex(langConfig.validationRegex);
  }
  var dictUrl = resolveDictionaryUrl(getActiveLanguage(), 'dictionary');
  try {
    dictionary = await loadDictionary(dictUrl);
    dictionary.forEach(function(e) { e.word = e.word.toLowerCase(); });
    dictionary.forEach(function(e) { wordSet.add(e.word); });
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Could not load dictionary: ' + e.message;
    document.getElementById('start-screen').classList.add('hidden');
    return;
  }

  setupDifficultyToggle(function(diff) { DIFFICULTY = diff; });

  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('start-screen').classList.add('hidden');
    startGame();
  });
}

// Pause/resume hooks
onGamePause(function() { if (game && game.isRunning) stopTimer(); });
onGameResume(function() { if (game && game.isRunning) startTimer(); });

init();
</script>
