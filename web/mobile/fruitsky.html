<style>
/* ===== TOP BAR ===== */
#top-bar{position:relative}
#score-display{font-size:16px;font-weight:700;color:var(--accent)}
#lives-display{
  display:flex;align-items:center;gap:4px;
  font-size:18px;
}
#lives-display .heart{color:var(--danger);font-size:20px}
#lives-display .heart .icon-heart{width:20px;height:20px;fill:var(--danger)}
#lives-display .heart.lost{opacity:0.2}
#timer-display{
  font-size:16px;font-weight:700;color:var(--accent);
  font-variant-numeric:tabular-nums;
}

/* ===== MAIN WORD DISPLAY ===== */
#main-word-area{
  width:100%;max-width:600px;
  display:flex;flex-direction:column;align-items:center;
  padding:8px 16px 4px;
  flex-shrink:0;
  border-bottom:1px solid var(--accent-border);
}
#main-word{
  font-size:clamp(24px,7vw,40px);
  font-weight:700;
  color:var(--accent);
  text-shadow:0 0 12px var(--accent-glow);
  min-height:44px;
  display:flex;align-items:center;
}
#main-word-translation{
  font-size:14px;color:var(--info);
  margin-top:2px;min-height:20px;
}

/* ===== PLAY AREA ===== */
#play-area{
  flex:1 1 0;
  width:100%;max-width:600px;
  position:relative;
  overflow:hidden;
  touch-action:none;
  -webkit-touch-callout:none;
  min-height:0;
}

/* ===== FLYING WORDS ===== */
.flying-word{
  position:absolute;
  font-size:clamp(16px,4.5vw,22px);
  font-weight:700;
  color:var(--text-primary);
  padding:6px 12px;
  border-radius:8px;
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  white-space:nowrap;
  pointer-events:none;
  will-change:transform;
  transition:opacity 0.3s;
}
.flying-word.synonym{
  border-color:var(--accent-border);
}
.flying-word.distractor{
  border-color:var(--border-subtle);
}
.flying-word.powerup{
  border-color:var(--success);
  color:var(--success-text);
  background:var(--success-bg);
}
.flying-word.bomb{
  border-color:var(--danger);
  color:var(--danger-text);
  background:linear-gradient(180deg,#3a1a1a 0%,#2e1212 100%);
}

/* ===== SWIPE TRAIL ===== */
#swipe-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:10;
}

/* ===== SCREEN FLASH (life loss) ===== */
#screen-flash{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:20;
  border:4px solid transparent;
  border-radius:4px;
  transition:border-color 0.1s;
}
#screen-flash.flash-red{
  border-color:var(--danger);
  animation:flashBorder 0.4s ease-out;
}
@keyframes flashBorder{
  0%{border-color:var(--danger);box-shadow:inset 0 0 30px rgba(204,68,68,0.3)}
  100%{border-color:transparent;box-shadow:none}
}

/* ===== START SCREEN ===== */
#start-screen.hidden{display:none}
#start-inner{margin:0 16px}
#start-title{font-size:22px}
#start-hint{max-width:260px}
#start-btn{padding:18px 56px;font-size:26px}

/* ===== GAME OVER OVERLAY ===== */
#gameover-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.22);
  display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);padding:20px;
}
#gameover-overlay.hidden{display:none}
#gameover-popup h2{font-size:22px;font-weight:700;color:var(--accent)}
#gameover-stats{
  width:100%;display:flex;flex-direction:column;gap:8px;font-size:15px;
}
.stat-row{
  display:flex;justify-content:space-between;
}
.stat-label{color:var(--text-secondary)}
.stat-value{font-weight:700;color:var(--text-primary)}
.stat-value.highlight{color:var(--accent)}

/* ===== ERROR MESSAGE ===== */
/* Uses shared #error-msg from base.css */

/* ===== RESPONSIVE 320–600px ===== */
@media(max-width:400px){
  #main-word{font-size:clamp(20px,6vw,32px)}
  .flying-word{font-size:clamp(14px,4vw,18px);padding:4px 8px}
  #start-title{font-size:18px}
  #start-btn{padding:14px 40px;font-size:22px}
}

<script>
// ===== GAME ENGINE FUNCTIONS =====

function validateWordEntry(entry) {
  if (!entry || typeof entry !== 'object') return false;
  if (typeof entry.word !== 'string' || entry.word.trim() === '') return false;
  if (typeof entry.translation !== 'string' || entry.translation.trim() === '') return false;
  if (!Array.isArray(entry.synonyms) || entry.synonyms.length < 3) return false;

  for (var i = 0; i < entry.synonyms.length; i++) {
    var syn = entry.synonyms[i];
    if (!syn || typeof syn !== 'object') return false;
    if (typeof syn.word !== 'string' || syn.word.trim() === '') return false;
    if (typeof syn.translation !== 'string' || syn.translation.trim() === '') return false;
  }

  return true;
}

async function loadSynonymDictionary(urlOrDeps) {
  var url;
  var _fetch;

  if (typeof urlOrDeps === 'string') {
    url = urlOrDeps;
    _fetch = typeof fetch !== 'undefined' ? fetch : null;
  } else {
    var deps = urlOrDeps || {};
    _fetch = deps.fetch || (typeof fetch !== 'undefined' ? fetch : null);
    var _getActiveLanguage = deps.getActiveLanguage ||
      (typeof getActiveLanguage !== 'undefined' ? getActiveLanguage : null);
    var _resolveDictionaryUrl = deps.resolveDictionaryUrl ||
      (typeof resolveDictionaryUrl !== 'undefined' ? resolveDictionaryUrl : null);

    if (!_getActiveLanguage) throw new Error('getActiveLanguage is not available');
    if (!_resolveDictionaryUrl) throw new Error('resolveDictionaryUrl is not available');

    var langId = _getActiveLanguage();
    url = _resolveDictionaryUrl(langId, 'fruitsky');
  }

  if (!_fetch) throw new Error('fetch is not available');

  var resp = await _fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);

  var data = await resp.json();

  if (!data || typeof data !== 'object') {
    throw new Error('Invalid dictionary format');
  }

  var words = Array.isArray(data.words) ? data.words.filter(validateWordEntry) : [];

  if (words.length === 0) {
    throw new Error('No valid word entries in dictionary');
  }

  var distractors = Array.isArray(data.distractors) ? data.distractors : [];
  if (distractors.length === 0) {
    throw new Error('Dictionary must contain at least one distractor');
  }

  return { words: words, distractors: distractors };
}

function createInitialState(dictionary) {
  var idx = Math.floor(Math.random() * dictionary.words.length);
  return {
    score: 0,
    lives: 3,
    timeRemaining: 60,
    elapsedTime: 0,
    currentMainWord: dictionary.words[idx],
    collectedSynonyms: new Set(),
    wordsCompleted: 0,
    totalSynonymsSlashed: 0,
    activeWords: [],
    phase: 'playing'
  };
}

function processSlash(state, wordType, synonymWord) {
  var newState = {
    score: state.score,
    lives: state.lives,
    timeRemaining: state.timeRemaining,
    elapsedTime: state.elapsedTime,
    currentMainWord: state.currentMainWord,
    collectedSynonyms: new Set(state.collectedSynonyms),
    wordsCompleted: state.wordsCompleted,
    totalSynonymsSlashed: state.totalSynonymsSlashed,
    activeWords: state.activeWords,
    phase: state.phase
  };

  if (wordType === 'synonym') {
    newState.score += 10;
    newState.totalSynonymsSlashed += 1;
    if (synonymWord) {
      newState.collectedSynonyms.add(synonymWord);
    }
  } else if (wordType === 'distractor') {
    newState.lives -= 1;
    if (newState.lives <= 0) {
      newState.lives = 0;
      newState.phase = 'gameover';
    }
  } else if (wordType === 'powerup') {
    newState.timeRemaining += 5;
  } else if (wordType === 'bomb') {
    newState.timeRemaining = Math.max(0, newState.timeRemaining - 5);
  }

  return newState;
}

function allSynonymsCollected(state) {
  return state.collectedSynonyms.size === state.currentMainWord.synonyms.length;
}

function rotateMainWord(state, dictionary) {
  var newState = {
    score: state.score + 25,
    lives: state.lives,
    timeRemaining: state.timeRemaining,
    elapsedTime: state.elapsedTime,
    currentMainWord: state.currentMainWord,
    collectedSynonyms: new Set(),
    wordsCompleted: state.wordsCompleted + 1,
    totalSynonymsSlashed: state.totalSynonymsSlashed,
    activeWords: state.activeWords,
    phase: state.phase
  };

  if (dictionary.words.length > 1) {
    var idx;
    do {
      idx = Math.floor(Math.random() * dictionary.words.length);
    } while (dictionary.words[idx].word === state.currentMainWord.word);
    newState.currentMainWord = dictionary.words[idx];
  } else {
    newState.currentMainWord = dictionary.words[0];
  }

  return newState;
}

function createTimer(seconds) {
  return { timeRemaining: seconds !== undefined ? seconds : 60 };
}

function tickTimer(timer, dt) {
  return { timeRemaining: Math.max(0, timer.timeRemaining - dt) };
}

function modifyTimer(timer, delta) {
  return { timeRemaining: Math.max(0, timer.timeRemaining + delta) };
}

function computeDifficulty(elapsedSeconds) {
  var t = Math.min(Math.max(elapsedSeconds / 60, 0), 1);

  return {
    launchSpeed: 1.0 + t * 1.0,
    launchInterval: 1500 - t * 900,
    distractorRatio: 0.3 + t * 0.4,
    maxSimultaneous: Math.round(3 + t * 2)
  };
}

var _flyingWordIdCounter = 0;

function createFlyingWord(text, type, playAreaWidth, playAreaHeight) {
  var margin = playAreaWidth * 0.1;
  var x = margin + Math.random() * (playAreaWidth - 2 * margin);

  var y = playAreaHeight + Math.random() * 20;

  var baseVy = -(playAreaHeight * 0.8);
  var vy = baseVy + (Math.random() - 0.5) * (playAreaHeight * 0.3);

  var vx = (Math.random() - 0.5) * (playAreaWidth * 0.3);

  var gravity = playAreaHeight * 0.8;

  _flyingWordIdCounter += 1;
  var id = 'fw-' + _flyingWordIdCounter + '-' + Date.now();

  return {
    id: id,
    text: text,
    type: type,
    x: x,
    y: y,
    vx: vx,
    vy: vy,
    gravity: gravity,
    launchTime: Date.now(),
    el: null,
    slashed: false
  };
}

function updateWordPosition(word, dt, playAreaHeight) {
  word.vy += word.gravity * dt;
  word.x += word.vx * dt;
  word.y += word.vy * dt;

  if (word.y > playAreaHeight && word.vy > 0) {
    return false;
  }

  return true;
}

function selectNextWord(state, dictionary, difficulty) {
  var roll = Math.random();

  if (roll < 0.10) {
    return { text: '+5s', translation: '+5s', type: 'powerup' };
  }

  if (roll < 0.18) {
    return { text: '-5s', translation: '-5s', type: 'bomb' };
  }

  var unslashed = state.currentMainWord.synonyms.filter(function (syn) {
    return !state.collectedSynonyms.has(syn.word);
  });

  var pickDistractor = Math.random() < difficulty.distractorRatio || unslashed.length === 0;

  if (pickDistractor) {
    var d = dictionary.distractors[Math.floor(Math.random() * dictionary.distractors.length)];
    return { text: d.word, translation: d.translation, type: 'distractor' };
  }

  var syn = unslashed[Math.floor(Math.random() * unslashed.length)];
  return { text: syn.word, translation: syn.translation, type: 'synonym' };
}

function segmentIntersectsRect(segment, rect) {
  var dx = segment.x2 - segment.x1;
  var dy = segment.y2 - segment.y1;

  var xmin = rect.x;
  var xmax = rect.x + rect.width;
  var ymin = rect.y;
  var ymax = rect.y + rect.height;

  var p = [-dx, dx, -dy, dy];
  var q = [
    segment.x1 - xmin,
    xmax - segment.x1,
    segment.y1 - ymin,
    ymax - segment.y1
  ];

  var tMin = 0;
  var tMax = 1;

  for (var i = 0; i < 4; i++) {
    if (p[i] === 0) {
      if (q[i] < 0) {
        return false;
      }
    } else {
      var t = q[i] / p[i];
      if (p[i] < 0) {
        if (t > tMin) tMin = t;
      } else {
        if (t < tMax) tMax = t;
      }
      if (tMin > tMax) {
        return false;
      }
    }
  }

  return true;
}

function initSwipeDetector(playArea, getActiveWords, onSlash) {
  var swipePoints = [];
  var cumulativeLength = 0;
  var isSwiping = false;
  var usedTouch = false;

  function getPlayAreaRelativePoint(clientX, clientY) {
    var rect = playArea.getBoundingClientRect();
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function distance(p1, p2) {
    var dx = p2.x - p1.x;
    var dy = p2.y - p1.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function checkIntersections(p1, p2) {
    var segment = { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
    var areaRect = playArea.getBoundingClientRect();
    var words = getActiveWords();
    for (var i = 0; i < words.length; i++) {
      var word = words[i];
      if (word.slashed || !word.el) continue;
      var wr = word.el.getBoundingClientRect();
      var relRect = {
        x: wr.left - areaRect.left,
        y: wr.top - areaRect.top,
        width: wr.width,
        height: wr.height
      };
      if (segmentIntersectsRect(segment, relRect)) {
        word.slashed = true;
        onSlash(word.id);
      }
    }
  }

  function startSwipe(x, y) {
    var pt = getPlayAreaRelativePoint(x, y);
    swipePoints = [pt];
    cumulativeLength = 0;
    isSwiping = true;
  }

  function moveSwipe(x, y) {
    if (!isSwiping) return;
    var pt = getPlayAreaRelativePoint(x, y);
    var prev = swipePoints[swipePoints.length - 1];
    var segLen = distance(prev, pt);
    cumulativeLength += segLen;
    swipePoints.push(pt);

    // Render swipe trail on canvas
    renderSwipeTrail(swipePoints);

    if (cumulativeLength >= 20) {
      checkIntersections(prev, pt);
    }
  }

  function endSwipe() {
    isSwiping = false;
    swipePoints = [];
    cumulativeLength = 0;
    clearSwipeTrail();
  }

  playArea.addEventListener('touchstart', function(e) {
    e.preventDefault();
    usedTouch = true;
    var touch = e.touches[0];
    startSwipe(touch.clientX, touch.clientY);
  }, { passive: false });

  playArea.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    moveSwipe(touch.clientX, touch.clientY);
  }, { passive: false });

  playArea.addEventListener('touchend', function(e) {
    e.preventDefault();
    endSwipe();
  }, { passive: false });

  playArea.addEventListener('pointerdown', function(e) {
    if (usedTouch) return;
    startSwipe(e.clientX, e.clientY);
  });

  playArea.addEventListener('pointermove', function(e) {
    if (usedTouch) return;
    moveSwipe(e.clientX, e.clientY);
  });

  playArea.addEventListener('pointerup', function(e) {
    if (usedTouch) return;
    endSwipe();
  });
}

// Global state
var dictionary = null;
var gameState = null;

// Load dictionary on page load
async function initGame() {
  try {
    await loadLanguageConfig();
    dictionary = await loadSynonymDictionary();
    // Show start screen
    document.getElementById('start-screen').classList.remove('hidden');
  } catch (err) {
    document.getElementById('error-msg').textContent = 'Could not load dictionary: ' + err.message;
    document.getElementById('error-msg').style.display = 'block';
    console.error('Dictionary load failed:', err);
  }
}

document.addEventListener('DOMContentLoaded', initGame);

// ===== GAME LOOP =====

var lastFrameTime = 0;
var lastLaunchTime = 0;
var animFrameId = null;

function formatTimer(seconds) {
  var s = Math.ceil(seconds);
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function updateUI() {
  document.getElementById('score-display').textContent = gameState.score;
  document.getElementById('timer-display').textContent = formatTimer(gameState.timeRemaining);
  var hearts = document.querySelectorAll('#lives-display .heart');
  for (var i = 0; i < hearts.length; i++) {
    if (i < gameState.lives) {
      hearts[i].classList.remove('lost');
    } else {
      hearts[i].classList.add('lost');
    }
  }
}

function updateMainWordDisplay() {
  document.getElementById('main-word').textContent = gameState.currentMainWord.word;
  document.getElementById('main-word-translation').textContent = gameState.currentMainWord.translation;
}

function showGameOver() {
  document.getElementById('final-score').textContent = gameState.score;
  document.getElementById('final-words').textContent = gameState.wordsCompleted;
  document.getElementById('final-synonyms').textContent = gameState.totalSynonymsSlashed;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  authReady.then(function() {
    if (isSubscriber()) {
      submitScore('fruitsky', getActiveLanguage(), {
        score: gameState.score,
        words_completed: gameState.wordsCompleted,
        duration_secs: 60,
        details: { totalSynonymsSlashed: gameState.totalSynonymsSlashed }
      });
    }
  });
}

function launchWord(diff) {
  var playArea = document.getElementById('play-area');
  var playAreaWidth = playArea.clientWidth;
  var playAreaHeight = playArea.clientHeight;

  var wordData = selectNextWord(gameState, dictionary, diff);
  var flyingWord = createFlyingWord(wordData.text, wordData.type, playAreaWidth, playAreaHeight);

  var el = document.createElement('div');
  el.className = 'flying-word ' + flyingWord.type;
  el.textContent = flyingWord.text;
  el.style.transform = 'translate(' + flyingWord.x + 'px,' + flyingWord.y + 'px)';
  playArea.appendChild(el);

  flyingWord.el = el;
  gameState.activeWords.push(flyingWord);
}

function handleSlash(wordId) {
  var word = null;
  for (var i = 0; i < gameState.activeWords.length; i++) {
    if (gameState.activeWords[i].id === wordId) {
      word = gameState.activeWords[i];
      break;
    }
  }
  if (!word) return;

  var result = processSlash(gameState, word.type, word.text);
  gameState.score = result.score;
  gameState.lives = result.lives;
  gameState.timeRemaining = result.timeRemaining;
  gameState.totalSynonymsSlashed = result.totalSynonymsSlashed;
  gameState.collectedSynonyms = result.collectedSynonyms;
  gameState.phase = result.phase;

  if (word.type === 'synonym') {
    if (allSynonymsCollected(gameState)) {
      var rotated = rotateMainWord(gameState, dictionary);
      gameState.score = rotated.score;
      gameState.wordsCompleted = rotated.wordsCompleted;
      gameState.currentMainWord = rotated.currentMainWord;
      gameState.collectedSynonyms = rotated.collectedSynonyms;
      updateMainWordDisplay();
    }
  }

  if (word.type === 'distractor' && gameState.lives <= 0) {
    gameState.phase = 'gameover';
  }

  // Animate slashed word based on type
  if (word.el) {
    if (word.type === 'synonym') {
      animateSynonymSlash(word.el);
      playSynonymTone();
    } else if (word.type === 'distractor') {
      animateDistractorSlash(word.el);
      playDistractorTone();
      flashScreenBorder();
    } else {
      // Power-up / bomb: simple fade-out
      word.el.style.opacity = '0';
      var elRef = word.el;
      setTimeout(function() {
        if (elRef.parentNode) elRef.parentNode.removeChild(elRef);
      }, 300);
    }
  }
  gameState.activeWords = gameState.activeWords.filter(function(w) {
    return w.id !== wordId;
  });

  updateUI();

  if (gameState.phase === 'gameover') {
    if (animFrameId) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    showGameOver();
  }
}

function gameLoop(timestamp) {
  if (gameState.phase !== 'playing') return;

  if (lastFrameTime === 0) {
    lastFrameTime = timestamp;
    lastLaunchTime = timestamp;
    animFrameId = requestAnimationFrame(gameLoop);
    return;
  }

  var dt = (timestamp - lastFrameTime) / 1000;
  if (dt > 0.1) dt = 0.1;
  lastFrameTime = timestamp;

  // Update elapsed time
  gameState.elapsedTime += dt;

  // Tick timer
  gameState.timeRemaining = tickTimer({ timeRemaining: gameState.timeRemaining }, dt).timeRemaining;

  // Check game over by timer
  if (gameState.timeRemaining <= 0) {
    gameState.phase = 'gameover';
    updateUI();
    showGameOver();
    return;
  }

  // Get current difficulty
  var diff = computeDifficulty(gameState.elapsedTime);

  // Launch new words based on difficulty interval
  if (timestamp - lastLaunchTime >= diff.launchInterval && gameState.activeWords.length < diff.maxSimultaneous) {
    launchWord(diff);
    lastLaunchTime = timestamp;
  }

  // Update word positions
  var playArea = document.getElementById('play-area');
  var playAreaHeight = playArea.clientHeight;
  var stillActive = [];

  for (var i = 0; i < gameState.activeWords.length; i++) {
    var word = gameState.activeWords[i];
    var alive = updateWordPosition(word, dt, playAreaHeight);
    if (alive) {
      word.el.style.transform = 'translate(' + word.x + 'px,' + word.y + 'px)';
      stillActive.push(word);
    } else {
      // Off-screen: fade out and remove DOM element
      if (word.el) {
        word.el.style.opacity = '0';
        var elRef = word.el;
        setTimeout(function() {
          if (elRef.parentNode) elRef.parentNode.removeChild(elRef);
        }, 300);
      }
    }
  }
  gameState.activeWords = stillActive;

  // Update UI
  updateUI();

  // Request next frame
  animFrameId = requestAnimationFrame(gameLoop);
}

function startGame() {
  // Initialize game state
  gameState = createInitialState(dictionary);

  // Clear any existing flying words from DOM
  var playArea = document.getElementById('play-area');
  var existingWords = playArea.querySelectorAll('.flying-word');
  for (var i = 0; i < existingWords.length; i++) {
    existingWords[i].parentNode.removeChild(existingWords[i]);
  }

  // Reset UI
  updateUI();
  updateMainWordDisplay();

  // Hide start screen and game over overlay
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');

  // Init swipe canvas for trail rendering
  initSwipeCanvas();

  // Init swipe detector
  initSwipeDetector(playArea, function() {
    return gameState.activeWords;
  }, handleSlash);

  // Reset timing
  lastFrameTime = 0;
  lastLaunchTime = 0;

  // Cancel any existing animation frame
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
  }

  // Start the game loop
  animFrameId = requestAnimationFrame(gameLoop);
}

// ===== VISUAL EFFECTS =====

var swipeCtx = null;
var swipeCanvasEl = null;
var trailClearTimer = null;

function initSwipeCanvas() {
  swipeCanvasEl = document.getElementById('swipe-canvas');
  var playArea = document.getElementById('play-area');
  swipeCanvasEl.width = playArea.clientWidth;
  swipeCanvasEl.height = playArea.clientHeight;
  swipeCtx = swipeCanvasEl.getContext('2d');
}

function renderSwipeTrail(points) {
  if (!swipeCtx || points.length < 2) return;
  swipeCtx.clearRect(0, 0, swipeCanvasEl.width, swipeCanvasEl.height);
  swipeCtx.beginPath();
  swipeCtx.moveTo(points[0].x, points[0].y);
  for (var i = 1; i < points.length; i++) {
    swipeCtx.lineTo(points[i].x, points[i].y);
  }
  swipeCtx.strokeStyle = 'rgba(255,215,0,0.6)';
  swipeCtx.lineWidth = 3;
  swipeCtx.lineCap = 'round';
  swipeCtx.lineJoin = 'round';
  swipeCtx.stroke();
}

function clearSwipeTrail() {
  if (!swipeCtx) return;
  if (trailClearTimer) clearTimeout(trailClearTimer);
  trailClearTimer = setTimeout(function() {
    swipeCtx.clearRect(0, 0, swipeCanvasEl.width, swipeCanvasEl.height);
  }, 80);
}

function animateSynonymSlash(el) {
  var text = el.textContent;
  var mid = Math.ceil(text.length / 2);
  var leftText = text.slice(0, mid);
  var rightText = text.slice(mid);

  var rect = el.getBoundingClientRect();
  var parentRect = el.parentNode.getBoundingClientRect();
  var startX = rect.left - parentRect.left;
  var startY = rect.top - parentRect.top;

  el.style.opacity = '0';

  var leftHalf = document.createElement('div');
  leftHalf.className = 'flying-word synonym';
  leftHalf.textContent = leftText;
  leftHalf.style.position = 'absolute';
  leftHalf.style.left = startX + 'px';
  leftHalf.style.top = startY + 'px';
  leftHalf.style.transition = 'transform 0.5s ease-out, opacity 0.5s ease-out';
  leftHalf.style.pointerEvents = 'none';

  var rightHalf = document.createElement('div');
  rightHalf.className = 'flying-word synonym';
  rightHalf.textContent = rightText;
  rightHalf.style.position = 'absolute';
  rightHalf.style.left = (startX + rect.width / 2) + 'px';
  rightHalf.style.top = startY + 'px';
  rightHalf.style.transition = 'transform 0.5s ease-out, opacity 0.5s ease-out';
  rightHalf.style.pointerEvents = 'none';

  el.parentNode.appendChild(leftHalf);
  el.parentNode.appendChild(rightHalf);

  requestAnimationFrame(function() {
    leftHalf.style.transform = 'translate(-30px, 60px) rotate(-15deg)';
    leftHalf.style.opacity = '0';
    rightHalf.style.transform = 'translate(30px, 60px) rotate(15deg)';
    rightHalf.style.opacity = '0';
  });

  setTimeout(function() {
    if (leftHalf.parentNode) leftHalf.parentNode.removeChild(leftHalf);
    if (rightHalf.parentNode) rightHalf.parentNode.removeChild(rightHalf);
    if (el.parentNode) el.parentNode.removeChild(el);
  }, 550);
}

function animateDistractorSlash(el) {
  el.style.transition = 'background 0.1s, border-color 0.1s, transform 0.08s, opacity 0.3s';
  el.style.background = 'var(--danger)';
  el.style.borderColor = 'var(--danger)';
  el.style.color = '#fff';

  // Shake
  var origTransform = el.style.transform;
  el.style.transform = origTransform + ' translateX(4px)';
  setTimeout(function() {
    el.style.transform = origTransform + ' translateX(-4px)';
  }, 60);
  setTimeout(function() {
    el.style.transform = origTransform + ' translateX(2px)';
  }, 120);
  setTimeout(function() {
    el.style.transform = origTransform;
    el.style.opacity = '0';
  }, 180);
  setTimeout(function() {
    if (el.parentNode) el.parentNode.removeChild(el);
  }, 500);
}

function flashScreenBorder() {
  var flash = document.getElementById('screen-flash');
  flash.classList.remove('flash-red');
  // Force reflow to restart animation
  void flash.offsetWidth;
  flash.classList.add('flash-red');
  flash.addEventListener('animationend', function handler() {
    flash.classList.remove('flash-red');
    flash.removeEventListener('animationend', handler);
  });
}

// ===== AUDIO INTEGRATION =====

function playSynonymTone() {
  try {
    playTone(880, 0.15, 'sine', 0.12);
    playTone(1100, 0.12, 'sine', 0.1, 0.1);
  } catch(e) {}
}

function playDistractorTone() {
  try {
    playTone(220, 0.25, 'square', 0.1);
  } catch(e) {}
}

  startGame();
});

document.getElementById('btn-play-again').addEventListener('click', function() {

});
