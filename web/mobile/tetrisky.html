/* TOP BAR */

/* WORD AREA */
#word-area{
  width:100%;max-width:600px;
  display:flex;flex-direction:column;align-items:center;
  padding:6px 16px 4px;flex-shrink:0;
}
#target-word{
  font-size:clamp(22px,6vw,36px);font-weight:700;
  letter-spacing:3px;min-height:40px;
  display:flex;align-items:center;gap:2px;
}
#target-word .letter{display:inline-block;transition:all 0.3s}
#target-word .letter.found{color:#5a8a3a;text-shadow:0 0 8px rgba(90,138,58,0.5)}
#target-word .letter.current{color:var(--accent);text-shadow:0 0 12px rgba(200,168,48,0.6);animation:pulse 1s ease-in-out infinite}
#target-word .letter.pending{color:var(--btn-border)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
#word-translation{font-size:14px;color:#6a9ec0;margin-top:2px;min-height:20px}
#words-completed{font-size:12px;color:var(--text-secondary);margin-top:2px}

/* GRID */
#grid-container{
  flex:1 1 0;width:100%;max-width:600px;
  display:flex;align-items:center;justify-content:center;
  padding:4px;min-height:0;overflow:hidden;
}
#game-grid{
  display:grid;gap:1px;
  background:var(--accent-subtle);
  border:1px solid rgba(200,168,48,0.15);
  border-radius:4px;
}
.cell{
  background:rgba(14,14,26,0.9);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:clamp(14px,3.5vw,22px);
  border-radius:2px;transition:background 0.15s;
}
.cell.falling{
  color:var(--accent);background:rgba(200,168,48,0.18);
  text-shadow:0 0 6px rgba(200,168,48,0.4);
  border:1px solid rgba(200,168,48,0.3);
}
.cell.landed{
  color:var(--text-secondary);background:rgba(74,74,126,0.15);
}
.cell.target-letter{
  color:var(--accent);background:rgba(200,168,48,0.12);
  text-shadow:0 0 6px rgba(200,168,48,0.4);
  animation:cellGlow 1.2s ease-in-out infinite;
}
@keyframes cellGlow{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 8px rgba(200,168,48,0.3)}}
.cell.clearing{
  background:rgba(90,138,58,0.4);color:#8f8;
  animation:clearFlash 0.4s ease-out;
}
@keyframes clearFlash{0%{background:rgba(90,138,58,0.8);transform:scale(1.1)}100%{background:rgba(90,138,58,0);transform:scale(1)}}
.cell.ghost{
  color:rgba(200,168,48,0.2);
  border:1px dashed rgba(200,168,48,0.15);
  background:transparent;
}

/* CONTROLS */
#controls{
  width:100%;max-width:600px;
  display:flex;gap:8px;
  padding:8px 16px 12px;flex-shrink:0;
}
.ctrl-btn{flex:1;min-height:56px;font-size:24px}
#btn-drop{font-size:18px}

/* START SCREEN */
#start-screen.hidden{display:none}
#start-inner{margin:0 16px}
#start-title{font-size:22px}
#start-btn{padding:18px 56px;font-size:26px}
#start-hint{font-size:12px;color:var(--text-secondary);text-align:center;max-width:260px}

/* GAME OVER MODAL */
#death-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(8,8,16,0.22);display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);padding:20px;
}
#death-overlay.hidden{display:none}
#death-popup h2{font-size:22px;font-weight:700;color:var(--accent)}
#death-stats{width:100%;display:flex;flex-direction:column;gap:8px;font-size:15px}
#death-words{width:100%;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;font-size:13px;border-top:1px solid var(--border-divider);padding-top:8px}
.modal-actions{display:flex;gap:8px;width:100%;justify-content:center;flex-wrap:wrap;margin-top:4px}
.modal-actions .ctrl-btn{min-height:44px;font-size:14px;flex:1;max-width:140px;border-radius:8px}
</style>

</svg>

<div id="start-screen">
  <div id="start-inner">
    <div id="start-title"><svg style="width:28px;height:28px;fill:#c8a830;vertical-align:middle;margin-right:6px"><use href="#ico-tetris"/></svg>TETRISKY</div>
    <div id="start-hint">Letters fall from above. Form Russian words horizontally or vertically before the board fills up.</div>
    <div id="difficulty-toggle">
      <button class="diff-btn" data-diff="easy"><svg class="diff-icon"><use href="#ico-easy"/></svg>Easy</button>

<script src="../shared/engine.js"></script>
<script>
// ===== GAME-SPECIFIC SOUNDS =====
function soundLand() { playTone(200, 0.15, 'sine', 0.06); }
function soundMove() { playTone(440, 0.08, 'sine', 0.04); }
function soundWordComplete() {
  playTone(523, 0.15, 'sine', 0.1);
  playTone(659, 0.15, 'sine', 0.1, 0.1);
  playTone(784, 0.2, 'sine', 0.12, 0.2);
  playTone(1047, 0.3, 'sine', 0.1, 0.3);
}
function soundDeath() {
  playTone(330, 0.25, 'sawtooth', 0.07);
  playTone(220, 0.35, 'square', 0.05, 0.1);
}
function soundDrop() { playTone(150, 0.12, 'square', 0.05); }

// ===== RUSSIAN ALPHABET =====
var CYRILLIC = 'абвгдежзиклмнопрстуфхцчшщэюя'.split('');

// ===== GAME CONSTANTS =====
var COLS = 8;
var ROWS = 14;
var TICK_SPEEDS = { easy: 1200, medium: 800, hard: 500 };
var DIFF_LABELS = { easy: 'Easy', medium: 'Medium', hard: 'Hard' };

// ===== GAME STATE =====
var state = null;
var dictionary = [];
var wordSet = new Set();
var loopId = null;
var gridCells = [];
var DIFFICULTY = 'medium';

// ===== INIT GAME STATE =====
function initGameState(seed) {
  var rng = new SeedEngine(seed);
  var board = [];
  for (var r = 0; r < ROWS; r++) {
    board[r] = [];
    for (var c = 0; c < COLS; c++) {
      board[r][c] = null;
    }
  }

  // Pick a target word
  var shuffled = rng.shuffle(dictionary);
  var targetWord = shuffled[0];

  return {
    board: board,
    falling: null, // {row, col, letter}
    score: 0,
    wordsCompleted: 0,
    completedWords: [],
    startTime: Date.now(),
    isRunning: true,
    seed: seed,
    rng: rng,
    wordQueue: shuffled,
    wordQueueIndex: 0,
    targetWord: targetWord,
    targetProgress: 0, // letters of target found in order
    difficulty: DIFFICULTY,
    tickSpeed: TICK_SPEEDS[DIFFICULTY],
    letterBag: [],
    totalLinesCleared: 0
  };
}

// ===== LETTER GENERATION =====
// Weighted: target word letters appear more often
function pickNextLetter(s) {
  // 40% chance: letter from target word (unfound portion)
  var remaining = s.targetWord.word.slice(s.targetProgress);
  if (remaining.length > 0 && s.rng.next() < 0.4) {
    return remaining[s.rng.nextInt(remaining.length)];
  }
  // 30% chance: letter from any dictionary word
  if (s.rng.next() < 0.5) {
    var w = dictionary[s.rng.nextInt(dictionary.length)].word;
    return w[s.rng.nextInt(w.length)];
  }
  // 30% chance: random Cyrillic
  return CYRILLIC[s.rng.nextInt(CYRILLIC.length)];
}

function spawnPiece(s) {
  var col = s.rng.nextInt(COLS);
  var letter = pickNextLetter(s);
  s.falling = { row: 0, col: col, letter: letter };
  // Check if spawn position is occupied = game over
  if (s.board[0][col] !== null) {
    s.isRunning = false;
  }
}

// ===== WORD DETECTION =====
// Scan board for any complete dictionary words (horizontal L→R, vertical T→B)
function findWords(s) {
  var found = [];

  // Horizontal scan
  for (var r = 0; r < ROWS; r++) {
    for (var startC = 0; startC < COLS; startC++) {
      if (s.board[r][startC] === null) continue;
      var str = '';
      var cells = [];
      for (var c = startC; c < COLS && s.board[r][c] !== null; c++) {
        str += s.board[r][c];
        cells.push({ r: r, c: c });
        if (str.length >= 3 && wordSet.has(str)) {
          found.push({ word: str, cells: cells.slice(), dir: 'h' });
        }
      }
    }
  }

  // Vertical scan
  for (var c = 0; c < COLS; c++) {
    for (var startR = 0; startR < ROWS; startR++) {
      if (s.board[startR][c] === null) continue;
      var str = '';
      var cells = [];
      for (var r = startR; r < ROWS && s.board[r][c] !== null; r++) {
        str += s.board[r][c];
        cells.push({ r: r, c: c });
        if (str.length >= 3 && wordSet.has(str)) {
          found.push({ word: str, cells: cells.slice(), dir: 'v' });
        }
      }
    }
  }

  // Deduplicate: keep longest words, remove subsets
  found.sort(function(a, b) { return b.word.length - a.word.length; });
  var usedCells = new Set();
  var result = [];
  for (var i = 0; i < found.length; i++) {
    var overlap = false;
    for (var j = 0; j < found[i].cells.length; j++) {
      var key = found[i].cells[j].r + ',' + found[i].cells[j].c;
      if (usedCells.has(key)) { overlap = true; break; }
    }
    if (!overlap) {
      result.push(found[i]);
      for (var j = 0; j < found[i].cells.length; j++) {
        usedCells.add(found[i].cells[j].r + ',' + found[i].cells[j].c);
      }
    }
  }
  return result;
}

// ===== CLEAR WORDS & GRAVITY =====
function clearWords(s, words) {
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    var dictEntry = dictionary.find(function(d) { return d.word === w.word; });
    var translation = dictEntry ? dictEntry.translation : '';
    s.completedWords.push({ word: w.word, translation: translation });
    s.wordsCompleted++;
    s.score += w.word.length * 10;

    // Check if this matches target word
    if (w.word === s.targetWord.word.toLowerCase()) {
      s.score += 50; // bonus
      advanceTarget(s);
    }

    // Mark cells for clearing animation
    for (var j = 0; j < w.cells.length; j++) {
      var cell = w.cells[j];
      s.board[cell.r][cell.c] = null;
    }
    s.totalLinesCleared += w.cells.length;
  }
}

function applyGravity(s) {
  for (var c = 0; c < COLS; c++) {
    var writeRow = ROWS - 1;
    for (var r = ROWS - 1; r >= 0; r--) {
      if (s.board[r][c] !== null) {
        if (writeRow !== r) {
          s.board[writeRow][c] = s.board[r][c];
          s.board[r][c] = null;
        }
        writeRow--;
      }
    }
  }
}

function advanceTarget(s) {
  s.wordQueueIndex++;
  if (s.wordQueueIndex >= s.wordQueue.length) {
    s.wordQueue = s.rng.shuffle(dictionary);
    s.wordQueueIndex = 0;
  }
  s.targetWord = s.wordQueue[s.wordQueueIndex];
  s.targetProgress = 0;
  // Speed up slightly
  s.tickSpeed = Math.max(300, s.tickSpeed - 30);
}

// ===== GAME TICK =====
function tick() {
  if (!state || !state.isRunning) return;

  if (!state.falling) {
    spawnPiece(state);
    if (!state.isRunning) { gameOver(); return; }
    render();
    return;
  }

  var f = state.falling;
  var nextRow = f.row + 1;

  // Check if can fall further
  if (nextRow >= ROWS || state.board[nextRow][f.col] !== null) {
    // Land the piece
    state.board[f.row][f.col] = f.letter;
    state.falling = null;
    soundLand();

    // Check for words
    var words = findWords(state);
    if (words.length > 0) {
      soundWordComplete();
      clearWords(state, words);
      // Small delay then gravity
      setTimeout(function() {
        applyGravity(state);
        // Check for chain reactions
        var moreWords = findWords(state);
        if (moreWords.length > 0) {
          soundWordComplete();
          clearWords(state, moreWords);
          applyGravity(state);
        }
        render();
        updateUI();
      }, 300);
    }

    render();
    updateUI();
    return;
  }

  f.row = nextRow;
  render();
}

// ===== MOVEMENT =====
function moveLeft() {
  if (!state || !state.isRunning || !state.falling) return;
  var f = state.falling;
  if (f.col > 0 && state.board[f.row][f.col - 1] === null) {
    f.col--;
    soundMove();
    render();
  }
}

function moveRight() {
  if (!state || !state.isRunning || !state.falling) return;
  var f = state.falling;
  if (f.col < COLS - 1 && state.board[f.row][f.col + 1] === null) {
    f.col++;
    soundMove();
    render();
  }
}

function hardDrop() {
  if (!state || !state.isRunning || !state.falling) return;
  var f = state.falling;
  while (f.row + 1 < ROWS && state.board[f.row + 1][f.col] === null) {
    f.row++;
  }
  soundDrop();
  // Land immediately
  state.board[f.row][f.col] = f.letter;
  state.falling = null;

  var words = findWords(state);
  if (words.length > 0) {
    soundWordComplete();
    clearWords(state, words);
    setTimeout(function() {
      applyGravity(state);
      var moreWords = findWords(state);
      if (moreWords.length > 0) {
        soundWordComplete();
        clearWords(state, moreWords);
        applyGravity(state);
      }
      render();
      updateUI();
    }, 300);
  }
  render();
  updateUI();
}

// ===== GAME OVER =====
function gameOver() {
  state.isRunning = false;
  if (loopId) { clearInterval(loopId); loopId = null; }
  soundDeath();
  render();
  showDeathModal();
}

// ===== RENDERER =====
function initGrid() {
  var grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  gridCells = [];
  grid.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';
  grid.style.gridTemplateRows = 'repeat(' + ROWS + ', 1fr)';
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      grid.appendChild(cell);
      gridCells.push(cell);
    }
  }
  resizeGrid();
}

function resizeGrid() {
  var container = document.getElementById('grid-container');
  var w = container.clientWidth - 8;
  var h = container.clientHeight - 8;
  // Maintain aspect ratio
  var cellSize = Math.min(w / COLS, h / ROWS);
  var gw = cellSize * COLS;
  var gh = cellSize * ROWS;
  var grid = document.getElementById('game-grid');
  grid.style.width = gw + 'px';
  grid.style.height = gh + 'px';
}

function render() {
  if (!state) return;

  // Clear
  for (var i = 0; i < gridCells.length; i++) {
    gridCells[i].className = 'cell';
    gridCells[i].textContent = '';
  }

  // Draw landed letters
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (state.board[r][c] !== null) {
        var idx = r * COLS + c;
        gridCells[idx].className = 'cell landed';
        gridCells[idx].textContent = state.board[r][c];
      }
    }
  }

  // Draw ghost (drop preview)
  if (state.falling) {
    var f = state.falling;
    var ghostRow = f.row;
    while (ghostRow + 1 < ROWS && state.board[ghostRow + 1][f.col] === null) {
      ghostRow++;
    }
    if (ghostRow !== f.row) {
      var gIdx = ghostRow * COLS + f.col;
      if (state.board[ghostRow][f.col] === null) {
        gridCells[gIdx].className = 'cell ghost';
        gridCells[gIdx].textContent = f.letter;
      }
    }

    // Draw falling piece
    var fIdx = f.row * COLS + f.col;
    gridCells[fIdx].className = 'cell falling';
    gridCells[fIdx].textContent = f.letter;
  }

  // Update score
  document.getElementById('score-display').innerHTML = '<svg class="icon-star"><use href="#ico-star"/></svg> ' + state.score;
}

function updateUI() {
  if (!state) return;

  // Target word display
  var tw = document.getElementById('target-word');
  var letters = state.targetWord.word.split('');
  var html = '';
  for (var i = 0; i < letters.length; i++) {
    var cls = 'letter pending';
    if (state.difficulty === 'hard') {
      html += '<span class="' + cls + '">?</span>';
    } else {
      html += '<span class="' + cls + '">' + letters[i] + '</span>';
    }
  }
  tw.innerHTML = html;

  // Translation
  var wt = document.getElementById('word-translation');
  wt.textContent = state.difficulty === 'hard' ? '' : state.targetWord.translation;

  // Words completed
  document.getElementById('words-completed').textContent = 'Words: ' + state.wordsCompleted;
}

// ===== DEATH MODAL =====
function showDeathModal() {
  var overlay = document.getElementById('death-overlay');
  var statsDiv = document.getElementById('death-stats');
  var wordsDiv = document.getElementById('death-words');
  var elapsed = Date.now() - state.startTime;

  statsDiv.innerHTML =
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Difficulty</span><span style="color:#c8a830;font-weight:700">' + DIFF_LABELS[state.difficulty] + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Words</span><span style="color:#f5e6c8;font-weight:700">' + state.wordsCompleted + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Score</span><span style="color:#c8a830;font-weight:700">' + state.score + '</span></div>' +
    '<div style="display:flex;justify-content:space-between"><span style="color:#6a6a8a">Time</span><span style="color:#f5e6c8;font-weight:700">' + formatTime(elapsed) + '</span></div>';

  wordsDiv.innerHTML = '';
  for (var i = 0; i < state.completedWords.length; i++) {
    var w = state.completedWords[i];
    wordsDiv.innerHTML += '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(58,58,94,0.2)"><span style="color:#f5e6c8;font-weight:700">' + w.word + '</span><span style="color:#6a9ec0;font-size:12px">' + w.translation + '</span></div>';
  }
  if (state.completedWords.length === 0) {
    wordsDiv.innerHTML = '<div style="color:#6a6a8a;text-align:center">No words formed</div>';
  }
  overlay.classList.remove('hidden');
}

function formatTime(ms) {
  var s = Math.floor(ms / 1000);
  var m = Math.floor(s / 60);
  s = s % 60;
  return m + 'm ' + s + 's';
}

// ===== INPUT =====
document.getElementById('btn-left').addEventListener('touchstart', function(e) { e.preventDefault(); moveLeft(); });
document.getElementById('btn-left').addEventListener('click', function() { moveLeft(); });
document.getElementById('btn-right').addEventListener('touchstart', function(e) { e.preventDefault(); moveRight(); });
document.getElementById('btn-right').addEventListener('click', function() { moveRight(); });
document.getElementById('btn-drop').addEventListener('touchstart', function(e) { e.preventDefault(); hardDrop(); });
document.getElementById('btn-drop').addEventListener('click', function() { hardDrop(); });

document.addEventListener('keydown', function(e) {
  if (!state || !state.isRunning) return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
  if (e.key === 'ArrowDown') { e.preventDefault(); hardDrop(); }
});

// Swipe support
var touchStartX = null;
var touchStartY = null;
document.addEventListener('touchstart', function(e) {
  if (e.target.closest('#controls') || e.target.closest('#start-screen') || e.target.closest('#death-overlay')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', function(e) {
  if (touchStartX === null) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  touchStartX = null;
  touchStartY = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dy) > Math.abs(dx) && dy > 0) { hardDrop(); return; }
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) moveLeft(); else moveRight();
  }
});

// ===== MODAL BUTTONS =====
document.getElementById('btn-play-again').addEventListener('click', function() {
  document.getElementById('death-overlay').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
});

document.getElementById('btn-share').addEventListener('click', function() {
  var base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/index.html');
  var url = base + '?game=tetrisky';
  shareWithScreenshot('Think you can beat me? 🧱 ' + url);
});

// ===== GAME START =====
function startGame() {
  if (loopId) { clearInterval(loopId); loopId = null; }
  state = initGameState(Date.now());
  initGrid();
  updateUI();
  spawnPiece(state);
  render();
  loopId = setInterval(tick, state.tickSpeed);
}

// ===== INIT =====
async function init() {
  try {
    dictionary = await loadDictionary('../shared/dictionaries/snakesky.json');
    for (var i = 0; i < dictionary.length; i++) {
      wordSet.add(dictionary[i].word.toLowerCase());
    }
  } catch (e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Could not load dictionary: ' + e.message;
    document.getElementById('start-screen').classList.add('hidden');
    return;
  }

  // Show preview grid
  state = initGameState(42);
  initGrid();
  render();
  state = null;

  setupDifficultyToggle(function(diff) { DIFFICULTY = diff; });

  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', function() {
    document.getElementById('start-screen').classList.add('hidden');
    startGame();
  });
}

// Pause/resume hooks
onGamePause(function() {
  if (loopId) { clearInterval(loopId); loopId = null; }
});
onGameResume(function() {
  if (state && state.isRunning && !loopId) {
    loopId = setInterval(tick, state.tickSpeed);
  }
});

window.addEventListener('resize', resizeGrid);
init();
</script>
