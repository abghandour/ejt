<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;touch-action:manipulation}
body{
  background:var(--bg-primary);color:var(--text-primary);
  font-family:'Roboto Condensed',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;height:100dvh;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
body::before{
  content:'';position:fixed;top:50%;left:50%;
  width:200vmax;height:200vmax;transform:translate(-50%,-50%);z-index:-1;
  background:repeating-conic-gradient(from 0deg,var(--sunburst-1) 0deg 10deg,var(--sunburst-2) 10deg 20deg);
  opacity:var(--sunburst-opacity);
}

/* Banner */
#banner-wrap{position:relative;width:100%;max-width:600px;flex-shrink:0}
#banner{width:100%;display:block}

/* Hamburger menu */
#hamburger-btn{
  position:absolute;right:5px;top:50%;transform:translateY(-50%);
  width:40px;height:40px;background:var(--hamburger-bg);
  border:1px solid var(--hamburger-border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;z-index:10;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#hamburger-btn span{
  display:block;width:20px;height:2px;background:var(--hamburger-line);border-radius:1px;
  transition:all 0.2s;
}
#hamburger-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
#hamburger-btn.open span:nth-child(2){opacity:0}
#hamburger-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

#hamburger-menu{
  position:absolute;right:5px;top:calc(50% + 24px);
  background:var(--menu-bg);border:1px solid var(--menu-border);border-radius:10px;
  min-width:180px;overflow:hidden;z-index:10;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:none;
}
#hamburger-menu.open{display:block}
#hamburger-menu a{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;color:var(--text-primary);text-decoration:none;
  font-size:14px;font-weight:700;transition:background 0.15s;
  border-bottom:1px solid var(--border-divider);
}
#hamburger-menu a:last-child{border-bottom:none}
#hamburger-menu a:hover,#hamburger-menu a:active{background:var(--menu-hover)}
#hamburger-menu a svg{width:18px;height:18px;fill:var(--accent);flex-shrink:0}

/* Title area */
#title-area{
  width:100%;max-width:600px;text-align:center;
  padding:16px 16px 8px;flex-shrink:0;
}
#page-title{
  font-family:'Press Start 2P',monospace;font-size:14px;
  color:var(--accent);text-shadow:0 0 20px var(--accent-glow);
  line-height:1.6;
}
#page-subtitle{font-size:13px;color:var(--text-secondary);margin-top:6px}

/* Carousel */
#carousel-wrap{
  flex:1;width:100%;max-width:600px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:12px 0;min-height:0;
}
#carousel{
  position:relative;
  width:100%;height:100%;
}

/* Game card */
.game-card{
  position:absolute;top:50%;
  width:240px;height:320px;
  margin-top:-160px;
  background:linear-gradient(180deg,var(--bg-card) 0%,var(--bg-card-end) 100%);
  border:2px solid var(--border-subtle);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  padding:20px;cursor:pointer;
  transition:transform 0.35s cubic-bezier(0.25,0.8,0.25,1),opacity 0.35s,filter 0.35s;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  will-change:transform;
}
.game-card::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,var(--accent-subtle) 0%,transparent 70%);
  pointer-events:none;
}
.game-card.active{
  transform:scale(1.08);
  border-color:var(--accent);
  box-shadow:0 0 30px var(--accent-glow),0 8px 32px rgba(0,0,0,0.4);
}
.game-card:not(.active){
  transform:scale(0.88);opacity:0.5;
  filter:brightness(0.7);
}

/* Card icon */
.card-icon{
  width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent-subtle) 0%,transparent 100%);
  border:1px solid var(--accent-border);
}
.card-icon svg{width:40px;height:40px;fill:var(--accent)}

/* Card text */
.card-name{
  font-family:'Press Start 2P',monospace;font-size:13px;
  color:var(--accent);text-align:center;line-height:1.4;
}
.card-desc{
  font-size:13px;color:var(--text-muted);text-align:center;
  line-height:1.5;max-width:200px;
}

/* New badge */
.badge-new{
  position:absolute;top:12px;right:12px;
  padding:3px 8px;font-size:9px;
  font-family:'Press Start 2P',monospace;
  color:var(--bg-primary);background:var(--accent);
  border-radius:4px;letter-spacing:1px;
}

/* Dots */
#dots{
  display:flex;gap:8px;justify-content:center;
  padding:8px 0 16px;flex-shrink:0;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border-subtle);transition:all 0.3s;
}
.dot.active{background:var(--accent);transform:scale(1.3)}

/* Play button */
#play-btn{
  width:100%;max-width:600px;padding:0 20px 20px;flex-shrink:0;
}
#play-btn button{
  width:100%;min-height:54px;font-size:18px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:var(--btn-play-bg);
  border:2px solid var(--btn-play-border);border-radius:12px;
  color:var(--text-primary);cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 16px var(--btn-play-shadow);
  display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
#play-btn button:active{
  transform:scale(0.97);
}

/* iframe game view */
#game-frame{
  position:fixed;left:0;width:100%;
  border:none;z-index:100;background:var(--bg-primary);
  display:none;
}

/* Back bar shown over iframe */
#back-bar{
  position:fixed;top:0;left:0;right:0;z-index:101;
  display:none;background:var(--bg-primary);
}
#back-bar-inner{
  position:relative;width:100%;max-width:600px;margin:0 auto;
}
#back-bar img{width:100%;display:block;cursor:pointer}
/* Hamburger in back-bar */
#hamburger-btn-game{
  position:absolute;right:5px;top:50%;transform:translateY(-50%);
  width:40px;height:40px;background:var(--hamburger-bg);
  border:1px solid var(--hamburger-border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;z-index:10;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#hamburger-btn-game span{
  display:block;width:20px;height:2px;background:var(--hamburger-line);border-radius:1px;
  transition:all 0.2s;
}
#hamburger-btn-game.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
#hamburger-btn-game.open span:nth-child(2){opacity:0}
#hamburger-btn-game.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
#hamburger-menu-game{
  position:absolute;right:5px;top:calc(50% + 24px);
  background:var(--menu-bg);border:1px solid var(--menu-border);border-radius:10px;
  min-width:180px;overflow:hidden;z-index:10;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:none;
}
#hamburger-menu-game.open{display:block}
#hamburger-menu-game a{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;color:var(--text-primary);text-decoration:none;
  font-size:14px;font-weight:700;transition:background 0.15s;
  border-bottom:1px solid var(--border-divider);
}
#hamburger-menu-game a:last-child{border-bottom:none}
#hamburger-menu-game a:hover,#hamburger-menu-game a:active{background:var(--menu-hover)}
#hamburger-menu-game a svg{width:18px;height:18px;fill:var(--accent);flex-shrink:0}
</style>

var GAMES = [
  {id:'rootsky',   name:'Rootsky',      file:'./rootsky.html',     icon:'#ico-root',     desc:'Match Russian words to their roots', isNew:false},
  {id:'scramblisky',name:'Scramblisky', file:'./scramblisky.html', icon:'#ico-scramble',  desc:'Unscramble Russian words before time runs out', isNew:false},
  {id:'bogglesky',  name:'Bogglesky',   file:'./bogglesky.html',   icon:'#ico-boggle',   desc:'Swipe to find Russian words in a letter grid', isNew:true},
  {id:'snakesky',  name:'Snakesky',     file:'./snakesky.html',    icon:'#ico-snake',     desc:'Guide the snake to eat the right Russian words', isNew:false},
  //{id:'tetrisky',  name:'Tetrisky',     file:'./tetrisky.html',    icon:'#ico-tetris',    desc:'Drop letters to form Russian words', isNew:true},
  //{id:'wordsky',   name:'Wordsky',      file:'./wordsky.html',     icon:'#ico-grid',      desc:'Guess the daily Russian word in 6 tries', isNew:false}
];

var currentIndex = 0;
var startX = 0, isDragging = false, dragDelta = 0;
var carousel = document.getElementById('carousel');
var carouselWrap = document.getElementById('carousel-wrap');
var STORAGE_KEY = 'hjlr_last_game';
var CARD_W = 240, CARD_GAP = 16;
var N = GAMES.length;

function getLastPlayed() {
  try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
}
function setLastPlayed(id) {
  try { localStorage.setItem(STORAGE_KEY, id); } catch(e) {}
}

// Wrap index into [0, N)
function wrap(i) { return ((i % N) + N) % N; }

// Shortest circular distance from a to b
function circDist(a, b) {
  var d = ((b - a) % N + N) % N;
  return d > N / 2 ? d - N : d;
}

function buildCards() {
  carousel.innerHTML = '';
  var dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (var i = 0; i < N; i++) {
    var g = GAMES[i];
    var card = document.createElement('div');
    card.className = 'game-card';
    card.setAttribute('data-index', i);
    card.innerHTML =
      (g.isNew ? '<div class="badge-new">NEW</div>' : '') +
      '<div class="card-icon"><svg><use href="' + g.icon + '"/></svg></div>' +
      '<div class="card-name">' + g.name + '</div>' +
      '<div class="card-desc">' + g.desc + '</div>';
    (function(idx) {
      card.addEventListener('click', function() {
        if (idx === currentIndex) { launchGame(); }
        else { goTo(idx); }
      });
    })(i);
    carousel.appendChild(card);

    var dot = document.createElement('div');
    dot.className = 'dot';
    dotsEl.appendChild(dot);
  }
}

function goTo(idx) {
  currentIndex = wrap(idx);
  updateCarousel();
}

function updateCarousel() {
  var cards = carousel.querySelectorAll('.game-card');
  var wrapWidth = carouselWrap.offsetWidth;
  var centerX = wrapWidth / 2;
  var step = CARD_W + CARD_GAP;

  // Position each card relative to the center using circular distance
  for (var i = 0; i < N; i++) {
    var offset = circDist(currentIndex, i);
    var x = centerX - CARD_W / 2 + offset * step + dragDelta;
    var card = cards[i];
    card.style.position = 'absolute';
    card.style.left = '0';
    card.style.transform = 'translateX(' + x + 'px)';
    card.classList.toggle('active', i === currentIndex);
  }

  var dots = document.querySelectorAll('.dot');
  for (var j = 0; j < N; j++) {
    dots[j].classList.toggle('active', j === currentIndex);
  }
  document.getElementById('play-label').textContent = 'Play ' + GAMES[currentIndex].name;
}

// Touch/swipe handling
carouselWrap.addEventListener('touchstart', function(e) {
  isDragging = true;
  startX = e.touches[0].clientX;
  dragDelta = 0;
  setCarouselTransition(false);
}, {passive:true});

carouselWrap.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  dragDelta = e.touches[0].clientX - startX;
  updateCarousel();
}, {passive:true});

carouselWrap.addEventListener('touchend', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) { currentIndex = wrap(currentIndex + 1); }
  else if (dragDelta > threshold) { currentIndex = wrap(currentIndex - 1); }
  dragDelta = 0;
  updateCarousel();
});

// Mouse drag for desktop testing
carouselWrap.addEventListener('mousedown', function(e) {
  isDragging = true;
  startX = e.clientX;
  dragDelta = 0;
  setCarouselTransition(false);
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  dragDelta = e.clientX - startX;
  updateCarousel();
});
document.addEventListener('mouseup', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) { currentIndex = wrap(currentIndex + 1); }
  else if (dragDelta > threshold) { currentIndex = wrap(currentIndex - 1); }
  dragDelta = 0;
  updateCarousel();
});

function setCarouselTransition(on) {
  var cards = carousel.querySelectorAll('.game-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.transition = on
      ? 'transform 0.35s cubic-bezier(0.25,0.8,0.25,1), opacity 0.35s, filter 0.35s'
      : 'opacity 0.35s, filter 0.35s';
  }
}

// Launch game in iframe
function launchGame() {
  var g = GAMES[currentIndex];
  setLastPlayed(g.id);
  openInFrame(g.file);
}

function closeGame() {
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  frame.src = '';
  frame.style.display = 'none';
  backBar.style.display = 'none';
  // Re-center on last played
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < GAMES.length; i++) {
      if (GAMES[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

document.getElementById('back-banner').addEventListener('click', function(e) {
  e.preventDefault();
  // Send pause message to game iframe
  var frame = document.getElementById('game-frame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({type:'pause'}, '*');
  }
});

// Init
function init() {
  buildCards();
  setCarouselTransition(true);
  // Start with last played game centered, or first
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < GAMES.length; i++) {
      if (GAMES[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

// Auto-launch game from URL param (e.g. ?game=rootsky&d=20260302)
function checkDeepLink() {
  var params = new URLSearchParams(window.location.search);
  var gameId = params.get('game');
  if (!gameId) return;
  for (var i = 0; i < GAMES.length; i++) {
    if (GAMES[i].id === gameId) {
      currentIndex = i;
      updateCarousel();
      // Forward all params except 'game' to the game page
      var gameParams = new URLSearchParams();
      params.forEach(function(val, key) {
        if (key !== 'game') gameParams.set(key, val);
      });
      var qs = gameParams.toString();
      openInFrame(GAMES[i].file + (qs ? '?' + qs : ''));
      setLastPlayed(gameId);
      // Clean URL without reloading
      if (window.history.replaceState) {
        window.history.replaceState({}, '', window.location.pathname);
      }
      return;
    }
  }
}

// Hamburger menu (game picker)
var hamBtn = document.getElementById('hamburger-btn');
var hamMenu = document.getElementById('hamburger-menu');
function closePickerMenu() {
  hamMenu.classList.remove('open');
  hamBtn.classList.remove('open');
  hamBtn.setAttribute('aria-expanded', 'false');
}
hamBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  var open = hamMenu.classList.toggle('open');
  hamBtn.classList.toggle('open', open);
  hamBtn.setAttribute('aria-expanded', String(open));
});
document.getElementById('menu-settings').addEventListener('click', function(e) {
  e.preventDefault();
  closePickerMenu();
  openInFrame('./settings.html');
});

// Hamburger menu (in-game back-bar)
var hamBtnGame = document.getElementById('hamburger-btn-game');
var hamMenuGame = document.getElementById('hamburger-menu-game');
function closeGameMenu() {
  hamMenuGame.classList.remove('open');
  hamBtnGame.classList.remove('open');
  hamBtnGame.setAttribute('aria-expanded', 'false');
}
hamBtnGame.addEventListener('click', function(e) {
  e.stopPropagation();
  var open = hamMenuGame.classList.toggle('open');
  hamBtnGame.classList.toggle('open', open);
  hamBtnGame.setAttribute('aria-expanded', String(open));
  // Pause game when menu opens
  if (open) {
    var frame = document.getElementById('game-frame');
    if (frame.contentWindow) frame.contentWindow.postMessage({type:'pause'}, '*');
  }
});
document.getElementById('menu-games').addEventListener('click', function(e) {
  e.preventDefault();
  closeGameMenu();
  closeGame();
});
// Close any open menu on outside click
document.addEventListener('click', function(e) {
  if (!hamMenu.contains(e.target) && !hamBtn.contains(e.target)) {
    closePickerMenu();
  }
  if (!hamMenuGame.contains(e.target) && !hamBtnGame.contains(e.target)) {
    closeGameMenu();
  }
});

// Helper to open a page in the iframe
function openInFrame(url) {
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  backBar.style.display = 'block';
  var barH = backBar.offsetHeight;
  frame.style.top = barH + 'px';
  frame.style.height = 'calc(100% - ' + barH + 'px)';
  frame.src = url;
  frame.style.display = 'block';
}

init();
checkDeepLink();
window.addEventListener('resize', function() { updateCarousel(); });
// Listen for theme changes from settings iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'themeChange' && e.data.theme) {
    hjlrSetTheme(e.data.theme);
  }
  if (e.data && e.data.type === 'fontSizeChange' && e.data.fontSize) {
    hjlrSetFontSize(e.data.fontSize);
  }
  if (e.data && e.data.type === 'bgModeChange' && e.data.bgMode) {
    hjlrSetBgMode(e.data.bgMode);
  }
});
</script>
