<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>How Janey Learned Russian</title>
<link rel="icon" href="../shared/assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="../shared/assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="How Janey Learned Russian">
<link rel="manifest" href="../shared/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;touch-action:manipulation}
body{
  background:#0e0e1a;color:#f5e6c8;
  font-family:'Roboto Condensed',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;height:100dvh;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
body::before{
  content:'';position:fixed;top:50%;left:50%;
  width:200vmax;height:200vmax;transform:translate(-50%,-50%);z-index:-1;
  background:repeating-conic-gradient(from 0deg,#8b2020 0deg 10deg,#a33a3a 10deg 20deg);
  opacity:0.35;
}

/* Banner */
#banner-link{display:block;width:100%;max-width:600px;flex-shrink:0}
#banner{width:100%;display:block}

/* Title area */
#title-area{
  width:100%;max-width:600px;text-align:center;
  padding:16px 16px 8px;flex-shrink:0;
}
#page-title{
  font-family:'Press Start 2P',monospace;font-size:14px;
  color:#c8a830;text-shadow:0 0 20px rgba(200,168,48,0.3);
  line-height:1.6;
}
#page-subtitle{font-size:13px;color:#6a6a8a;margin-top:6px}

/* Carousel */
#carousel-wrap{
  flex:1;width:100%;max-width:600px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:12px 0;min-height:0;
}
#carousel{
  position:relative;
  width:100%;height:100%;
}

/* Game card */
.game-card{
  position:absolute;top:50%;
  width:240px;height:320px;
  margin-top:-160px;
  background:linear-gradient(180deg,#1e1e3a 0%,#16162a 100%);
  border:2px solid #3a3a5a;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  padding:20px;cursor:pointer;
  transition:transform 0.35s cubic-bezier(0.25,0.8,0.25,1),opacity 0.35s,filter 0.35s;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  will-change:transform;
}
.game-card::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,168,48,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.game-card.active{
  transform:scale(1.08);
  border-color:#c8a830;
  box-shadow:0 0 30px rgba(200,168,48,0.2),0 8px 32px rgba(0,0,0,0.4);
}
.game-card:not(.active){
  transform:scale(0.88);opacity:0.5;
  filter:brightness(0.7);
}

/* Card icon */
.card-icon{
  width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(200,168,48,0.15) 0%,rgba(200,168,48,0.05) 100%);
  border:1px solid rgba(200,168,48,0.2);
}
.card-icon svg{width:40px;height:40px;fill:#c8a830}

/* Card text */
.card-name{
  font-family:'Press Start 2P',monospace;font-size:13px;
  color:#c8a830;text-align:center;line-height:1.4;
}
.card-desc{
  font-size:13px;color:#8a8aaa;text-align:center;
  line-height:1.5;max-width:200px;
}

/* New badge */
.badge-new{
  position:absolute;top:12px;right:12px;
  padding:3px 8px;font-size:9px;
  font-family:'Press Start 2P',monospace;
  color:#0e0e1a;background:#c8a830;
  border-radius:4px;letter-spacing:1px;
}

/* Dots */
#dots{
  display:flex;gap:8px;justify-content:center;
  padding:8px 0 16px;flex-shrink:0;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:#3a3a5a;transition:all 0.3s;
}
.dot.active{background:#c8a830;transform:scale(1.3)}

/* Play button */
#play-btn{
  width:100%;max-width:600px;padding:0 20px 20px;flex-shrink:0;
}
#play-btn button{
  width:100%;min-height:54px;font-size:18px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:linear-gradient(180deg,#3a5a2a 0%,#2a4a1a 100%);
  border:2px solid #5a8a3a;border-radius:12px;
  color:#f5e6c8;cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 16px rgba(90,138,58,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
#play-btn button:active{
  transform:scale(0.97);
  background:linear-gradient(180deg,#4a6a3a 0%,#3a5a2a 100%);
}

/* iframe game view */
#game-frame{
  position:fixed;left:0;width:100%;
  border:none;z-index:100;background:#0e0e1a;
  display:none;
}

/* Back bar shown over iframe */
#back-bar{
  position:fixed;top:0;left:0;right:0;z-index:101;
  display:none;background:#0e0e1a;
}
#back-bar img{width:100%;max-width:600px;display:block;margin:0 auto;cursor:pointer}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ico-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></symbol>
  <!-- Snakesky: coiled snake icon -->
  <symbol id="ico-snake" viewBox="0 0 48 48">
    <!-- Bottom coil layer -->
    <rect x="4" y="36" rx="5" ry="5" width="36" height="8" fill="none" stroke="currentColor" stroke-width="3"/>
    <!-- Top coil layer -->
    <rect x="4" y="28" rx="5" ry="5" width="36" height="8" fill="none" stroke="currentColor" stroke-width="3"/>
    <!-- Body rising from left side of top coil, curving right and up -->
    <path d="M7 28 C7 22 12 16 18 12 C22 9.5 28 8 30 10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <!-- Neck going up to head -->
    <path d="M30 10 L30 5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <!-- Head (wide rounded shape) -->
    <path d="M24 1 C22 0 20 1 20 4 C20 7 22 9 27 9 C32 9 36 8 37 5 C38 2 36 0 33 0 C30 -0.5 26 0 24 1 Z" fill="currentColor"/>
    <!-- Face inset -->
    <path d="M23 2.5 C22 2.5 21.5 3.5 21.5 5 C21.5 6.5 23 7.5 27 7.5 C31 7.5 33.5 7 34 5 C34.5 3 33 2 31 2 C29 2 25 2 23 2.5 Z" fill="#0e0e1a"/>
    <!-- Eyes -->
    <circle cx="25.5" cy="4.5" r="1.1" fill="currentColor"/>
    <circle cx="30.5" cy="4.5" r="1.1" fill="currentColor"/>
    <!-- Tongue (forked, pointing down-left from chin) -->
    <path d="M24 8 L21 12 M21 12 L19.5 11 M21 12 L20 13.5" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  </symbol>
  <!-- Wordsky: letter grid -->
  <symbol id="ico-grid" viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></symbol>
  <!-- Rootsky: asymmetric binary tree (2 left, 3 right) -->
  <symbol id="ico-root" viewBox="0 0 40 36">
    <!-- Root node -->
    <circle cx="20" cy="3" r="2.5" fill="currentColor"/>
    <!-- Level 1 branches -->
    <line x1="20" y1="5.5" x2="10" y2="13" stroke="currentColor" stroke-width="1.4"/>
    <line x1="20" y1="5.5" x2="30" y2="13" stroke="currentColor" stroke-width="1.4"/>
    <!-- Level 1 nodes -->
    <circle cx="10" cy="14" r="2.2" fill="currentColor"/>
    <circle cx="30" cy="14" r="2.2" fill="currentColor"/>
    <!-- Left subtree level 2 branches -->
    <line x1="10" y1="16.2" x2="5" y2="24" stroke="currentColor" stroke-width="1.2"/>
    <line x1="10" y1="16.2" x2="15" y2="24" stroke="currentColor" stroke-width="1.2"/>
    <!-- Left subtree level 2 nodes (leaves) -->
    <circle cx="5" cy="25" r="1.8" fill="currentColor"/>
    <circle cx="15" cy="25" r="1.8" fill="currentColor"/>
    <!-- Right subtree level 2 branches -->
    <line x1="30" y1="16.2" x2="25" y2="24" stroke="currentColor" stroke-width="1.2"/>
    <line x1="30" y1="16.2" x2="35" y2="24" stroke="currentColor" stroke-width="1.2"/>
    <!-- Right subtree level 2 nodes -->
    <circle cx="25" cy="25" r="1.8" fill="currentColor"/>
    <circle cx="35" cy="25" r="1.8" fill="currentColor"/>
    <!-- Right subtree level 3 branches (from left child) -->
    <line x1="25" y1="26.8" x2="23" y2="32" stroke="currentColor" stroke-width="1"/>
    <line x1="25" y1="26.8" x2="27" y2="32" stroke="currentColor" stroke-width="1"/>
    <!-- Right subtree level 3 branches (from right child) -->
    <line x1="35" y1="26.8" x2="33" y2="32" stroke="currentColor" stroke-width="1"/>
    <line x1="35" y1="26.8" x2="37" y2="32" stroke="currentColor" stroke-width="1"/>
    <!-- Right subtree level 3 leaf nodes -->
    <circle cx="23" cy="33" r="1.4" fill="currentColor"/>
    <circle cx="27" cy="33" r="1.4" fill="currentColor"/>
    <circle cx="33" cy="33" r="1.4" fill="currentColor"/>
    <circle cx="37" cy="33" r="1.4" fill="currentColor"/>
  </symbol>
  <!-- Scramblisky: shell game (3 cups, ball hidden) -->
  <!-- Scramblisky: shuffle symbol (two thick crossing arrows) -->
  <symbol id="ico-scramble" viewBox="0 0 24 24">
    <!-- Bottom-left to top-right: full thick arrow with gap at crossing -->
    <path d="M3 18 C5 18 7 16 9 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <path d="M13 8 C15 6 17 4 19 4 L19 1 L23 4.5 L19 8 L19 5" fill="currentColor"/>
    <path d="M13 8 C15 6 17 4.5 19 4.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <!-- Top-left to bottom-right: full thick arrow with gap at crossing -->
    <path d="M3 5 C5 5 7 7 9 9" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <path d="M13 15 C15 17 17 19 19 19 L19 16 L23 19.5 L19 23 L19 20" fill="currentColor"/>
    <path d="M13 15 C15 17 17 19.5 19 19.5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  </symbol>
  <!-- Tetrisky: tetris block -->
  <symbol id="ico-tetris" viewBox="0 0 24 24"><path d="M4 4h4v4H4V4zm6 0h4v4h-4V4zm0 6h4v4h-4v-4zm6-6h4v4h-4V4zm-6 12h4v4h-4v-4z"/></symbol>
</svg>

<a id="banner-link" href="https://www.patreon.com/u63997582" target="_blank" rel="noopener">
  <img id="banner" src="../shared/assets/banner.png" alt="How Janey Learned Russian">
</a>

<div id="title-area">
  <div id="page-title">How Janey Learned<br>Russian</div>
  <div id="page-subtitle">Choose a game to play</div>
</div>

<div id="carousel-wrap">
  <div id="carousel"></div>
</div>

<div id="dots"></div>

<div id="play-btn">
  <button id="btn-play" onclick="launchGame()">
    <svg style="width:22px;height:22px;fill:currentColor"><use href="#ico-play"/></svg>
    <span id="play-label">Play</span>
  </button>
</div>

<!-- Back bar overlaid on iframe -->
<div id="back-bar">
  <img src="../shared/assets/banner.png" alt="Back to menu" id="back-banner">
</div>

<iframe id="game-frame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>

<script>
var GAMES = [
  {id:'rootsky',   name:'Rootsky',      file:'./rootsky.html',     icon:'#ico-root',     desc:'Match Russian words to their roots', isNew:false},
  {id:'scramblisky',name:'Scramblisky', file:'./scramblisky.html', icon:'#ico-scramble',  desc:'Unscramble Russian words before time runs out', isNew:true},
  {id:'snakesky',  name:'Snakesky',     file:'./snakesky.html',    icon:'#ico-snake',     desc:'Guide the snake to eat the right Russian words', isNew:false},
  //{id:'tetrisky',  name:'Tetrisky',     file:'./tetrisky.html',    icon:'#ico-tetris',    desc:'Drop letters to form Russian words', isNew:true},
  //{id:'wordsky',   name:'Wordsky',      file:'./wordsky.html',     icon:'#ico-grid',      desc:'Guess the daily Russian word in 6 tries', isNew:false}
];

var currentIndex = 0;
var startX = 0, isDragging = false, dragDelta = 0;
var carousel = document.getElementById('carousel');
var carouselWrap = document.getElementById('carousel-wrap');
var STORAGE_KEY = 'hjlr_last_game';
var CARD_W = 240, CARD_GAP = 16;
var N = GAMES.length;

function getLastPlayed() {
  try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
}
function setLastPlayed(id) {
  try { localStorage.setItem(STORAGE_KEY, id); } catch(e) {}
}

// Wrap index into [0, N)
function wrap(i) { return ((i % N) + N) % N; }

// Shortest circular distance from a to b
function circDist(a, b) {
  var d = ((b - a) % N + N) % N;
  return d > N / 2 ? d - N : d;
}

function buildCards() {
  carousel.innerHTML = '';
  var dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (var i = 0; i < N; i++) {
    var g = GAMES[i];
    var card = document.createElement('div');
    card.className = 'game-card';
    card.setAttribute('data-index', i);
    card.innerHTML =
      (g.isNew ? '<div class="badge-new">NEW</div>' : '') +
      '<div class="card-icon"><svg><use href="' + g.icon + '"/></svg></div>' +
      '<div class="card-name">' + g.name + '</div>' +
      '<div class="card-desc">' + g.desc + '</div>';
    (function(idx) {
      card.addEventListener('click', function() {
        if (idx === currentIndex) { launchGame(); }
        else { goTo(idx); }
      });
    })(i);
    carousel.appendChild(card);

    var dot = document.createElement('div');
    dot.className = 'dot';
    dotsEl.appendChild(dot);
  }
}

function goTo(idx) {
  currentIndex = wrap(idx);
  updateCarousel();
}

function updateCarousel() {
  var cards = carousel.querySelectorAll('.game-card');
  var wrapWidth = carouselWrap.offsetWidth;
  var centerX = wrapWidth / 2;
  var step = CARD_W + CARD_GAP;

  // Position each card relative to the center using circular distance
  for (var i = 0; i < N; i++) {
    var offset = circDist(currentIndex, i);
    var x = centerX - CARD_W / 2 + offset * step + dragDelta;
    var card = cards[i];
    card.style.position = 'absolute';
    card.style.left = '0';
    card.style.transform = 'translateX(' + x + 'px)';
    card.classList.toggle('active', i === currentIndex);
  }

  var dots = document.querySelectorAll('.dot');
  for (var j = 0; j < N; j++) {
    dots[j].classList.toggle('active', j === currentIndex);
  }
  document.getElementById('play-label').textContent = 'Play ' + GAMES[currentIndex].name;
}

// Touch/swipe handling
carouselWrap.addEventListener('touchstart', function(e) {
  isDragging = true;
  startX = e.touches[0].clientX;
  dragDelta = 0;
  setCarouselTransition(false);
}, {passive:true});

carouselWrap.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  dragDelta = e.touches[0].clientX - startX;
  updateCarousel();
}, {passive:true});

carouselWrap.addEventListener('touchend', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) { currentIndex = wrap(currentIndex + 1); }
  else if (dragDelta > threshold) { currentIndex = wrap(currentIndex - 1); }
  dragDelta = 0;
  updateCarousel();
});

// Mouse drag for desktop testing
carouselWrap.addEventListener('mousedown', function(e) {
  isDragging = true;
  startX = e.clientX;
  dragDelta = 0;
  setCarouselTransition(false);
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  dragDelta = e.clientX - startX;
  updateCarousel();
});
document.addEventListener('mouseup', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) { currentIndex = wrap(currentIndex + 1); }
  else if (dragDelta > threshold) { currentIndex = wrap(currentIndex - 1); }
  dragDelta = 0;
  updateCarousel();
});

function setCarouselTransition(on) {
  var cards = carousel.querySelectorAll('.game-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.transition = on
      ? 'transform 0.35s cubic-bezier(0.25,0.8,0.25,1), opacity 0.35s, filter 0.35s'
      : 'opacity 0.35s, filter 0.35s';
  }
}

// Launch game in iframe
function launchGame() {
  var g = GAMES[currentIndex];
  setLastPlayed(g.id);
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  backBar.style.display = 'block';
  // Position iframe below the back-bar banner
  var barH = backBar.offsetHeight;
  frame.style.top = barH + 'px';
  frame.style.height = 'calc(100% - ' + barH + 'px)';
  frame.src = g.file;
  frame.style.display = 'block';
}

function closeGame() {
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  frame.src = '';
  frame.style.display = 'none';
  backBar.style.display = 'none';
  // Re-center on last played
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < GAMES.length; i++) {
      if (GAMES[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

document.getElementById('back-banner').addEventListener('click', function(e) {
  e.preventDefault();
  closeGame();
});

// Init
function init() {
  buildCards();
  setCarouselTransition(true);
  // Start with last played game centered, or first
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < GAMES.length; i++) {
      if (GAMES[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

// Auto-launch game from URL param (e.g. ?game=rootsky&d=20260302)
function checkDeepLink() {
  var params = new URLSearchParams(window.location.search);
  var gameId = params.get('game');
  if (!gameId) return;
  for (var i = 0; i < GAMES.length; i++) {
    if (GAMES[i].id === gameId) {
      currentIndex = i;
      updateCarousel();
      // Forward all params except 'game' to the game page
      var gameParams = new URLSearchParams();
      params.forEach(function(val, key) {
        if (key !== 'game') gameParams.set(key, val);
      });
      var qs = gameParams.toString();
      var frame = document.getElementById('game-frame');
      var backBar = document.getElementById('back-bar');
      backBar.style.display = 'block';
      var barH = backBar.offsetHeight;
      frame.style.top = barH + 'px';
      frame.style.height = 'calc(100% - ' + barH + 'px)';
      frame.src = GAMES[i].file + (qs ? '?' + qs : '');
      frame.style.display = 'block';
      setLastPlayed(gameId);
      // Clean URL without reloading
      if (window.history.replaceState) {
        window.history.replaceState({}, '', window.location.pathname);
      }
      return;
    }
  }
}

init();
checkDeepLink();
window.addEventListener('resize', function() { updateCarousel(); });
</script>
</body>
</html>
