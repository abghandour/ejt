<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;touch-action:manipulation}
body{
  background:var(--bg-primary);color:var(--text-primary);
  font-family:'Roboto Condensed',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;height:100dvh;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}

/* Banner */
#banner-wrap{position:relative;width:100%;max-width:600px;flex-shrink:0}
#banner{width:100%;display:block}

/* Hamburger menu */
#lang-flag-home{
  position:absolute;right:52px;top:10px;height:40px;width:28px;
  display:flex;align-items:center;justify-content:center;
}
#lang-flag-home svg{width:28px;height:20px;border-radius:3px;box-shadow:0 0 2px rgba(0,0,0,0.3)}
#lang-flag-game{
  width:28px;height:20px;border-radius:3px;overflow:hidden;flex-shrink:0;
  box-shadow:0 0 2px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;
  margin-left:auto;
  top: 20px;
}
#lang-flag-home svg,#lang-flag-game svg{width:100%;height:100%}
#hamburger-btn{
  position:absolute;right:5px;top:10px;
  width:40px;height:40px;background:var(--hamburger-bg);
  border:1px solid var(--hamburger-border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;z-index:10;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#hamburger-btn span{
  display:block;width:20px;height:2px;background:var(--hamburger-line);border-radius:1px;
  transition:all 0.2s;
}
#hamburger-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
#hamburger-btn.open span:nth-child(2){opacity:0}
#hamburger-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

#hamburger-menu{
  position:absolute;right:5px;top:54px;
  background:var(--menu-bg);border:1px solid var(--menu-border);border-radius:10px;
  min-width:270px;overflow:hidden;z-index:10;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:none;
}
#hamburger-menu.open{display:block}
#hamburger-menu a{
  display:flex;align-items:center;gap:15px;
  padding:18px 24px;color:var(--text-primary);text-decoration:none;
  font-size:21px;font-weight:700;transition:background 0.15s;
  border-bottom:1px solid var(--border-divider);
}
#hamburger-menu a:last-child{border-bottom:none}
#hamburger-menu a:hover,#hamburger-menu a:active{background:var(--menu-hover)}
#hamburger-menu a svg{width:27px;height:27px;fill:var(--accent);flex-shrink:0}

/* Title area */
#title-area{
  width:100%;max-width:600px;text-align:center;
  padding:16px 16px 8px;flex-shrink:0;
}
#page-title{
  font-family:'Press Start 2P',monospace;font-size:14px;
  color:var(--accent);text-shadow:0 0 20px var(--accent-glow);
  line-height:1.6;
}
#page-subtitle{font-size:13px;color:var(--text-secondary);margin-top:6px}

/* Carousel */
#carousel-wrap{
  flex:1;width:100%;max-width:600px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:12px 0;min-height:0;
}
#carousel{
  position:relative;
  width:100%;height:100%;
}

/* Game card */
.game-card{
  position:absolute;top:50%;
  width:240px;height:320px;
  margin-top:-160px;
  background:linear-gradient(180deg,var(--bg-card) 0%,var(--bg-card-end) 100%);
  border:2px solid var(--border-subtle);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  padding:20px;cursor:pointer;
  transition:transform 0.35s cubic-bezier(0.25,0.8,0.25,1),opacity 0.35s,filter 0.35s;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  will-change:transform;
}
.game-card::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,var(--accent-subtle) 0%,transparent 70%);
  pointer-events:none;
}
.game-card.active{
  transform:scale(1.08);
  border-color:var(--accent);
  box-shadow:0 0 30px var(--accent-glow),0 8px 32px rgba(0,0,0,0.4);
}
.game-card:not(.active){
  transform:scale(0.88);opacity:0.5;
  filter:brightness(0.7);
}

/* Card icon */
.card-icon{
  width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent-subtle) 0%,transparent 100%);
  border:1px solid var(--accent-border);
}
.card-icon svg{width:40px;height:40px;fill:var(--accent)}

/* Card text */
.card-name{
  font-family:'Press Start 2P',monospace;font-size:13px;
  color:var(--accent);text-align:center;line-height:1.4;
}
.card-desc{
  font-size:26px;color:var(--text-muted);text-align:center;
  line-height:1.5;max-width:200px;
}

/* New badge */
.badge-new{
  position:absolute;top:12px;right:12px;
  padding:3px 8px;font-size:9px;
  font-family:'Press Start 2P',monospace;
  color:var(--bg-primary);background:var(--accent);
  border-radius:4px;letter-spacing:1px;
}

/* Dots */
#dots{
  display:flex;gap:8px;justify-content:center;
  padding:8px 0 16px;flex-shrink:0;
}
.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border-subtle);transition:all 0.3s;
}
.dot.active{background:var(--accent);transform:scale(1.3)}

/* Play button */
#play-btn{
  width:100%;max-width:600px;padding:0 20px 20px;flex-shrink:0;
}
#play-btn button{
  width:100%;min-height:54px;font-size:18px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  background:var(--btn-play-bg);
  border:2px solid var(--btn-play-border);border-radius:12px;
  color:var(--text-primary);cursor:pointer;transition:all 0.2s;
  box-shadow:0 4px 16px var(--btn-play-shadow);
  display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
}
#play-btn button:active{
  transform:scale(0.97);
}

/* iframe game view */
#game-frame{
  position:fixed;left:0;width:100%;
  border:none;z-index:100;background:var(--bg-primary);
  display:none;
}

/* Back bar shown over iframe */
#back-bar{
  position:fixed;top:0;left:0;right:0;z-index:151;
  display:none;background:var(--bg-primary);
  border-bottom:1px solid var(--border-subtle);
}
#back-bar-inner{
  position:relative;width:100%;max-width:600px;margin:0 auto;
  display:flex;align-items:center;
  padding:10px 50px 10px 12px;
  gap:10px;
  min-height:60px;
}
#back-bar-logo{
  height:40px;width:auto;flex-shrink:0;cursor:pointer;
  border-radius:6px;
}
#back-bar-title{
  font-family:'Roboto Condensed',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;line-height:1.3;
}
#back-bar-title .bar-game-name{
  color:var(--accent);
}
#back-bar-title .bar-game-icon{
  width:14px;height:14px;fill:var(--accent);
  vertical-align:middle;margin-right:4px;
}
/* Hamburger in back-bar */
#hamburger-btn-game{
  position:absolute;right:5px;top:10px;
  width:40px;height:40px;background:var(--hamburger-bg);
  border:1px solid var(--hamburger-border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;z-index:999;-webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#hamburger-btn-game span{
  display:block;width:20px;height:2px;background:var(--hamburger-line);border-radius:1px;
  transition:all 0.2s;
}
#hamburger-btn-game.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
#hamburger-btn-game.open span:nth-child(2){opacity:0}
#hamburger-btn-game.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
#hamburger-menu-game{
  position:absolute;right:5px;top:54px;
  background:var(--menu-bg);border:1px solid var(--menu-border);border-radius:10px;
  min-width:270px;overflow:hidden;z-index:999;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  display:none;
}
#hamburger-menu-game.open{display:block}
#hamburger-menu-game a{
  display:flex;align-items:center;gap:15px;
  padding:18px 24px;color:var(--text-primary);text-decoration:none;
  font-size:21px;font-weight:700;transition:background 0.15s;
  border-bottom:1px solid var(--border-divider);
}
#hamburger-menu-game a:last-child{border-bottom:none}
#hamburger-menu-game a:hover,#hamburger-menu-game a:active{background:var(--menu-hover)}
#hamburger-menu-game a svg{width:27px;height:27px;fill:var(--accent);flex-shrink:0}
</style>
</head>

<iframe id="game-frame"></iframe>

<script>
var GAMES = [
  {id:'rootsky',   name:'Rootsky',      file:'./rootsky.html',     icon:'#ico-root',     desc:'Match Russian words to their roots', isNew:false},
  {id:'scramblisky',name:'Scramblisky', file:'./scramblisky.html', icon:'#ico-scramble',  desc:'Unscramble Russian words before time runs out', isNew:false},
  {id:'bogglesky',  name:'Bogglesky',   file:'./bogglesky.html',   icon:'#ico-boggle',   desc:'Swipe to find Russian words in a letter grid', isNew:false},
  {id:'fruitsky',  name:'Fruitsky',     file:'./fruitsky.html',    icon:'#ico-pineapple', desc:'Slash the synonyms, dodge the distractors', isNew:false},
  {id:'triviatsky',name:'Triviatsky',   file:'./triviatsky.html',  icon:'#ico-trivia',    desc:'Answer daily trivia questions and earn stars', isNew:false},
  {id:'snakesky',  name:'Snakesky',     file:'./snakesky.html',    icon:'#ico-snake',     desc:'Guide the snake to eat the right Russian words', isNew:false},
  //{id:'tetrisky',  name:'Tetrisky',     file:'./tetrisky.html',    icon:'#ico-tetris',    desc:'Drop letters to form Russian words', isNew:true},
  //{id:'wordsky',   name:'Wordsky',      file:'./wordsky.html',     icon:'#ico-grid',      desc:'Guess the daily Russian word in 6 tries', isNew:false}
];

var filteredGames = GAMES.slice();
var currentIndex = 0;
var startX = 0, isDragging = false, dragDelta = 0;
var carousel = document.getElementById('carousel');
var carouselWrap = document.getElementById('carousel-wrap');
var STORAGE_KEY = 'hjlr_last_game';
var CARD_W = 240, CARD_GAP = 16;
var N = filteredGames.length;
var _settleTilt = 0;

function getLastPlayed() {
  try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
}
function setLastPlayed(id) {
  try { localStorage.setItem(STORAGE_KEY, id); } catch(e) {}
}

// Wrap index into [0, N)
function wrap(i) { return ((i % N) + N) % N; }

// Shortest circular distance from a to b
function circDist(a, b) {
  var d = ((b - a) % N + N) % N;
  return d > N / 2 ? d - N : d;
}

function buildCards() {
  carousel.innerHTML = '';
  var dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for (var i = 0; i < N; i++) {
    var g = filteredGames[i];
    var card = document.createElement('div');
    card.className = 'game-card';
    card.setAttribute('data-index', i);
    card.innerHTML =
      (g.isNew ? '<div class="badge-new">NEW</div>' : '') +
      '<div class="card-icon"><svg><use href="' + g.icon + '"/></svg></div>' +
      '<div class="card-name">' + g.name + '</div>' +
      '<div class="card-desc">' + g.desc + '</div>';
    (function(idx) {
      card.addEventListener('click', function() {
        if (idx === currentIndex) { launchGame(); }
        else { goTo(idx); }
      });
    })(i);
    carousel.appendChild(card);

    var dot = document.createElement('div');
    dot.className = 'dot';
    dotsEl.appendChild(dot);
  }
}

function goTo(idx) {
  currentIndex = wrap(idx);
  updateCarousel();
}

function updateCarousel() {
  var cards = carousel.querySelectorAll('.game-card');
  var wrapWidth = carouselWrap.offsetWidth;
  var centerX = wrapWidth / 2;
  var step = CARD_W + CARD_GAP;

  // Position each card relative to the center using circular distance
  for (var i = 0; i < N; i++) {
    var offset = circDist(currentIndex, i);
    var x = centerX - CARD_W / 2 + offset * step + dragDelta;
    var card = cards[i];
    // Tilt cards while dragging (max 5deg toward scroll direction)
    var tilt = 0;
    if (dragDelta !== 0) {
      tilt = Math.max(-5, Math.min(5, dragDelta / 5));
    } else if (_settleTilt !== 0) {
      tilt = _settleTilt;
    }
    card.style.position = 'absolute';
    card.style.left = '0';
    card.style.transform = 'translateX(' + x + 'px) rotate(' + tilt + 'deg)';
    card.classList.toggle('active', i === currentIndex);
  }

  var dots = document.querySelectorAll('.dot');
  for (var j = 0; j < N; j++) {
    dots[j].classList.toggle('active', j === currentIndex);
  }
  document.getElementById('play-label').textContent = 'Play ' + filteredGames[currentIndex].name;
}

// Touch/swipe handling
carouselWrap.addEventListener('touchstart', function(e) {
  isDragging = true;
  startX = e.touches[0].clientX;
  dragDelta = 0;
  setCarouselTransition(false);
}, {passive:true});

carouselWrap.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  dragDelta = e.touches[0].clientX - startX;
  updateCarousel();
}, {passive:true});

carouselWrap.addEventListener('touchend', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) {
    _settleTilt = -5;
    currentIndex = wrap(currentIndex + 1);
  } else if (dragDelta > threshold) {
    _settleTilt = 5;
    currentIndex = wrap(currentIndex - 1);
  }
  dragDelta = 0;
  updateCarousel();
  // Straighten after settling
  setTimeout(function() { _settleTilt = 0; updateCarousel(); }, 50);
});

// Mouse drag for desktop testing
carouselWrap.addEventListener('mousedown', function(e) {
  isDragging = true;
  startX = e.clientX;
  dragDelta = 0;
  setCarouselTransition(false);
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  dragDelta = e.clientX - startX;
  updateCarousel();
});
document.addEventListener('mouseup', function() {
  if (!isDragging) return;
  isDragging = false;
  setCarouselTransition(true);
  var threshold = 60;
  if (dragDelta < -threshold) {
    _settleTilt = -5;
    currentIndex = wrap(currentIndex + 1);
  } else if (dragDelta > threshold) {
    _settleTilt = 5;
    currentIndex = wrap(currentIndex - 1);
  }
  dragDelta = 0;
  updateCarousel();
  // Straighten after settling
  setTimeout(function() { _settleTilt = 0; updateCarousel(); }, 50);
});

function setCarouselTransition(on) {
  var cards = carousel.querySelectorAll('.game-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.transition = on
      ? 'transform 0.35s cubic-bezier(0.25,0.8,0.25,1), opacity 0.35s, filter 0.35s'
      : 'opacity 0.35s, filter 0.35s';
  }
}

// Launch game in iframe
function launchGame() {
  var g = filteredGames[currentIndex];
  setLastPlayed(g.id);
  openInFrame(g.file);
}

function closeGame() {
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  frame.src = '';
  frame.style.display = 'none';
  backBar.style.display = 'none';
  _currentFrameUrl = '';
  // Re-center on last played
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < filteredGames.length; i++) {
      if (filteredGames[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

document.getElementById('back-bar-logo').addEventListener('click', function(e) {
  e.preventDefault();
  if (isSettingsOpen()) {
    closeGame();
    return;
  }
  var frame = document.getElementById('game-frame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({type:'pause'}, '*');
  }
});
document.getElementById('back-bar-title').addEventListener('click', function(e) {
  e.preventDefault();
  if (isSettingsOpen()) {
    closeGame();
    return;
  }
  var frame = document.getElementById('game-frame');
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({type:'pause'}, '*');
  }
});

// Init
async function init() {
  await loadLanguageConfig();
  var activeLang = getActiveLanguage();
  var langConfig = getLanguageConfig(activeLang);
  if (langConfig) {
    filteredGames = GAMES.filter(function(g) { return langConfig.games.indexOf(g.id) !== -1; }).map(function(g) {
      var override = resolveGameName(activeLang, g.id);
      if (override) return Object.assign({}, g, { name: override.name || g.name, desc: override.desc || g.desc });
      return g;
    });
  } else {
    filteredGames = GAMES.slice();
  }
  N = filteredGames.length;
  buildCards();
  setCarouselTransition(true);
  // Start with last played game centered, or first
  var lastId = getLastPlayed();
  if (lastId) {
    for (var i = 0; i < filteredGames.length; i++) {
      if (filteredGames[i].id === lastId) { currentIndex = i; break; }
    }
  }
  updateCarousel();
}

// Auto-launch game from URL param (e.g. ?game=rootsky&d=20260302)
function checkDeepLink() {
  var params = new URLSearchParams(window.location.search);
  var gameId = params.get('game');
  if (!gameId) return;
  for (var i = 0; i < filteredGames.length; i++) {
    if (filteredGames[i].id === gameId) {
      currentIndex = i;
      updateCarousel();
      // Forward all params except 'game' to the game page
      var gameParams = new URLSearchParams();
      params.forEach(function(val, key) {
        if (key !== 'game') gameParams.set(key, val);
      });
      var qs = gameParams.toString();
      openInFrame(filteredGames[i].file + (qs ? '?' + qs : ''));
      setLastPlayed(gameId);
      // Clean URL without reloading
      if (window.history.replaceState) {
        window.history.replaceState({}, '', window.location.pathname);
      }
      return;
    }
  }
}

// Hamburger menu (game picker)
var hamBtn = document.getElementById('hamburger-btn');
var hamMenu = document.getElementById('hamburger-menu');
var gameFrame = document.getElementById('game-frame');

function disableFrameClicks() { gameFrame.style.pointerEvents = 'none'; }
function enableFrameClicks() { gameFrame.style.pointerEvents = ''; }

function closePickerMenu() {
  hamMenu.classList.remove('open');
  hamBtn.classList.remove('open');
  hamBtn.setAttribute('aria-expanded', 'false');
  enableFrameClicks();
}
hamBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  closeGameMenu();
  var open = hamMenu.classList.toggle('open');
  hamBtn.classList.toggle('open', open);
  hamBtn.setAttribute('aria-expanded', String(open));
  if (open) {
    disableFrameClicks();
    if (gameFrame.contentWindow && gameFrame.style.display !== 'none') {
      gameFrame.contentWindow.postMessage({type:'pause'}, '*');
    }
  } else {
    enableFrameClicks();
  }
});
document.getElementById('menu-settings').addEventListener('click', function(e) {
  e.preventDefault();
  closePickerMenu();
  openInFrame('./settings.html');
});

// Hamburger menu (in-game back-bar)
var hamBtnGame = document.getElementById('hamburger-btn-game');
var hamMenuGame = document.getElementById('hamburger-menu-game');
function closeGameMenu() {
  hamMenuGame.classList.remove('open');
  hamBtnGame.classList.remove('open');
  hamBtnGame.setAttribute('aria-expanded', 'false');
  enableFrameClicks();
}
hamBtnGame.addEventListener('click', function(e) {
  e.stopPropagation();
  closePickerMenu();
  var open = hamMenuGame.classList.toggle('open');
  hamBtnGame.classList.toggle('open', open);
  hamBtnGame.setAttribute('aria-expanded', String(open));
  if (open) {
    disableFrameClicks();
    if (gameFrame.contentWindow) gameFrame.contentWindow.postMessage({type:'pause'}, '*');
  } else {
    enableFrameClicks();
  }
});
document.getElementById('menu-games').addEventListener('click', function(e) {
  e.preventDefault();
  closeGameMenu();
  closeGame();
});
document.getElementById('menu-settings-game').addEventListener('click', function(e) {
  e.preventDefault();
  closeGameMenu();
  openInFrame('./settings.html');
});
// Close any open menu on outside click
document.addEventListener('click', function(e) {
  if (!hamMenu.contains(e.target) && !hamBtn.contains(e.target)) {
    closePickerMenu();
  }
  if (!hamMenuGame.contains(e.target) && !hamBtnGame.contains(e.target)) {
    closeGameMenu();
  }
});

// Helper to open a page in the iframe
var _currentFrameUrl = '';
function openInFrame(url) {
  var frame = document.getElementById('game-frame');
  var backBar = document.getElementById('back-bar');
  // Set game name in back bar
  var gameName = '';
  var gameIcon = '';
  for (var i = 0; i < filteredGames.length; i++) {
    if (url.indexOf(filteredGames[i].file) !== -1) {
      gameName = filteredGames[i].name;
      gameIcon = filteredGames[i].icon;
      break;
    }
  }
  if (url.indexOf('settings.html') !== -1) gameName = 'Settings';
  document.getElementById('bar-game-name').textContent = gameName;
  var iconEl = document.getElementById('bar-game-icon');
  var iconUse = document.getElementById('bar-game-icon-use');
  if (gameIcon) {
    iconUse.setAttribute('href', gameIcon);
    iconEl.style.display = 'inline';
  } else {
    iconEl.style.display = 'none';
  }
  backBar.style.display = 'block';
  var barH = backBar.offsetHeight;
  frame.style.top = barH + 'px';
  frame.style.height = 'calc(100% - ' + barH + 'px)';
  frame.src = url;
  frame.style.display = 'block';
  _currentFrameUrl = url;
}

function isSettingsOpen() {
  return _currentFrameUrl.indexOf('settings.html') !== -1 &&
    document.getElementById('game-frame').style.display !== 'none';
}

// Language flags
var LANG_FLAGS = {
  'ru': '<svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="6.67" fill="#fff"/><rect y="6.67" width="28" height="6.67" fill="#0039a6"/><rect y="13.33" width="28" height="6.67" fill="#d52b1e"/></svg>',
  'pt-br': '<svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#009739"/><polygon points="14,2 26,10 14,18 2,10" fill="#FEDD00"/><circle cx="14" cy="10" r="4.5" fill="#002776"/><path d="M9.5 10.5 Q14 7.5 18.5 10.5" fill="none" stroke="#fff" stroke-width="0.6"/></svg>',
  'uk': '<svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="10" fill="#005BBB"/><rect y="10" width="28" height="10" fill="#FFD500"/></svg>'
};
function updateLangFlags() {
  var lang = getActiveLanguage();
  var svg = LANG_FLAGS[lang] || '';
  document.getElementById('lang-flag-home').innerHTML = svg;
  document.getElementById('lang-flag-game').innerHTML = svg;
}

init().then(function() {
  updateLangFlags();
  checkDeepLink();
});
window.addEventListener('resize', function() { updateCarousel(); });
// Listen for theme changes from settings iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'themeChange' && e.data.theme) {
    hjlrSetTheme(e.data.theme);
  }
  if (e.data && e.data.type === 'bgModeChange' && e.data.bgMode) {
    hjlrSetBgMode(e.data.bgMode);
  }
  if (e.data && e.data.type === 'languageChange' && e.data.language) {
    setActiveLanguage(e.data.language);
    updateLangFlags();
    var lc = getLanguageConfig(e.data.language);
    if (lc) {
      filteredGames = GAMES.filter(function(g) { return lc.games.indexOf(g.id) !== -1; }).map(function(g) {
        var override = resolveGameName(e.data.language, g.id);
        if (override) return Object.assign({}, g, { name: override.name || g.name, desc: override.desc || g.desc });
        return g;
      });
      N = filteredGames.length;
      currentIndex = 0;
      buildCards();
      setCarouselTransition(true);
      updateCarousel();
    }
  }
});

// Auth: show login/logout in menus, sync settings on load
authReady.then(function() {
  var authBtn = document.getElementById('menu-auth');
  var authLabel = document.getElementById('menu-auth-label');
  var authBtnGame = document.getElementById('menu-auth-game');
  var authLabelGame = document.getElementById('menu-auth-game-label');

  function updateAuthUI() {
    if (isSubscriber()) {
      var name = getDisplayName() || 'Player';
      authLabel.textContent = name + ' (Logout)';
      authLabelGame.textContent = name + ' (Logout)';
    } else {
      authLabel.textContent = 'Login with Patreon';
      authLabelGame.textContent = 'Login with Patreon';
    }
    authBtn.style.display = '';
    authBtnGame.style.display = '';
  }

  updateAuthUI();

  authBtn.addEventListener('click', function(e) {
    e.preventDefault();
    closePickerMenu();
    if (isSubscriber()) { logout().then(function() { updateAuthUI(); }); }
    else { loginWithPatreon(); }
  });
  authBtnGame.addEventListener('click', function(e) {
    e.preventDefault();
    closeGameMenu();
    if (isSubscriber()) { logout().then(function() { updateAuthUI(); }); }
    else { loginWithPatreon(); }
  });

  // Sync settings from server on login
  if (isSubscriber()) {
    loadSettings().then(function() {
      updateLangFlags();
      // Re-init with synced language if it changed
      var syncedLang = getActiveLanguage();
      var lc = getLanguageConfig(syncedLang);
      if (lc) {
        filteredGames = GAMES.filter(function(g) { return lc.games.indexOf(g.id) !== -1; }).map(function(g) {
          var override = resolveGameName(syncedLang, g.id);
          if (override) return Object.assign({}, g, { name: override.name || g.name, desc: override.desc || g.desc });
          return g;
        });
        N = filteredGames.length;
        currentIndex = 0;
        var lastId = getLastPlayed();
        if (lastId) {
          for (var i = 0; i < filteredGames.length; i++) {
            if (filteredGames[i].id === lastId) { currentIndex = i; break; }
          }
        }
        buildCards();
        setCarouselTransition(true);
        updateCarousel();
      }
    });
  }
});
</script>
