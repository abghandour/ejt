<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triviatsky — Daily Trivia Game</title>
<link rel="icon" href="../shared/assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="../shared/assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="How Janey Learned Russian">
<link rel="manifest" href="../shared/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<script src="../shared/theme.js"></script>
<link rel="stylesheet" href="../shared/base.css">
<style>
/* ===== GAME AREA ===== */
#game-area{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1 1 0;
  min-height:0;
  overflow-y:auto;
  padding-bottom:16px;
}

/* ===== TOP BAR OVERRIDES ===== */
#top-bar{
  gap:10px;
}
#top-bar button{
  background:none;
  border:1px solid var(--btn-border);
  border-radius:6px;
  color:var(--accent);
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
#calendar-btn{
  flex:1;
  justify-content:center;
}
#calendar-date-label{
  font-size:16px;
  font-weight:700;
  font-family:'Roboto Condensed',sans-serif;
}
#top-bar button:hover{
  border-color:var(--accent);
  background:var(--accent-subtle);
}
#share-btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}
#leaderboard-btn{
  background:none;
  border:1px solid var(--btn-border, var(--border-subtle));
  border-radius:6px;
  color:var(--accent);
  padding:4px 8px;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1;
  margin-left:auto;
  -webkit-tap-highlight-color:transparent;
}
#leaderboard-btn:hover{border-color:var(--accent)}
#leaderboard-btn svg{width:18px;height:18px;fill:var(--accent);display:block}
/* ===== DIFFICULTY SELECT ===== */
#difficulty-select{
  display:flex;
  gap:10px;
  margin:12px 0;
}
.difficulty-btn{
  flex:1;
  padding:12px 16px;
  font-family:'Roboto Condensed',sans-serif;
  font-size:16px;
  font-weight:700;
  background:var(--btn-bg);
  border:2px solid var(--btn-border);
  border-radius:10px;
  color:var(--text-primary);
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.difficulty-btn:hover{
  border-color:var(--accent);
  background:var(--btn-bg-active);
}
.difficulty-btn.selected{
  border-color:var(--accent);
  background:var(--accent-subtle);
  box-shadow:0 0 10px var(--accent-glow);
}
.difficulty-desc{
  font-size:11px;
  font-weight:400;
  color:var(--text-secondary);
}

/* ===== CATEGORY LABEL ===== */
#category-label{
  font-size:24px;
  font-weight:700;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1.5px;
  text-align:center;
  padding:24px 16px 12px;
  font-family:'Roboto Condensed',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
#category-label:empty{display:none}
#category-label svg{width:28px;height:28px;fill:var(--accent);flex-shrink:0;border:2px solid var(--accent);border-radius:8px;padding:4px}

/* ===== HINT DISPLAY ===== */
#hint-display{
  font-size:13px;
  color:var(--info);
  text-align:center;
  font-style:italic;
  padding:4px 16px;
  max-width:600px;
}
#hint-display:empty{display:none}

/* ===== QUESTION TRACKER ROW ===== */
#question-tracker{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:52px 16px 24px;
  flex-shrink:0;
}
.tracker-row{
  display:flex;
  justify-content:center;
  gap:8px;
  width:100%;
}
.tracker-btn{
  flex:1;
  max-width:72px;
  min-height:36px;
  background:var(--btn-bg);
  border:2px solid var(--btn-border);
  border-radius:8px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:4px 2px;
  transition:all 0.25s;
  gap:2px;
  font-family:'Roboto Condensed',sans-serif;
  font-size:12px;
  font-weight:700;
  color:var(--text-secondary);
}
.tracker-btn .tracker-stars{
  padding:0 4px;
}
.tracker-btn:hover{
  border-color:var(--accent);
  background:var(--btn-bg-active);
  transform:translateY(-1px);
}
.tracker-btn:disabled{
  cursor:default;
  opacity:0.7;
}
.tracker-btn:disabled:hover{
  border-color:var(--btn-border);
  background:var(--btn-bg);
  transform:none;
}
.tracker-btn.active{
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}
.tracker-btn.answered{
  background:var(--success-bg);
  border-color:var(--success);
}
.tracker-btn .tracker-stars{
  display:flex;
  gap:0;
  line-height:1;
}
.tracker-btn .tracker-stars .icon-star{
  width:8px;
  height:8px;
}

/* ===== QUESTION DISPLAY AREA ===== */
#question-display-area{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px 16px 8px;
  flex:1 1 0;
  min-height:0;
}

#question-image-container{
  width:100%;
  max-width:400px;
  display:flex;
  justify-content:center;
  margin-bottom:8px;
}
#question-image-container:empty{
  display:none;
}
#question-image-container img{
  max-width:100%;
  max-height:200px;
  border-radius:8px;
  border:1px solid var(--border-subtle);
  object-fit:contain;
}

#question-text{
  font-size:clamp(18px,5vw,26px);
  font-weight:700;
  color:var(--text-primary);
  text-align:center;
  line-height:1.3;
  margin-bottom:4px;
}

#question-translation{
  font-size:clamp(13px,3vw,16px);
  color:var(--info);
  text-align:center;
  margin-bottom:8px;
  min-height:20px;
  transition:opacity 0.3s;
}

/* ===== TIMER DISPLAY ===== */
#timer-display{
  width:100%;
  max-width:400px;
  text-align:center;
  padding:6px 12px;
  margin-bottom:8px;
  font-size:18px;
  font-weight:700;
  color:var(--accent);
  font-variant-numeric:tabular-nums;
}
#timer-display .timer-bar{
  width:100%;
  height:6px;
  background:var(--border-subtle);
  border-radius:3px;
  margin-top:4px;
  overflow:hidden;
}
#timer-display .timer-bar-fill{
  height:100%;
  background:var(--accent);
  border-radius:3px;
  transition:width 1s linear;
}
#timer-display.urgent{
  color:var(--danger);
}
#timer-display.urgent .timer-bar-fill{
  background:var(--danger);
}

/* ===== ANSWER GRID ===== */
#answer-grid{
  width:100%;
  max-width:600px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 16px;
}

.answer-btn{
  padding:14px 12px;
  font-size:15px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:var(--btn-bg);
  border:2px solid var(--btn-border);
  border-radius:8px;
  color:var(--text-primary);
  cursor:pointer;
  transition:all 0.25s;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  min-height:52px;
  word-wrap:break-word;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
}
.answer-btn:hover:not(:disabled):not(.correct):not(.wrong){
  background:var(--btn-bg-active);
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 4px 16px var(--accent-glow);
}
.answer-btn:disabled{
  cursor:not-allowed;
  opacity:0.5;
}
.answer-btn.correct:disabled{
  opacity:1;
  cursor:default;
}
.answer-btn.correct{
  background:var(--tile-correct-bg);
  border-color:var(--tile-correct-border);
  color:var(--success-text);
  box-shadow:0 0 20px rgba(85,170,85,0.3);
}
.answer-btn.wrong{
  background:var(--tile-wrong-bg);
  border-color:var(--tile-wrong-border);
  color:var(--danger-text);
  box-shadow:0 0 20px rgba(204,68,68,0.3);
  animation:wrongShake 0.4s ease;
}
.answer-btn .answer-translation{
  font-size:11px;
  font-weight:400;
  color:var(--info);
  line-height:1.2;
}

/* ===== NEXT BUTTON ===== */
#next-btn{
  visibility:visible;
  margin-top:12px;
  padding:12px 40px;
  font-size:18px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  background:var(--btn-play-bg);
  border:2px solid var(--btn-play-border);
  border-radius:12px;
  color:var(--text-primary);
  cursor:pointer;
  transition:all 0.25s;
  box-shadow:0 4px 16px var(--btn-play-shadow);
}
#next-btn:hover{
  transform:translateY(-2px);
  border-color:var(--btn-play-border);
}

/* ===== POST-ANSWER IMAGE ===== */
#post-answer-image-container{
  width:100%;
  max-width:400px;
  display:flex;
  justify-content:center;
  padding:12px 16px 0;
}
#post-answer-image-container img{
  max-width:100%;
  max-height:200px;
  border-radius:8px;
  border:1px solid var(--border-subtle);
  object-fit:contain;
}

/* ===== MESSAGE / ERROR AREA ===== */
#message-area{
  width:100%;
  max-width:600px;
  text-align:center;
  padding:8px 16px;
  font-size:14px;
  min-height:24px;
  color:var(--accent);
}
#message-area.error{color:var(--danger)}
#message-area.success{color:var(--success-text)}

/* ===== START SCREEN ===== */
#start-btn{
  padding:16px 52px;
  font-size:24px;
}

/* ===== RESULTS OVERLAY ===== */
#results-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg-overlay);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
  overflow-y:auto;
}
#results-overlay.hidden{display:none}

#results-popup{
  width:100%;
  max-width:420px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:12px;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
#results-popup h2{
  font-family:'Roboto Condensed',sans-serif;
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  text-align:center;
}
#results-date{
  font-size:13px;
  color:var(--text-secondary);
  letter-spacing:1px;
  margin-top:-8px;
}
#results-questions{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.result-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid var(--border-divider);
  font-size:14px;
  gap:8px;
}
.result-row .result-question{
  color:var(--text-primary);
  font-weight:700;
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.result-row .result-stars{
  font-size:16px;
  letter-spacing:2px;
  flex-shrink:0;
  display:flex;
  align-items:center;
}
#results-total{
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}
#results-actions{
  display:flex;
  flex-wrap:nowrap;
  gap:8px;
  justify-content:center;
  width:100%;
}
.results-btn{
  padding:10px 20px;
  font-size:14px;
  font-family:'Roboto Condensed',sans-serif;
  font-weight:700;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
  display:inline-flex;
  align-items:center;
  gap:6px;
}
.share-btn{
  background:var(--btn-bg);
  border:2px solid var(--btn-border);
  color:var(--text-primary);
}
.share-btn:hover{
  border-color:var(--accent);
  background:var(--btn-bg-active);
}

/* ===== CALENDAR OVERLAY ===== */
#calendar-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg-overlay);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
}
#calendar-overlay.hidden{display:none}

#calendar-popup{
  width:100%;
  max-width:360px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:12px;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
#calendar-header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#calendar-header h3{
  font-family:'Roboto Condensed',sans-serif;
  font-size:18px;
  font-weight:700;
  color:var(--accent);
}
.cal-nav-btn{
  background:none;
  border:1px solid var(--btn-border);
  border-radius:6px;
  color:var(--accent);
  font-size:18px;
  padding:4px 10px;
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Roboto Condensed',sans-serif;
}
.cal-nav-btn:hover{
  border-color:var(--accent);
  background:var(--accent-subtle);
}
#calendar-close-btn{
  background:none;
  border:none;
  color:var(--text-secondary);
  font-size:22px;
  cursor:pointer;
  padding:2px 6px;
  transition:color 0.2s;
}
#calendar-close-btn:hover{color:var(--text-primary)}

#calendar-weekdays{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  text-align:center;
  font-size:12px;
  color:var(--text-secondary);
  font-weight:700;
}
#calendar-grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}
.cal-day{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  border:2px solid transparent;
  color:var(--border-subtle);
  font-weight:400;
}
.cal-day:hover:not(.disabled):not(.empty){
  border-color:var(--accent);
  background:var(--accent-subtle);
}
.cal-day.empty{cursor:default}
.cal-day.disabled{
  color:var(--border-subtle);
  cursor:not-allowed;
}
.cal-day.has-data{
  color:var(--success-text);
  font-weight:700;
}
.cal-day.played{
  color:var(--success-text);
  font-weight:700;
  background:rgba(85,170,85,0.25);
}
.cal-day.today{
  border:2px solid var(--accent);
}
.cal-day.selected{
  border:2px solid var(--text-primary);
  border-radius:50%;
  box-shadow:0 0 8px var(--accent-glow);
}

/* ===== TRANSLATION ELEMENTS ===== */
.translation{
  transition:opacity 0.3s;
}

/* ===== NO GAME POPUP ===== */
#no-game-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg-overlay);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  backdrop-filter:blur(8px);
  padding:20px;
}
#no-game-overlay.hidden{display:none}
#no-game-popup{
  width:100%;
  max-width:360px;
  background:var(--bg-surface);
  border:1px solid var(--border-subtle);
  border-radius:12px;
  padding:28px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  text-align:center;
}
#no-game-popup h2{
  font-family:'Roboto Condensed',sans-serif;
  font-size:20px;
  font-weight:700;
  color:var(--accent);
}
#no-game-popup p{
  font-size:14px;
  color:var(--text-secondary);
  line-height:1.5;
  max-width:280px;
}

/* ===== QUESTION ENTRANCE ANIMATION ===== */
@keyframes questionSlideIn{
  0%{opacity:0;transform:translateY(60px) scale(0.9) rotate(-2deg)}
  50%{opacity:1;transform:translateY(-10px) scale(1.02) rotate(0.5deg)}
  70%{transform:translateY(4px) scale(0.99)}
  100%{transform:translateY(0) scale(1) rotate(0deg)}
}
@keyframes answerPop{
  0%{opacity:0;transform:scale(0.3) rotate(-8deg)}
  60%{opacity:1;transform:scale(1.08) rotate(1deg)}
  80%{transform:scale(0.96)}
  100%{transform:scale(1) rotate(0deg)}
}
.question-enter #question-text,
.question-enter #question-translation,
.question-enter #hint-display,
.question-enter #category-label{
  animation:questionSlideIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
.question-enter .answer-btn{
  animation:answerPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.question-enter .answer-btn:nth-child(1){animation-delay:0.15s}
.question-enter .answer-btn:nth-child(2){animation-delay:0.25s}
.question-enter .answer-btn:nth-child(3){animation-delay:0.35s}
.question-enter .answer-btn:nth-child(4){animation-delay:0.45s}
.question-enter .answer-btn:nth-child(5){animation-delay:0.55s}
.question-enter .answer-btn:nth-child(6){animation-delay:0.65s}

/* ===== WRONG ANSWER EXPLOSION ===== */
@keyframes explodeBtn{
  0%{transform:scale(1);opacity:1;filter:brightness(1)}
  15%{transform:scale(1.15);filter:brightness(1.8)}
  40%{transform:scale(1.3);opacity:0.8;filter:brightness(2)}
  100%{transform:scale(0.01);opacity:0;filter:brightness(3)}
}
.answer-btn.exploding{
  animation:explodeBtn 0.5s cubic-bezier(0.25,0,0.5,1) forwards;
  pointer-events:none;
}

/* ===== EXPLOSION PARTICLES ===== */
.explosion-particle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  pointer-events:none;
  z-index:50;
}

/* ===== CONFETTI ===== */
.confetti-canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:200;
}

/* ===== UTILITY ===== */
.hidden{display:none!important}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  #top-bar{padding:6px 10px}
  #question-text{font-size:clamp(16px,4.5vw,22px)}
  .answer-btn{padding:10px 8px;font-size:13px;min-height:40px}
  #answer-grid{gap:8px;padding:0 10px}
  #question-tracker{gap:4px;padding:8px 10px 0}
  .tracker-row{gap:5px}
  .tracker-btn{min-height:30px;padding:3px 1px}
  #question-display-area{padding:10px 10px 6px}
  #results-popup{padding:16px 14px}
  #results-popup h2{font-size:18px}
  .results-btn{padding:8px 14px;font-size:13px}
  #next-btn{padding:10px 32px;font-size:16px}
}

@media(min-width:768px){
  #question-display-area{padding:24px 16px 12px}
  #question-text{font-size:28px}
  .answer-btn{padding:18px 16px;font-size:16px}
}

@media(min-width:1024px){
  body{justify-content:flex-start;padding-top:20px}
}
</style>
</head>

<!-- SVG Icon Definitions -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

<script>
  // ===== DATA LOADER MODULE (Task 2.1) =====

  let allGameData = null;
  let allGameDataLang = null;
  let calendarAvailableDates = [];
  let loadError = false;

  var currentDateStr = '';
  var currentQuestions = null;
  var gameState = null;

  function validateQuestion(q) {
    if (!q || typeof q !== 'object') return false;
    if (typeof q.question !== 'string' || q.question.trim() === '') return false;
    if (!Array.isArray(q.answers) || q.answers.length < 2 || q.answers.length > 6) return false;
    for (let i = 0; i < q.answers.length; i++) {
      if (typeof q.answers[i] !== 'string' || q.answers[i].trim() === '') return false;
    }
    if (typeof q.correctIndex !== 'number' || !Number.isInteger(q.correctIndex)) return false;
    if (q.correctIndex < 0 || q.correctIndex >= q.answers.length) return false;
    return true;
  }

  function formatFriendlyDate(dateStr) {
    if (!dateStr || dateStr.length !== 8) return '';
    var y = parseInt(dateStr.substring(0, 4), 10);
    var m = parseInt(dateStr.substring(4, 6), 10) - 1;
    var d = parseInt(dateStr.substring(6, 8), 10);
    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var date = new Date(y, m, d);
    return days[date.getDay()] + ', ' + months[m] + ' ' + d + ', ' + y;
  }

  function updateCalendarDateLabel() {
    var el = document.getElementById('calendar-date-label');
    if (el) el.textContent = formatFriendlyDate(currentDateStr);
  }

  var CATEGORY_ICONS = {
    'Grammar': '<svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>',
    'History': '<svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7a6.97 6.97 0 0 1-4.95-2.05l-1.41 1.41A8.96 8.96 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8z"/></svg>',
    'Literature': '<svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12z"/></svg>',
    'Geography': '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
    'Pop Culture': '<svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4z"/></svg>',
    'Famous Russians': '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>',
    'Idioms': '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16z"/></svg>',
    'Vocabulary': '<svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2zm-2.62 7l1.62-4.33L19.12 17z"/></svg>',
    'Holidays & Traditions': '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8z"/></svg>'
  };

  function updateCategoryLabel() {
    var el = document.getElementById('category-label');
    if (!el || !currentQuestions || currentQuestions.length === 0 || !gameState) { el.innerHTML = ''; return; }
    var idx = gameState.currentQuestionIndex || 0;
    var cat = currentQuestions[idx] && currentQuestions[idx].category;
    if (!cat) { el.innerHTML = ''; return; }
    var icon = CATEGORY_ICONS[cat] || '';
    el.innerHTML = icon + '<span>' + cat + '</span>';
  }

  async function loadGameData(dateStr) {
    loadError = false;
    let data;
    try {
      var lang = getActiveLanguage();
      if (allGameData && allGameDataLang === lang) {
        data = allGameData;
      } else {
        allGameData = null;
        allGameDataLang = null;
        const resp = await fetch(resolveDictionaryUrl(lang, 'triviatsky'));
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        allGameData = data;
        allGameDataLang = lang;
        calendarAvailableDates = Object.keys(data);
      }
    } catch (e) {
      loadError = true;
      return null;
    }

    const entries = data[dateStr];
    if (!entries || !Array.isArray(entries)) {
      return null;
    }

    const valid = entries.filter(function(q, idx) {
      if (!validateQuestion(q)) {
        console.warn('Triviatsky: skipping invalid question at index ' + idx + ' for date ' + dateStr);
        return false;
      }
      return true;
    });

    if (valid.length === 0) {
      return null;
    }

    return valid;
  }

  // ===== ANSWER SHUFFLER MODULE (Task 2.3) =====

  function shuffleAnswers(answers, correctIndex) {
    const shuffled = answers.slice();
    let correctPos = correctIndex;

    // Fisher-Yates shuffle, tracking where the correct answer ends up
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));

      // Track the correct answer's position through swaps
      if (correctPos === i) {
        correctPos = j;
      } else if (correctPos === j) {
        correctPos = i;
      }

      const tmp = shuffled[i];
      shuffled[i] = shuffled[j];
      shuffled[j] = tmp;
    }

    return { shuffledAnswers: shuffled, correctShuffledIndex: correctPos };
  }

  // ===== SCORE TRACKER MODULE (Task 2.5) =====

  function getTotalScore(questionScores) {
    let total = 0;
    for (let i = 0; i < questionScores.length; i++) {
      total += questionScores[i];
    }
    return total;
  }

  function getMaxScore(questionCount) {
    return questionCount * 5;
  }

  function getStarRatingText(score) {
    let s = '';
    for (let i = 0; i < 5; i++) {
      s += i < score ? '★' : '☆';
    }
    return s;
  }

  function getStarRatingHTML(score) {
    let html = '';
    for (let i = 0; i < 5; i++) {
      const icon = i < score ? 'ico-star-filled' : 'ico-star-empty';
      html += '<svg class="icon icon-sm"><use href="#' + icon + '"/></svg>';
    }
    return html;
  }

  // ===== STATE PERSISTENCE MODULE (Task 2.7) =====

  function saveGameState(state) {
    try {
      localStorage.setItem('triviatsky_state_' + getActiveLanguage() + '_' + state.date, JSON.stringify(state));
      // Sync to Supabase
      if (typeof isSubscriber === 'function' && isSubscriber()) {
        var isoDate = state.date.substring(0, 4) + '-' + state.date.substring(4, 6) + '-' + state.date.substring(6, 8);
        var phase = state.completed ? 'finished' : 'playing';
        syncDailyState('triviatsky', getActiveLanguage(), isoDate, state, phase);
      }
    } catch (e) {
      // Silently fail if localStorage is unavailable
    }
  }

  function loadGameState(dateStr) {
    try {
      const raw = localStorage.getItem('triviatsky_state_' + getActiveLanguage() + '_' + dateStr);
      if (raw === null) return null;
      return JSON.parse(raw);
    } catch (e) {
      // Corrupted data — clear it and return null
      try { localStorage.removeItem('triviatsky_state_' + getActiveLanguage() + '_' + dateStr); } catch (_) {}
      return null;
    }
  }

  function saveToHistory(dateStr, questionScores, completed) {
    try {
      var hkey = 'triviatsky_history_' + getActiveLanguage();
      var history = {};
      try {
        var raw = localStorage.getItem(hkey);
        if (raw !== null) history = JSON.parse(raw);
      } catch (e) {
        history = {};
      }
      history[dateStr] = { questionScores: questionScores, completed: completed };
      localStorage.setItem(hkey, JSON.stringify(history));
    } catch (e) {
      // Silently fail if localStorage is unavailable
    }
  }

  function loadHistory() {
    try {
      var hkey = 'triviatsky_history_' + getActiveLanguage();
      var raw = localStorage.getItem(hkey);
      if (raw === null) return {};
      return JSON.parse(raw);
    } catch (e) {
      // Corrupted data — clear it and return empty
      try { localStorage.removeItem('triviatsky_history_' + getActiveLanguage()); } catch (_) {}
      return {};
    }
  }

  // ===== TRANSLATION TOGGLE MODULE (Task 2.9) =====

  function getTranslationPref() {
    try {
      var val = localStorage.getItem('triviatsky_translation_toggle');
      if (val === 'hide') return 'hide';
      return 'show';
    } catch (e) {
      return 'show';
    }
  }

  function setTranslationPref(show) {
    try {
      localStorage.setItem('triviatsky_translation_toggle', show ? 'show' : 'hide');
    } catch (e) {
      // Silently fail if localStorage is unavailable
    }
  }

  function applyTranslationVisibility() {
    var pref = getTranslationPref();
    var els = document.querySelectorAll('.translation');
    for (var i = 0; i < els.length; i++) {
      els[i].style.display = pref === 'show' ? '' : 'none';
    }
  }

  // ===== SHARING MODULE (Task 2.11) =====

  function formatShareText(dateStr, questionScores, questions) {
    var lines = [];
    lines.push('Triviatsky ' + dateStr);
    for (var i = 0; i < questionScores.length; i++) {
      lines.push('Q' + (i + 1) + ': ' + getStarRatingText(questionScores[i]));
    }
    var total = getTotalScore(questionScores);
    var max = getMaxScore(questions.length);
    lines.push('Total: ' + total + '/' + max);
    return lines.join('\n');
  }

  // ===== TIMER MODULE (Task 4.1) =====

  var _timerIntervalId = null;
  var _timerRemaining = 0;
  var _timerPaused = false;
  var _timerOnTick = null;
  var _timerOnExpire = null;
  var _timerTotalSeconds = 0;

  function startCountdown(seconds, onTick, onExpire) {
    stopCountdown();
    _timerRemaining = seconds;
    _timerPaused = false;
    _timerOnTick = onTick || null;
    _timerOnExpire = onExpire || null;

    if (_timerOnTick) _timerOnTick(_timerRemaining);

    _timerIntervalId = setInterval(function() {
      _timerRemaining--;
      if (_timerOnTick) _timerOnTick(_timerRemaining);
      if (_timerRemaining <= 0) {
        clearInterval(_timerIntervalId);
        _timerIntervalId = null;
        if (_timerOnExpire) _timerOnExpire();
      }
    }, 1000);
  }

  function stopCountdown() {
    if (_timerIntervalId !== null) {
      clearInterval(_timerIntervalId);
      _timerIntervalId = null;
    }
    _timerRemaining = 0;
    _timerPaused = false;
    _timerOnTick = null;
    _timerOnExpire = null;
  }

  function pauseCountdown() {
    if (_timerIntervalId !== null && !_timerPaused) {
      clearInterval(_timerIntervalId);
      _timerIntervalId = null;
      _timerPaused = true;
    }
  }

  function resumeCountdown() {
    if (_timerPaused && _timerRemaining > 0) {
      _timerPaused = false;
      _timerIntervalId = setInterval(function() {
        _timerRemaining--;
        if (_timerOnTick) _timerOnTick(_timerRemaining);
        if (_timerRemaining <= 0) {
          clearInterval(_timerIntervalId);
          _timerIntervalId = null;
          if (_timerOnExpire) _timerOnExpire();
        }
      }, 1000);
    }
  }

  // Integrate with shared pause/resume system
  onGamePause(function() { pauseCountdown(); });
  onGameResume(function() { resumeCountdown(); });

  // ===== UI RENDERER: START SCREEN (Task 5.2) =====

  function renderStartScreen(hasProgress) {
    document.getElementById('start-btn').textContent = hasProgress ? 'Resume' : 'Start';
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('game-area').classList.add('hidden');

    // Set difficulty buttons to match saved translation pref
    var pref = getTranslationPref();
    var btns = document.querySelectorAll('#difficulty-select .difficulty-btn');
    for (var i = 0; i < btns.length; i++) {
      var mode = btns[i].getAttribute('data-mode');
      btns[i].classList.toggle('selected', pref === 'show' ? mode === 'easy' : mode === 'hard');
    }
  }

  // ===== UI RENDERER: QUESTION & ANSWER GRID (Task 5.3) =====

  function renderQuestion(question, questionIndex, state) {
    // 1. Set question text
    document.getElementById('question-text').innerHTML = question.question;

    // 2. Question image
    var imgContainer = document.getElementById('question-image-container');
    imgContainer.innerHTML = '';
    if (question.image) {
      var img = document.createElement('img');
      img.src = question.image;
      img.alt = 'Question image';
      img.onerror = function() { imgContainer.innerHTML = ''; };
      imgContainer.appendChild(img);
    }

    // 3. Question translation
    var transEl = document.getElementById('question-translation');
    if (question.questionTranslation) {
      transEl.textContent = question.questionTranslation;
    } else {
      transEl.textContent = '';
    }

    // 4. Apply translation visibility based on toggle
    applyTranslationVisibility();

    // 4b. Show hint if available
    var hintEl = document.getElementById('hint-display');
    if (question.hint) {
      hintEl.textContent = question.hint;
    } else {
      hintEl.textContent = '';
    }

    // 5. Shuffle answers (or restore from state)
    if (!state.shuffledAnswers) {
      state.shuffledAnswers = [];
      state.correctShuffledIndex = [];
    }

    if (state.shuffledAnswers[questionIndex]) {
      // Restore saved shuffle order
    } else {
      // Shuffle for the first time and save to state
      var ci = (question.correctIndex !== null && question.correctIndex !== undefined) ? question.correctIndex : 0;
      var result = shuffleAnswers(question.answers, ci);
      state.shuffledAnswers[questionIndex] = result.shuffledAnswers;
      state.correctShuffledIndex[questionIndex] = result.correctShuffledIndex;
    }

    var shuffled = state.shuffledAnswers[questionIndex];
    var correctIdx = state.correctShuffledIndex[questionIndex];

    // Build shuffled answer translations if they exist
    var shuffledTranslations = null;
    if (question.answerTranslations && question.answerTranslations.length === question.answers.length) {
      // Map original translations to shuffled order
      shuffledTranslations = [];
      for (var i = 0; i < shuffled.length; i++) {
        // Find the original index of this shuffled answer
        var origIdx = question.answers.indexOf(shuffled[i]);
        shuffledTranslations.push(question.answerTranslations[origIdx]);
      }
    }

    // Determine disabled indices and revealed status from state
    var disabledIndices = (state.disabledOptions && state.disabledOptions[questionIndex]) || [];
    var revealed = (state.revealed && state.revealed[questionIndex]) || false;

    // 6. Render the answer grid
    renderAnswerGrid(shuffled, disabledIndices, correctIdx, revealed, shuffledTranslations);

    // 7. Hide next button, post-answer image, and timer initially
    document.getElementById('next-btn').style.visibility = 'hidden';
    document.getElementById('post-answer-image-container').classList.add('hidden');
    document.getElementById('post-answer-image-container').innerHTML = '';
    document.getElementById('timer-display').classList.add('hidden');
  }

  function renderAnswerGrid(answers, disabledIndices, correctIndex, revealed, answerTranslations) {
    var grid = document.getElementById('answer-grid');
    grid.innerHTML = '';

    var showTrans = getTranslationPref() === 'show';

    for (var i = 0; i < answers.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.type = 'button';

      // Check if this index is disabled (wrong answer already selected)
      var isDisabled = disabledIndices.indexOf(i) !== -1;
      if (isDisabled) {
        btn.classList.add('wrong');
        btn.disabled = true;
      }

      // If revealed and this is the correct answer, highlight it
      if (revealed && i === correctIndex) {
        btn.classList.add('correct');
      }

      // If already revealed, disable all buttons
      if (revealed) {
        btn.disabled = true;
      }

      // Answer text
      var textSpan = document.createElement('span');
      textSpan.textContent = answers[i];
      btn.appendChild(textSpan);

      // Answer translation (if available and toggle is "show")
      if (answerTranslations && answerTranslations[i]) {
        var transSpan = document.createElement('span');
        transSpan.className = 'answer-translation translation';
        transSpan.textContent = answerTranslations[i];
        if (!showTrans) {
          transSpan.style.display = 'none';
        }
        btn.appendChild(transSpan);
      }

      // Click handler — reference handleAnswerClick (implemented later)
      btn.setAttribute('data-index', i);
      btn.onclick = (function(idx) {
        return function() { handleAnswerClick(idx); };
      })(i);

      grid.appendChild(btn);
    }
  }

  // ===== UI RENDERER: QUESTION TRACKER (Task 5.5) =====

  function renderQuestionTracker(state, questions) {
    var tracker = document.getElementById('question-tracker');
    tracker.innerHTML = '';

    var n = questions.length;
    // For >5 questions, split into rows as evenly as possible (max 5 per row)
    var perRow = n;
    if (n > 5) {
      var rows = Math.ceil(n / 5);
      perRow = Math.ceil(n / rows);
    }

    var row = document.createElement('div');
    row.className = 'tracker-row';

    for (var i = 0; i < n; i++) {
      if (i > 0 && i % perRow === 0) {
        tracker.appendChild(row);
        row = document.createElement('div');
        row.className = 'tracker-row';
      }

      var btn = document.createElement('button');
      btn.className = 'tracker-btn';
      btn.type = 'button';

      // Question number (1-based)
      var numSpan = document.createElement('span');
      numSpan.textContent = (i + 1);
      btn.appendChild(numSpan);

      // If answered, show star rating and add answered class
      if (state.revealed && state.revealed[i]) {
        btn.classList.add('answered');
        var starsSpan = document.createElement('span');
        starsSpan.className = 'tracker-stars';
        starsSpan.textContent = getStarRatingText(state.questionScores[i]);
        btn.appendChild(starsSpan);
      }

      // Highlight current active question
      if (i === state.currentQuestionIndex) {
        btn.classList.add('active');
      }

      // In review mode, allow clicking to navigate to that question
      if (state.completed) {
        btn.onclick = (function(idx) {
          return function() { handleTrackerClick(idx); };
        })(i);
      } else {
        btn.disabled = true;
      }

      row.appendChild(btn);
    }
    tracker.appendChild(row);
  }

  // ===== UI RENDERER: CALENDAR OVERLAY (Task 5.9) =====

  function formatDateStr(year, month, day) {
    var m = month < 10 ? '0' + month : '' + month;
    var d = day < 10 ? '0' + day : '' + day;
    return '' + year + m + d;
  }

  function renderCalendarOverlay(year, month, availableDates, history) {
    var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // 1. Set month label
    document.getElementById('calendar-month-label').textContent = monthNames[month - 1] + ' ' + year;

    // 2. Clear grid
    var grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    // 3. Calculate first day of month (Monday-based: Mon=0 .. Sun=6)
    var firstDay = new Date(year, month - 1, 1).getDay();
    // JS getDay: 0=Sun,1=Mon..6=Sat → convert to Mon-based
    var startPad = (firstDay + 6) % 7;

    // 4. Number of days in the month
    var daysInMonth = new Date(year, month, 0).getDate();

    // 5. Today's date string for comparison
    var now = new Date();
    var todayStr = formatDateStr(now.getFullYear(), now.getMonth() + 1, now.getDate());

    // 6. Add empty padding cells
    for (var p = 0; p < startPad; p++) {
      var empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    // 7. Add day cells
    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = formatDateStr(year, month, d);
      var cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.textContent = d;

      var hasData = availableDates && availableDates.indexOf(dateStr) !== -1;
      var isPlayed = history && history[dateStr] && history[dateStr].completed;

      if (hasData) cell.classList.add('has-data');
      if (isPlayed) cell.classList.add('played');
      if (dateStr === todayStr) cell.classList.add('today');

      if (hasData) {
        cell.onclick = (function(ds) {
          return function() { handleCalendarDateSelect(ds); };
        })(dateStr);
      }

      grid.appendChild(cell);
    }

    // 8. Wire up prev/next month navigation
    document.getElementById('cal-prev').onclick = function() {
      var newMonth = month - 1;
      var newYear = year;
      if (newMonth < 1) { newMonth = 12; newYear--; }
      renderCalendarOverlay(newYear, newMonth, availableDates, history);
    };

    document.getElementById('cal-next').onclick = function() {
      var newMonth = month + 1;
      var newYear = year;
      if (newMonth > 12) { newMonth = 1; newYear++; }
      renderCalendarOverlay(newYear, newMonth, availableDates, history);
    };

    // 9. Wire up Today button
    document.getElementById('cal-today-btn').onclick = function() {
      var t = new Date();
      renderCalendarOverlay(t.getFullYear(), t.getMonth() + 1, availableDates, history);
    };

    // 10. Wire up Close button
    document.getElementById('calendar-close-btn').onclick = function() {
      document.getElementById('calendar-overlay').classList.add('hidden');
    };
  }

  // ===== GAME CONTROLLER: START GAME (Task 7.2) =====

  var _elapsedInterval = null;

  function startGame() {
    // 0. Read difficulty selection and set translation pref
    var selectedBtn = document.querySelector('#difficulty-select .difficulty-btn.selected');
    var isEasy = !selectedBtn || selectedBtn.getAttribute('data-mode') === 'easy';
    setTranslationPref(isEasy);

    // 1. Mark game as started
    gameState.started = true;

    // 1b. Jump to first unanswered question on resume
    if (gameState.revealed) {
      for (var fi = 0; fi < gameState.revealed.length; fi++) {
        if (!gameState.revealed[fi]) {
          gameState.currentQuestionIndex = fi;
          break;
        }
      }
    }

    // 2. Hide start screen, show game area
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-area').classList.remove('hidden');

    // 3. Set category label
    updateCategoryLabel();

    // 4. Render question tracker
    renderQuestionTracker(gameState, currentQuestions);

    // 5. Render the current question (supports resume from saved index)
    var qi = gameState.currentQuestionIndex;
    renderQuestion(currentQuestions[qi], qi, gameState);

    // 5b. If current question is already revealed, show Next (or complete if last)
    if (gameState.revealed[qi]) {
      if (qi < currentQuestions.length - 1) {
        showNextButton();
      } else {
        completeGame();
      }
    }

    // 5. If the current question has a timer and hasn't been revealed yet, start countdown
    var q = currentQuestions[qi];
    if (q.timerSeconds && !gameState.revealed[qi]) {
      showTimer(q.timerSeconds);
      startCountdown(q.timerSeconds, updateTimerDisplay, handleTimerExpire);
    }

    // 6. Start elapsed time tracking
    if (_elapsedInterval) clearInterval(_elapsedInterval);
    _elapsedInterval = setInterval(function() {
      gameState.elapsedMs = (gameState.elapsedMs || 0) + 1000;
    }, 1000);

    // 7. Save state
    saveGameState(gameState);
  }

  // ===== GAME CONTROLLER: HANDLE ANSWER CLICK (Task 7.2) =====

  function handleAnswerClick(selectedIndex) {
    var qi = gameState.currentQuestionIndex;

    // 1. If already revealed, ignore clicks
    if (gameState.revealed[qi]) return;

    // 2. Get the correct shuffled index
    var correctShuffledIndex = gameState.correctShuffledIndex[qi];

    // 3. Get answer buttons
    var buttons = document.getElementById('answer-grid').querySelectorAll('.answer-btn');

    if (selectedIndex === correctShuffledIndex) {
      // === CORRECT ANSWER ===
      // a. Highlight green
      buttons[selectedIndex].classList.add('correct');

      // a2. Disable all buttons
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
      }

      // b. Play correct sound
      soundCorrect();

      // c. Mark as revealed
      gameState.revealed[qi] = true;

      // d. Stop countdown timer if active
      stopCountdown();
      document.getElementById('timer-display').classList.add('hidden');

      // e. Show post-answer image if configured
      var question = currentQuestions[qi];
      if (question.postAnswerImage) {
        showPostAnswerImage(question.postAnswerImage);
      }

      // f/g. If last question → completeGame, otherwise → showNextButton
      if (qi === currentQuestions.length - 1) {
        completeGame();
      } else {
        showNextButton();
      }

      // h. Update question tracker
      renderQuestionTracker(gameState, currentQuestions);

    } else {
      // === WRONG ANSWER ===
      // a. Highlight red and disable
      buttons[selectedIndex].classList.add('wrong');
      buttons[selectedIndex].disabled = true;

      // b. Play wrong sound
      soundWrong();

      // c. Track disabled option
      if (!gameState.disabledOptions[qi]) gameState.disabledOptions[qi] = [];
      gameState.disabledOptions[qi].push(selectedIndex);

      // d. Deduct 1 star (minimum 0)
      gameState.questionScores[qi] = Math.max(0, gameState.questionScores[qi] - 1);

      // e. If all wrong options exhausted, auto-reveal correct answer
      var totalAnswers = currentQuestions[qi].answers.length;
      if (gameState.disabledOptions[qi].length >= totalAnswers - 1) {
        // All wrong answers used — auto-reveal correct
        buttons[correctShuffledIndex].classList.add('correct');
        gameState.revealed[qi] = true;

        // Stop timer if active
        stopCountdown();
        document.getElementById('timer-display').classList.add('hidden');

        // Show post-answer image if configured
        var question = currentQuestions[qi];
        if (question.postAnswerImage) {
          showPostAnswerImage(question.postAnswerImage);
        }

        // Last question → completeGame, otherwise → showNextButton
        if (qi === currentQuestions.length - 1) {
          completeGame();
        } else {
          showNextButton();
        }

        // Update tracker
        renderQuestionTracker(gameState, currentQuestions);
      }
    }

    // 6. Save state after each action
    saveGameState(gameState);
  }

  // ===== GAME CONTROLLER: HANDLE TIMER EXPIRE (Task 7.2) =====

  function handleTimerExpire() {
    var qi = gameState.currentQuestionIndex;

    // 1. Set score to 0
    gameState.questionScores[qi] = 0;

    // 2. Mark as revealed
    gameState.revealed[qi] = true;

    // 3. Highlight the correct answer
    var correctShuffledIndex = gameState.correctShuffledIndex[qi];
    var buttons = document.getElementById('answer-grid').querySelectorAll('.answer-btn');
    if (buttons[correctShuffledIndex]) {
      buttons[correctShuffledIndex].classList.add('correct');
    }

    // 4. Disable all answer buttons
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].disabled = true;
    }

    // 5. Show post-answer image if configured
    var question = currentQuestions[qi];
    if (question.postAnswerImage) {
      showPostAnswerImage(question.postAnswerImage);
    }

    // 6. Last question → completeGame, otherwise → showNextButton
    if (qi === currentQuestions.length - 1) {
      completeGame();
    } else {
      showNextButton();
    }

    // 7. Update tracker and save state
    renderQuestionTracker(gameState, currentQuestions);
    saveGameState(gameState);
  }

  // ===== GAME CONTROLLER: ADVANCE, COMPLETE, REVIEW (Task 7.4) =====

  function advanceToNextQuestion() {
    // 0. Hide next button for the new question
    document.getElementById('next-btn').style.visibility = 'hidden';

    // 1. Increment question index
    gameState.currentQuestionIndex++;

    // 2. Render the new question
    var qi = gameState.currentQuestionIndex;
    renderQuestion(currentQuestions[qi], qi, gameState);

    // 3. Update the question tracker
    renderQuestionTracker(gameState, currentQuestions);

    // 3b. Update category label
    updateCategoryLabel();
    var q = currentQuestions[qi];
    if (q.timerSeconds && !gameState.revealed[qi]) {
      showTimer(q.timerSeconds);
      startCountdown(q.timerSeconds, updateTimerDisplay, handleTimerExpire);
    }

    // 5. Save state
    saveGameState(gameState);
  }

  function completeGame() {
    // 1. Mark game as completed
    gameState.completed = true;

    // 2. Stop elapsed time tracking
    if (_elapsedInterval) {
      clearInterval(_elapsedInterval);
      _elapsedInterval = null;
    }

    // 3. Stop any active countdown
    stopCountdown();

    // 4. Save state
    saveGameState(gameState);

    // 5. Save to history
    saveToHistory(gameState.date, gameState.questionScores, true);
    if (typeof isSubscriber === 'function' && isSubscriber()) {
      submitScore('triviatsky', getActiveLanguage(), {
        score: gameState.score,
        words_completed: gameState.questionScores.length,
        details: { questionScores: gameState.questionScores }
      });
    }

    // 6. Show results overlay
    renderResultsOverlay(gameState, currentQuestions);
  }

  function enterReviewMode() {
    // 0. Update category label
    updateCategoryLabel();

    // Enable share button in toolbar
    document.getElementById('share-btn').disabled = false;

    // 1. Re-render the question tracker (click handlers enabled since state.completed is true)
    renderQuestionTracker(gameState, currentQuestions);

    // 2. Render the current question in its revealed state
    var qi = gameState.currentQuestionIndex;
    renderQuestion(currentQuestions[qi], qi, gameState);

    // 3. If the current question has a post-answer image, show it
    var q = currentQuestions[qi];
    if (q.postAnswerImage) {
      showPostAnswerImage(q.postAnswerImage);
    }
  }

  // Wire up Next button
  document.getElementById('next-btn').onclick = function() { advanceToNextQuestion(); };

  // ===== GAME CONTROLLER: TRACKER CLICK & CALENDAR SELECT (Task 7.5) =====

  function handleTrackerClick(questionIndex) {
    // Only works in review mode (game completed)
    if (!gameState || !gameState.completed) return;

    // 1. Set current question index
    gameState.currentQuestionIndex = questionIndex;

    // 2. Re-render the question tracker (to update active highlight)
    renderQuestionTracker(gameState, currentQuestions);

    // 2b. Update category label
    updateCategoryLabel();

    // 3. Render the selected question in its revealed state
    renderQuestion(currentQuestions[questionIndex], questionIndex, gameState);

    // 4. If the question has a post-answer image, show it
    var q = currentQuestions[questionIndex];
    if (q.postAnswerImage) {
      showPostAnswerImage(q.postAnswerImage);
    }

  async function handleCalendarDateSelect(dateStr) {
    // 1. Close the calendar overlay
    document.getElementById('calendar-overlay').classList.add('hidden');

    // 2. Set currentDateStr to the selected date
    currentDateStr = dateStr;
    updateCalendarDateLabel();

    // 3. Disable share button until we know if game is completed
    document.getElementById('share-btn').disabled = true;

    // 3. Load game data for the selected date (should already be cached in allGameData)
    var data = await loadGameData(dateStr);

    var msgArea = document.getElementById('message-area');

    // 4. If data is null, show error message
    if (data === null) {
      if (loadError) {
        msgArea.classList.remove('hidden');
        msgArea.textContent = 'Could not load game data';
        msgArea.classList.add('error');
      } else {
        showNoGamePopup('There\'s no trivia available for this date. Tap the calendar button to pick another day.');
      }
      // Hide game area, show nothing useful
      document.getElementById('game-area').classList.add('hidden');
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('results-overlay').classList.add('hidden');
      return;
    }

    // Clear any previous error messages
    msgArea.classList.add('hidden');
    msgArea.classList.remove('error');
    msgArea.textContent = '';
    document.getElementById('no-game-overlay').classList.add('hidden');

    // 5. Store current questions
    currentQuestions = data;

    // 6. Stop any active timers/intervals
    stopCountdown();
    if (_elapsedInterval) {
      clearInterval(_elapsedInterval);
      _elapsedInterval = null;
    }

    // 7. Hide results overlay if visible
    document.getElementById('results-overlay').classList.add('hidden');

    // 8. Check for saved state for that date
    var savedState = loadGameState(dateStr);

    if (savedState && savedState.completed) {
      // Completed game — enter review mode
      gameState = savedState;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-area').classList.remove('hidden');
      renderQuestionTracker(gameState, currentQuestions);
      renderQuestion(currentQuestions[gameState.currentQuestionIndex], gameState.currentQuestionIndex, gameState);
      enterReviewMode();
    } else if (savedState && savedState.started) {
      // In-progress game — show start screen with "Resume"
      gameState = savedState;
      document.getElementById('game-area').classList.add('hidden');
      renderStartScreen(true);
    } else {
      // Fresh game — initialize new state
      var qLen = currentQuestions.length;
      var scores = [];
      var disabled = [];
      var revealed = [];
      for (var i = 0; i < qLen; i++) {
        scores.push(5);
        disabled.push([]);
        revealed.push(false);
      }
      gameState = {
        date: dateStr,
        currentQuestionIndex: 0,
        questionScores: scores,
        disabledOptions: disabled,
        completed: false,
        started: false,
        revealed: revealed,
        shuffledAnswers: [],
        correctShuffledIndex: [],
        elapsedMs: 0
      };
      document.getElementById('game-area').classList.add('hidden');
      renderStartScreen(false);
    }

    // Wire up start button for the new date
    document.getElementById('start-btn').onclick = function() { startGame(); };
  }

        this.classList.add('selected');
      };
    }
  })();

  // ===== NO GAME POPUP =====

  function showNoGamePopup(message) {
    document.getElementById('no-game-message').textContent = message;
    document.getElementById('no-game-overlay').classList.remove('hidden');
  }

  document.getElementById('no-game-calendar-btn').onclick = function() {
    document.getElementById('no-game-overlay').classList.add('hidden');
    document.getElementById('calendar-btn').click();
  };

  // ===== GAME CONTROLLER: INIT (Task 7.1) =====

  async function initGame() {
    // 1. Load language config from shared engine
    await loadLanguageConfig();

    // 2. Get current date as YYYYMMDD (or from URL ?d= param)
    var urlDate = new URLSearchParams(window.location.search).get('d');
    if (urlDate && /^\d{8}$/.test(urlDate)) {
      currentDateStr = urlDate;
    } else {
      var now = new Date();
      currentDateStr = formatDateStr(now.getFullYear(), now.getMonth() + 1, now.getDate());
    }
    updateCalendarDateLabel();

    // 3. Fetch trivia data for today
    var data = await loadGameData(currentDateStr);

    var msgArea = document.getElementById('message-area');

    // 4. Handle null data
    if (data === null) {
      if (loadError) {
        msgArea.classList.remove('hidden');
        msgArea.textContent = 'Could not load game data';
        msgArea.classList.add('error');
      } else {
        showNoGamePopup('There\'s no trivia available for today. Tap the calendar button to pick another day.');
      }
      return;
    }

    // 5. Store current questions
    currentQuestions = data;

    // 6. Check for saved state
    var savedState = loadGameState(currentDateStr);

    if (savedState && savedState.completed) {
      // Completed game — enter review mode directly
      gameState = savedState;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-area').classList.remove('hidden');
      renderQuestionTracker(gameState, currentQuestions);
      renderQuestion(currentQuestions[gameState.currentQuestionIndex], gameState.currentQuestionIndex, gameState);
      enterReviewMode();
    } else if (savedState && savedState.started) {
      // In-progress game — show start screen with "Resume"
      gameState = savedState;
      renderStartScreen(true);
    } else {
      // Fresh game — initialize new state
      var qLen = currentQuestions.length;
      var scores = [];
      var disabled = [];
      var revealed = [];
      for (var i = 0; i < qLen; i++) {
        scores.push(5);
        disabled.push([]);
        revealed.push(false);
      }
      gameState = {
        date: currentDateStr,
        currentQuestionIndex: 0,
        questionScores: scores,
        disabledOptions: disabled,
        completed: false,
        started: false,
        revealed: revealed,
        shuffledAnswers: [],
        correctShuffledIndex: [],
        elapsedMs: 0
      };
      renderStartScreen(false);
    }

    // Wire up start button
    document.getElementById('start-btn').onclick = function() { startGame(); };
  }

  // ===== ANIMATION: QUESTION ENTRANCE =====
  function triggerQuestionEntrance() {
    var area = document.getElementById('game-area');
    area.classList.remove('question-enter');
    void area.offsetWidth; // force reflow
    area.classList.add('question-enter');
    setTimeout(function() { area.classList.remove('question-enter'); }, 1200);
  }

  // ===== ANIMATION: EXPLOSION PARTICLES =====
  function spawnExplosion(btn) {
    var rect = btn.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var colors = ['#ff4444','#ff6b35','#ffa500','#ffcc00','#ff3366','#ff1744'];
    var count = 18;
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'explosion-particle';
      var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      var dist = 60 + Math.random() * 80;
      var size = 4 + Math.random() * 8;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.boxShadow = '0 0 6px ' + p.style.background;
      document.body.appendChild(p);
      var tx = Math.cos(angle) * dist;
      var ty = Math.sin(angle) * dist - 30;
      var dur = 400 + Math.random() * 300;
      p.animate([
        { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
        { transform: 'translate(calc(-50% + ' + tx + 'px), calc(-50% + ' + ty + 'px)) scale(0)', opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.25,0,0.5,1)', fill: 'forwards' });
      (function(el, d) { setTimeout(function() { el.remove(); }, d); })(p, dur + 50);
    }
  }

  // ===== ANIMATION: CONFETTI =====
  function launchConfetti() {
    var canvas = document.createElement('canvas');
    canvas.className = 'confetti-canvas';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    var pieces = [];
    var colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ff9f43','#54a0ff','#ee5a24','#c8a830'];
    for (var i = 0; i < 120; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.5,
        w: 6 + Math.random() * 8,
        h: 4 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        rv: (Math.random() - 0.5) * 0.2,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.03 + Math.random() * 0.05
      });
    }
    var start = performance.now();
    var duration = 3000;
    function frame(now) {
      var elapsed = now - start;
      if (elapsed > duration) { canvas.remove(); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var fade = elapsed > duration * 0.7 ? 1 - (elapsed - duration * 0.7) / (duration * 0.3) : 1;
      for (var i = 0; i < pieces.length; i++) {
        var p = pieces[i];
        p.x += p.vx + Math.sin(p.wobble) * 1.5;
        p.y += p.vy;
        p.rot += p.rv;
        p.wobble += p.wobbleSpeed;
        p.vy += 0.04;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = fade;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ===== PATCH: Hook animations into existing functions =====

  // Wrap renderQuestion to trigger entrance animation
  var _origRenderQuestion = renderQuestion;
  renderQuestion = function(question, questionIndex, state) {
    _origRenderQuestion(question, questionIndex, state);
    // Only animate entrance for unrevealed questions (not review mode)
    if (!state.completed) {
      triggerQuestionEntrance();
    }
  };

  // Wrap handleAnswerClick to add explosion + confetti
  var _origHandleAnswerClick = handleAnswerClick;
  handleAnswerClick = function(selectedIndex) {
    var qi = gameState.currentQuestionIndex;
    if (gameState.revealed[qi]) { _origHandleAnswerClick(selectedIndex); return; }

    var correctShuffledIndex = gameState.correctShuffledIndex[qi];
    var buttons = document.getElementById('answer-grid').querySelectorAll('.answer-btn');

    if (selectedIndex === correctShuffledIndex) {
      // Correct — run original then confetti
      _origHandleAnswerClick(selectedIndex);
      launchConfetti();
    } else {
      // Wrong — apply wrong state first, then explode a clone on top
      var btn = buttons[selectedIndex];
      // Run original logic immediately so the disabled wrong button is in place
      _origHandleAnswerClick(selectedIndex);
      // Create a clone positioned on top that will explode away
      var rect = btn.getBoundingClientRect();
      var clone = btn.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      clone.style.width = rect.width + 'px';
      clone.style.height = rect.height + 'px';
      clone.style.margin = '0';
      clone.style.zIndex = '60';
      clone.style.pointerEvents = 'none';
      clone.classList.remove('wrong');
      clone.disabled = false;
      document.body.appendChild(clone);
      spawnExplosion(clone);
      clone.classList.add('exploding');
      setTimeout(function() { clone.remove(); }, 600);
    }
  };

  document.addEventListener('DOMContentLoaded', initGame);
</script>
